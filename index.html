<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星爪纪念花园</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111f}
    button{padding:0;border:0;background:transparent;cursor:pointer}
    .viewport{position:fixed;inset:0;overflow:hidden;background:#07111f}
    .stage{
      position:absolute;
      left:50%;
      top:50%;
      width:1672px;
      height:941px;
      transform-origin:center center;
      background:
        linear-gradient(90deg,rgba(5,10,22,.13) 0%,rgba(5,10,22,.05) 55%,rgba(5,10,22,0) 100%),
        url("assets/bg.png?v=layout-size-position-fixed-1") center center/cover no-repeat;
    }

    .brand-image{
      position:absolute;
      left:56px;
      top:54px;
      width:270px;
      height:76px;
      object-fit:contain;
      object-position:left top;
      z-index:10;
    }

    .language{
      position:absolute;
      right:68px;
      top:45px;
      z-index:40;
    }
    .language-button{width:230px;height:62px;display:block}
    .language-button img{width:230px;height:62px;display:block}
    .language-menu{
      position:absolute;
      top:68px;
      right:0;
      width:230px;
      display:none;
      padding:8px;
      background:rgba(8,16,32,.98);
      border:2px solid rgba(232,191,116,.98);
      box-shadow:0 18px 34px rgba(0,0,0,.36);
    }
    .language.open .language-menu{display:grid;gap:5px}
    .language-menu button{
      height:42px;
      color:#ffe0a2;
      font:900 18px "Microsoft YaHei","PingFang SC",sans-serif;
      letter-spacing:1px;
      text-shadow:2px 2px 0 rgba(20,14,10,.72);
    }
    .language-menu button:hover,.language-menu button.active{background:rgba(232,191,116,.18)}

    .hero-image{
      position:absolute;
      left:72px;
      top:232px;
      width:560px;
      height:302px;
      object-fit:contain;
      object-position:left top;
      z-index:10;
    }

    .actions{
      position:absolute;
      left:84px;
      top:638px;
      z-index:20;
      display:flex;
      gap:28px;
    }

    .real-button{
      width:250px;
      height:88px;
      display:block;
      transition:transform .14s ease,filter .14s ease;
    }
    .real-button:hover{transform:translateY(-2px);filter:brightness(1.06)}
    .real-button img{
      width:250px;
      height:88px;
      display:block;
      pointer-events:none;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:28px;
      z-index:100;
      padding:12px 18px;
      color:#ffe0a2;
      background:rgba(9,16,31,.96);
      border:1px solid rgba(224,180,106,.55);
      transform:translateX(-50%) translateY(16px);
      opacity:0;
      pointer-events:none;
      transition:.22s ease;
      letter-spacing:1px;
      font:700 15px "Microsoft YaHei","PingFang SC",sans-serif;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <main class="viewport">
    <section class="stage" id="stage">
      <img class="brand-image" id="brandImage" src="assets/brand_zh_CN.png?v=layout-size-position-fixed-1" alt="星爪纪念花园" />

      <div class="language" id="languageBox">
        <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
          <img id="languageImage" src="assets/language_zh_CN.png?v=layout-size-position-fixed-1" alt="简体中文" />
        </button>
        <div class="language-menu">
          <button type="button" data-lang="zh-CN">简体中文</button>
          <button type="button" data-lang="zh-TW">繁體中文</button>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="ja">日本語</button>
        </div>
      </div>

      <img class="hero-image" id="heroImage" src="assets/hero_zh_CN.png?v=layout-size-position-fixed-1" alt="让想念，有一个安静的地方" />

      <div class="actions">
        <button class="real-button" type="button" id="enterGarden">
          <img id="enterImage" src="assets/button_enter_zh_CN.png?v=layout-size-position-fixed-1" alt="进入纪念园" />
        </button>
        <button class="real-button" type="button" id="createMemorial">
          <img id="createImage" src="assets/button_create_zh_CN.png?v=layout-size-position-fixed-1" alt="开始创建" />
        </button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stage = document.getElementById("stage");
    const toast = document.getElementById("toast");
    const languageBox = document.getElementById("languageBox");
    const languageButton = document.getElementById("languageButton");

    const brandImage = document.getElementById("brandImage");
    const heroImage = document.getElementById("heroImage");
    const enterImage = document.getElementById("enterImage");
    const createImage = document.getElementById("createImage");
    const languageImage = document.getElementById("languageImage");

    const version = "layout-size-position-fixed-1";

    const assetMap = {
      "zh-CN": { key: "zh_CN", saved: "语言已保存", noMemorial: "还没有创建纪念，先去创建页面。" },
      "zh-TW": { key: "zh_TW", saved: "語言已保存", noMemorial: "還沒有建立紀念，先去建立頁面。" },
      en: { key: "en", saved: "Language saved", noMemorial: "No memorial yet. Opening the creation page." },
      ja: { key: "ja", saved: "言語を保存しました", noMemorial: "まだ記念ページがありません。作成ページへ移動します。" }
    };

    function resizeStage() {
      const scale = Math.max(window.innerWidth / 1672, window.innerHeight / 941);
      stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    window.addEventListener("resize", resizeStage);
    resizeStage();

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function applyLanguage(lang) {
      const data = assetMap[lang] || assetMap["zh-CN"];
      const key = data.key;
      brandImage.src = `assets/brand_${key}.png?v=${version}`;
      heroImage.src = `assets/hero_${key}.png?v=${version}`;
      enterImage.src = `assets/button_enter_${key}.png?v=${version}`;
      createImage.src = `assets/button_create_${key}.png?v=${version}`;
      languageImage.src = `assets/language_${key}.png?v=${version}`;

      document.querySelectorAll(".language-menu button").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      const lang = localStorage.getItem("petMemorialLanguage") || "zh-CN";
      const data = assetMap[lang] || assetMap["zh-CN"];
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }
      showToast(data.noMemorial);
      setTimeout(() => window.location.href = "create.html", 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);
    document.getElementById("createMemorial").addEventListener("click", () => window.location.href = "create.html");

    languageButton.addEventListener("click", (event) => {
      event.stopPropagation();
      languageBox.classList.toggle("open");
    });

    document.querySelectorAll(".language-menu button").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        const lang = button.dataset.lang;
        localStorage.setItem("petMemorialLanguage", lang);
        applyLanguage(lang);
        languageBox.classList.remove("open");
        const data = assetMap[lang] || assetMap["zh-CN"];
        showToast(data.saved);
      });
    });

    document.addEventListener("click", () => languageBox.classList.remove("open"));
    localStorage.setItem("starpawHomeVersion", version);
    applyLanguage(localStorage.getItem("petMemorialLanguage") || "zh-CN");
  </script>
</body>
</html>
