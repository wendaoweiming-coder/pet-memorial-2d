<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    :root {
      --bg-1: #050b16;
      --bg-2: #0b1830;
      --bg-3: #122641;
      --cream: #f7ead3;
      --cream-soft: rgba(247, 234, 211, 0.72);
      --paper: #fff7e8;
      --paper-2: #f1ddbd;
      --ink: #20283f;
      --muted: #70768a;
      --gold: #f2d19a;
      --rose: #d98ea5;
      --lavender: #9f86c0;
      --green: #6f9475;
      --line: rgba(255, 235, 196, 0.18);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      background: var(--bg-1);
      color: var(--cream);
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 18%, rgba(247, 214, 150, 0.18), transparent 12%),
        radial-gradient(circle at 18% 78%, rgba(136, 101, 171, 0.18), transparent 22%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 48%, #0f2335 100%);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 6px 6px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .stars,
    .petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 2;
    }

    .petals {
      z-index: 15;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff5c8;
      box-shadow:
        4px 0 #fff5c8,
        0 4px #fff5c8,
        4px 4px #fff5c8;
      opacity: 0.68;
      image-rendering: pixelated;
      animation: starBlink 4s ease-in-out infinite;
    }

    @keyframes starBlink {
      0%, 100% {
        opacity: 0.28;
        transform: scale(0.75);
      }

      50% {
        opacity: 0.95;
        transform: scale(1);
      }
    }

    .moon {
      position: absolute;
      right: 15vw;
      top: 105px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 34%, rgba(255,255,255,0.75) 0 8%, transparent 9%),
        radial-gradient(circle at 65% 44%, rgba(130,113,91,0.22) 0 12%, transparent 13%),
        radial-gradient(circle at 45% 70%, rgba(130,113,91,0.2) 0 10%, transparent 11%),
        #f4e4ad;
      box-shadow:
        0 0 0 8px rgba(244, 228, 173, 0.05),
        0 0 42px rgba(244, 228, 173, 0.34),
        0 0 110px rgba(180, 167, 255, 0.18);
      z-index: 2;
      image-rendering: pixelated;
    }

    .mist {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 29%;
      height: 130px;
      background:
        linear-gradient(90deg, transparent, rgba(186, 197, 223, 0.08), transparent),
        linear-gradient(180deg, transparent, rgba(186, 197, 223, 0.06), transparent);
      filter: blur(12px);
      z-index: 2;
    }

    .header {
      position: relative;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 7vw 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      position: relative;
      width: 44px;
      height: 44px;
      image-rendering: pixelated;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 17px;
      width: 17px;
      height: 15px;
      background: var(--cream);
      border-radius: 5px;
      box-shadow:
        -9px -11px 0 -2px var(--cream),
        10px -11px 0 -2px var(--cream),
        -15px 0 0 -3px var(--cream),
        16px 0 0 -3px var(--cream),
        0 13px 0 -5px var(--cream);
    }

    .brand-title {
      display: block;
      font-size: 23px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--cream);
      text-shadow: 0 3px 0 rgba(0,0,0,0.25);
    }

    .brand-subtitle {
      display: block;
      margin-top: 5px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(247, 234, 211, 0.55);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 26px;
      font-size: 15px;
      letter-spacing: 1px;
      color: rgba(247, 234, 211, 0.75);
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: var(--cream);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      bottom: -5px;
      height: 3px;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(242, 209, 154, 0.65);
    }

    .nav-action {
      padding: 9px 18px;
      border: 2px solid rgba(247, 234, 211, 0.22);
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 10px 26px rgba(0,0,0,0.18);
    }

    .hero {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 72px);
      display: grid;
      grid-template-columns: minmax(360px, 0.9fr) minmax(520px, 1.1fr);
      gap: 44px;
      align-items: center;
      padding: 56px 7vw 92px;
    }

    .hero-copy {
      position: relative;
      max-width: 530px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      margin-bottom: 22px;
      color: rgba(247, 234, 211, 0.76);
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(247, 234, 211, 0.16);
      box-shadow: 0 14px 38px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      box-shadow:
        10px 0 0 rgba(217, 142, 165, 0.9),
        20px 0 0 rgba(159, 134, 192, 0.9);
      image-rendering: pixelated;
    }

    .hero h1 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(44px, 5.6vw, 76px);
      line-height: 1.05;
      letter-spacing: 3px;
      text-shadow:
        0 5px 0 rgba(0,0,0,0.18),
        0 24px 70px rgba(0,0,0,0.42);
    }

    .hero h1 span {
      display: block;
      color: #f2d19a;
    }

    .hero-desc {
      margin: 24px 0 0;
      max-width: 460px;
      color: rgba(247, 234, 211, 0.72);
      line-height: 1.95;
      font-size: 16px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      margin-top: 34px;
      flex-wrap: wrap;
    }

    .pixel-button {
      min-height: 58px;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 25px;
      font-weight: 800;
      letter-spacing: 1.5px;
      transition: transform 0.16s ease, filter 0.16s ease;
      image-rendering: pixelated;
    }

    .pixel-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.05);
    }

    .pixel-button:active {
      transform: translateY(1px);
    }

    .pixel-button.primary {
      min-width: 188px;
      background: var(--paper);
      color: var(--ink);
      box-shadow:
        inset 0 0 0 3px rgba(32,40,63,0.12),
        7px 7px 0 rgba(0,0,0,0.25),
        0 18px 46px rgba(0,0,0,0.28);
    }

    .pixel-button.secondary {
      min-width: 168px;
      color: var(--cream);
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(247, 234, 211, 0.25);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        7px 7px 0 rgba(0,0,0,0.18);
    }

    .button-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 460px;
      margin-top: 34px;
    }

    .meta-card {
      padding: 14px 12px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(247, 234, 211, 0.14);
      box-shadow: 0 12px 34px rgba(0,0,0,0.16);
      backdrop-filter: blur(8px);
    }

    .meta-card strong {
      display: block;
      color: var(--cream);
      font-size: 19px;
      margin-bottom: 4px;
    }

    .meta-card span {
      color: rgba(247, 234, 211, 0.55);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .language-wrap {
      margin-top: 26px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(247, 234, 211, 0.55);
      font-size: 13px;
    }

    .language-select {
      min-width: 150px;
      padding: 10px 14px;
      color: var(--cream);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(247, 234, 211, 0.18);
      outline: none;
    }

    .language-select option {
      background: #0b1830;
      color: var(--cream);
    }

    .scene-card {
      position: relative;
      min-height: 660px;
      border: 2px solid rgba(247, 234, 211, 0.18);
      background:
        radial-gradient(circle at 70% 22%, rgba(244, 228, 173, 0.08), transparent 18%),
        linear-gradient(180deg, rgba(14, 30, 58, 0.58), rgba(9, 23, 38, 0.72));
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.32),
        inset 0 0 0 1px rgba(255,255,255,0.045);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .scene-card::before,
    .scene-card::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: rgba(247, 234, 211, 0.22);
      border-style: solid;
      z-index: 20;
    }

    .scene-card::before {
      top: 18px;
      left: 18px;
      border-width: 3px 0 0 3px;
    }

    .scene-card::after {
      right: 18px;
      bottom: 18px;
      border-width: 0 3px 3px 0;
    }

    .scene-label {
      position: absolute;
      top: 30px;
      left: 34px;
      z-index: 20;
      padding: 10px 14px;
      color: rgba(247, 234, 211, 0.72);
      background: rgba(5, 11, 22, 0.38);
      border: 1px solid rgba(247, 234, 211, 0.14);
      font-size: 13px;
      letter-spacing: 1px;
      backdrop-filter: blur(8px);
    }

    .scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .scene-hill {
      position: absolute;
      bottom: 36%;
      height: 170px;
      border-radius: 50% 50% 0 0;
      z-index: 1;
      background: rgba(41, 67, 83, 0.52);
    }

    .scene-hill.one {
      left: -12%;
      width: 52%;
    }

    .scene-hill.two {
      left: 18%;
      width: 58%;
      bottom: 34%;
      background: rgba(49, 78, 91, 0.42);
    }

    .scene-hill.three {
      right: -18%;
      width: 66%;
      background: rgba(34, 56, 74, 0.56);
    }

    .scene-ground {
      position: absolute;
      left: -12%;
      right: -12%;
      bottom: 0;
      height: 54%;
      z-index: 3;
      background:
        radial-gradient(ellipse at 55% 62%, rgba(244, 209, 154, 0.18), transparent 24%),
        radial-gradient(ellipse at 38% 65%, rgba(111, 148, 117, 0.26), transparent 28%),
        linear-gradient(180deg, rgba(27, 62, 61, 0.06), #17352c 38%, #0e241e 100%);
      border-radius: 58% 42% 0 0 / 20% 18% 0 0;
      box-shadow: 0 -36px 70px rgba(0,0,0,0.18);
    }

    .scene-path {
      position: absolute;
      left: 8%;
      bottom: 4%;
      width: 74%;
      height: 38%;
      z-index: 4;
      transform: perspective(320px) rotateX(58deg) rotateZ(-7deg);
      transform-origin: bottom center;
    }

    .step {
      position: absolute;
      width: 86px;
      height: 28px;
      background: #596479;
      border: 3px solid rgba(255,255,255,0.12);
      box-shadow: 5px 5px 0 rgba(5, 11, 22, 0.38);
      opacity: 0.86;
    }

    .step.s1 { left: 12%; bottom: 7%; }
    .step.s2 { left: 27%; bottom: 19%; width: 104px; }
    .step.s3 { left: 42%; bottom: 35%; width: 122px; }
    .step.s4 { left: 58%; bottom: 54%; width: 138px; }
    .step.s5 { left: 72%; bottom: 73%; width: 116px; }

    .big-tree {
      position: absolute;
      right: -52px;
      bottom: 125px;
      width: 286px;
      height: 390px;
      z-index: 8;
      pointer-events: none;
    }

    .tree-trunk {
      position: absolute;
      right: 88px;
      bottom: 0;
      width: 56px;
      height: 260px;
      background:
        linear-gradient(90deg, #251a21, #56383d 45%, #221920);
      box-shadow:
        -14px 50px 0 #2a1d25,
        18px 96px 0 #3d2a31;
      transform: skewX(-6deg);
    }

    .branch {
      position: absolute;
      height: 22px;
      background: #3c2830;
      transform-origin: left center;
    }

    .branch.b1 {
      width: 188px;
      right: 38px;
      top: 94px;
      transform: rotate(-22deg);
    }

    .branch.b2 {
      width: 135px;
      right: 118px;
      top: 152px;
      transform: rotate(-48deg);
    }

    .branch.b3 {
      width: 145px;
      right: 14px;
      top: 176px;
      transform: rotate(16deg);
    }

    .branch.b4 {
      width: 95px;
      right: 110px;
      top: 218px;
      transform: rotate(34deg);
    }

    .leaf-cluster {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #80619a;
      box-shadow:
        18px 0 #a17ab4,
        -18px 0 #675381,
        0 18px #b187b8,
        0 -18px #9270ac,
        36px 18px #8f6ba7,
        -36px 18px #665181,
        18px -36px #b188bc,
        -18px -34px #765c92;
      opacity: 0.92;
      image-rendering: pixelated;
    }

    .leaf-cluster.c1 { right: 4px; top: 54px; }
    .leaf-cluster.c2 { right: 86px; top: 28px; transform: scale(1.2); }
    .leaf-cluster.c3 { right: 138px; top: 98px; transform: scale(1.05); }
    .leaf-cluster.c4 { right: 20px; top: 142px; transform: scale(0.95); }
    .leaf-cluster.c5 { right: 158px; top: 158px; transform: scale(0.78); }

    .tomb-wrap {
      position: absolute;
      left: 48%;
      bottom: 122px;
      width: 270px;
      height: 360px;
      transform: translateX(-50%);
      z-index: 12;
    }

    .tomb {
      position: absolute;
      left: 50%;
      bottom: 66px;
      width: 168px;
      height: 226px;
      transform: translateX(-50%);
      border: 5px solid rgba(25, 31, 47, 0.62);
      border-radius: 82px 82px 9px 9px;
      background:
        radial-gradient(circle at 42% 27%, rgba(255,255,255,0.17), transparent 8%),
        linear-gradient(90deg, #687084, #8b8c99 46%, #596176);
      box-shadow:
        inset 9px 0 0 rgba(255,255,255,0.1),
        inset -10px -8px 0 rgba(0,0,0,0.14),
        14px 14px 0 rgba(5, 11, 22, 0.32);
    }

    .tomb::before {
      content: "";
      position: absolute;
      left: -15px;
      right: -15px;
      bottom: -31px;
      height: 33px;
      background: #606a7d;
      border: 4px solid rgba(25, 31, 47, 0.54);
      box-shadow: inset 5px 5px 0 rgba(255,255,255,0.08);
    }

    .stone-paw {
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
      width: 42px;
      height: 36px;
    }

    .stone-paw::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 15px;
      width: 20px;
      height: 17px;
      background: rgba(33, 40, 58, 0.75);
      border-radius: 8px;
      box-shadow:
        -9px -9px 0 -4px rgba(33, 40, 58, 0.75),
        9px -9px 0 -4px rgba(33, 40, 58, 0.75),
        -16px 2px 0 -5px rgba(33, 40, 58, 0.75),
        17px 2px 0 -5px rgba(33, 40, 58, 0.75);
    }

    .stone-text {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 95px;
      text-align: center;
      color: rgba(24, 31, 48, 0.84);
      text-shadow: 1px 1px 0 rgba(255,255,255,0.18);
    }

    .stone-text strong {
      display: block;
      font-size: 23px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .stone-text span {
      display: block;
      font-size: 14px;
      letter-spacing: 1px;
      line-height: 1.6;
    }

    .stone-heart {
      margin-top: 11px;
      font-size: 13px;
    }

    .lantern {
      position: absolute;
      left: 10px;
      bottom: 48px;
      width: 54px;
      height: 74px;
      background: #2f2730;
      border: 4px solid #171620;
      z-index: 13;
      box-shadow:
        0 0 38px rgba(255, 192, 96, 0.58),
        0 0 95px rgba(255, 192, 96, 0.22);
    }

    .lantern::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 12px;
      bottom: 12px;
      background:
        radial-gradient(circle, #fff4b7 0 20%, #ffc15f 21% 48%, rgba(255, 193, 95, 0.1) 49%);
      box-shadow: inset 0 0 0 3px rgba(60,39,24,0.32);
    }

    .lantern::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: -16px;
      height: 14px;
      border: 4px solid #171620;
      border-bottom: 0;
    }

    .flower-bed {
      position: absolute;
      right: 2px;
      bottom: 48px;
      width: 94px;
      height: 62px;
      z-index: 13;
    }

    .flower {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #ead8da;
      box-shadow:
        12px 0 #c9899f,
        0 12px #dfa7c1,
        12px 12px #f2e5d4;
      image-rendering: pixelated;
    }

    .flower.f1 { left: 0; bottom: 14px; }
    .flower.f2 { left: 32px; bottom: 28px; transform: scale(0.9); }
    .flower.f3 { left: 58px; bottom: 8px; transform: scale(1.12); }

    .cat {
      position: absolute;
      left: 70px;
      bottom: 46px;
      width: 68px;
      height: 48px;
      z-index: 14;
      opacity: 0.9;
    }

    .cat-body {
      position: absolute;
      left: 20px;
      top: 20px;
      width: 42px;
      height: 22px;
      background: #d7bfa6;
      border-radius: 12px 12px 10px 10px;
      box-shadow: inset -10px 0 0 #7a5b52;
    }

    .cat-head {
      position: absolute;
      left: 4px;
      top: 9px;
      width: 35px;
      height: 31px;
      background: #d7bfa6;
      border-radius: 11px 11px 13px 13px;
      box-shadow: inset -7px 0 0 #7a5b52;
    }

    .cat-head::before,
    .cat-head::after {
      content: "";
      position: absolute;
      top: -8px;
      width: 14px;
      height: 14px;
      background: #d7bfa6;
      transform: rotate(45deg);
    }

    .cat-head::before {
      left: 3px;
    }

    .cat-head::after {
      right: 3px;
      background: #7a5b52;
    }

    .cat-eyes {
      position: absolute;
      left: 10px;
      top: 16px;
      width: 5px;
      height: 5px;
      background: #1f2533;
      box-shadow: 13px 0 0 #1f2533;
    }

    .cat-tail {
      position: absolute;
      right: 0;
      top: 14px;
      width: 18px;
      height: 10px;
      border-top: 5px solid #7a5b52;
      border-right: 5px solid #7a5b52;
      border-radius: 0 12px 0 0;
    }

    .memory-note {
      position: absolute;
      right: 34px;
      bottom: 32px;
      z-index: 20;
      max-width: 220px;
      padding: 15px 16px;
      color: rgba(247, 234, 211, 0.74);
      background: rgba(5, 11, 22, 0.44);
      border: 1px solid rgba(247, 234, 211, 0.14);
      line-height: 1.7;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }

    .petal {
      position: absolute;
      width: 12px;
      height: 7px;
      background: #d98ea5;
      border-radius: 10px 0 10px 0;
      opacity: 0.72;
      image-rendering: pixelated;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% {
        transform: translate3d(0, -8vh, 0) rotate(0deg);
        opacity: 0;
      }

      12% {
        opacity: 0.72;
      }

      100% {
        transform: translate3d(var(--drift), 105vh, 0) rotate(260deg);
        opacity: 0;
      }
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 7vw;
      color: rgba(247, 234, 211, 0.56);
      background: rgba(5, 11, 22, 0.45);
      border-top: 1px solid rgba(247, 234, 211, 0.1);
      backdrop-filter: blur(8px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .footer-links {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(20px);
      z-index: 100;
      padding: 14px 22px;
      color: var(--cream);
      background: rgba(7, 15, 30, 0.94);
      border: 2px solid rgba(247, 234, 211, 0.22);
      box-shadow: 0 16px 42px rgba(0,0,0,0.34);
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1040px) {
      .nav {
        display: none;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 42px 24px 100px;
      }

      .hero-copy {
        max-width: none;
      }

      .scene-card {
        min-height: 560px;
      }

      .header {
        padding: 24px 24px 0;
      }

      .moon {
        right: 8vw;
        top: 140px;
        width: 88px;
        height: 88px;
      }

      .footer {
        position: relative;
        flex-direction: column;
        align-items: flex-start;
        padding: 18px 24px;
      }
    }

    @media (max-width: 640px) {
      .brand-title {
        font-size: 20px;
      }

      .hero h1 {
        font-size: 42px;
      }

      .hero-desc {
        font-size: 15px;
      }

      .hero-actions {
        display: grid;
      }

      .pixel-button {
        width: 100%;
      }

      .hero-meta {
        grid-template-columns: 1fr;
      }

      .scene-card {
        min-height: 470px;
      }

      .big-tree {
        right: -132px;
        transform: scale(0.78);
        transform-origin: bottom right;
      }

      .tomb-wrap {
        left: 45%;
        bottom: 74px;
        transform: translateX(-50%) scale(0.78);
      }

      .memory-note {
        display: none;
      }

      .scene-label {
        left: 22px;
        top: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="stars" id="stars"></div>
    <div class="petals" id="petals"></div>
    <div class="moon" aria-hidden="true"></div>
    <div class="mist" aria-hidden="true"></div>

    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <span class="brand-title">宠物纪念园</span>
          <span class="brand-subtitle">珍藏每一次相遇</span>
        </span>
      </a>

      <nav class="nav" aria-label="主导航">
        <a class="active" href="index.html">首页</a>
        <a href="#" id="navGarden">纪念园</a>
        <a href="create.html">创建纪念</a>
        <a href="#" data-soon="故事页面后面制作">故事</a>
        <button class="nav-action" type="button" data-soon="登录功能后面再接">登录</button>
      </nav>
    </header>

    <section class="hero">
      <section class="hero-copy">
        <div class="eyebrow">
          <span class="eyebrow-dot"></span>
          <span>一座安静的像素纪念花园</span>
        </div>

        <h1>
          把爱留在
          <span>温柔的夜色里</span>
        </h1>

        <p class="hero-desc">
          为离开的爱宠建立一座小小纪念馆。
          写下名字、故事和想说的话，让回忆被安放，也让思念有一个可以回来的地方。
        </p>

        <div class="hero-actions">
          <button class="pixel-button primary" type="button" id="enterGarden">
            <span class="button-icon">▣</span>
            进入纪念园
          </button>

          <button class="pixel-button secondary" type="button" id="createMemorial">
            <span class="button-icon">✿</span>
            开始创建
          </button>
        </div>

        <div class="hero-meta">
          <div class="meta-card">
            <strong>01</strong>
            <span>写下名字</span>
          </div>

          <div class="meta-card">
            <strong>02</strong>
            <span>选择墓碑</span>
          </div>

          <div class="meta-card">
            <strong>03</strong>
            <span>留下花瓣</span>
          </div>
        </div>

        <div class="language-wrap">
          <span>语言</span>
          <select class="language-select" id="languageSelect" aria-label="选择语言">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </section>

      <section class="scene-card" aria-label="首页像素纪念园插画">
        <div class="scene-label">今晚也有人轻轻想起它</div>

        <div class="scene">
          <div class="scene-hill one"></div>
          <div class="scene-hill two"></div>
          <div class="scene-hill three"></div>
          <div class="scene-ground"></div>

          <div class="scene-path" aria-hidden="true">
            <span class="step s1"></span>
            <span class="step s2"></span>
            <span class="step s3"></span>
            <span class="step s4"></span>
            <span class="step s5"></span>
          </div>

          <div class="big-tree" aria-hidden="true">
            <div class="tree-trunk"></div>
            <div class="branch b1"></div>
            <div class="branch b2"></div>
            <div class="branch b3"></div>
            <div class="branch b4"></div>
            <div class="leaf-cluster c1"></div>
            <div class="leaf-cluster c2"></div>
            <div class="leaf-cluster c3"></div>
            <div class="leaf-cluster c4"></div>
            <div class="leaf-cluster c5"></div>
          </div>

          <div class="tomb-wrap">
            <div class="tomb">
              <div class="stone-paw"></div>
              <div class="stone-text">
                <strong>小橘</strong>
                <span>2012 - 2023</span>
                <div class="stone-heart">♥</div>
              </div>
            </div>

            <div class="lantern"></div>

            <div class="flower-bed">
              <span class="flower f1"></span>
              <span class="flower f2"></span>
              <span class="flower f3"></span>
            </div>

            <div class="cat">
              <div class="cat-tail"></div>
              <div class="cat-body"></div>
              <div class="cat-head">
                <div class="cat-eyes"></div>
              </div>
            </div>
          </div>

          <div class="memory-note">
            这里没有喧闹的告别，只有一盏灯、一片花瓣，和还没有说完的话。
          </div>
        </div>
      </section>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="#" data-soon="关于我们页面后面制作">关于我们</a>
        <a href="#" data-soon="使用条款后面制作">使用条款</a>
        <a href="#" data-soon="隐私政策后面制作">隐私政策</a>
        <a href="#" data-soon="帮助中心后面制作">帮助中心</a>
      </div>

      <div>♥ 用爱延续每一段陪伴</div>
    </footer>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stars = document.getElementById("stars");
    const petals = document.getElementById("petals");
    const toast = document.getElementById("toast");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars() {
      const count = 58;

      for (let i = 0; i < count; i += 1) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${random(4, 96)}%`;
        star.style.top = `${random(7, 62)}%`;
        star.style.animationDelay = `${random(0, 4)}s`;
        star.style.transform = `scale(${random(0.55, 1.15)})`;
        stars.appendChild(star);
      }
    }

    function createPetals() {
      const count = 18;

      for (let i = 0; i < count; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = `${random(8, 94)}%`;
        petal.style.top = `${random(-28, 36)}%`;
        petal.style.setProperty("--drift", `${random(-90, 90)}px`);
        petal.style.animationDuration = `${random(13, 24)}s`;
        petal.style.animationDelay = `${random(0, 16)}s`;
        petals.appendChild(petal);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", () => {
      openGarden();
    });

    document.getElementById("navGarden").addEventListener("click", (event) => {
      event.preventDefault();
      openGarden();
    });

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.querySelectorAll("[data-soon]").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(item.dataset.soon);
      });
    });

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      const value = event.target.value;
      localStorage.setItem("petMemorialLanguage", value);
      showToast("语言选择已保存");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage");
    if (savedLanguage) {
      document.getElementById("languageSelect").value = savedLanguage;
    }

    createStars();
    createPetals();
  </script>
</body>
</html>
