<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    :root {
      --night-1: #071326;
      --night-2: #0d1d38;
      --night-3: #172b4f;
      --cream: #f6ead6;
      --cream-2: #fff8ec;
      --gold: #f4d7a6;
      --lavender: #b8a7d8;
      --pink: #e7a9b9;
      --blue-soft: #94aeca;
      --green-soft: #8fa88d;
      --text: #f7efe2;
      --muted: #b9c0d1;
      --dark-panel: rgba(9, 20, 39, 0.72);
      --line: rgba(255, 236, 205, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      background: #06101f;
      color: var(--text);
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 18%, rgba(214, 201, 162, 0.18), transparent 13%),
        linear-gradient(180deg, var(--night-1) 0%, var(--night-2) 48%, #101f32 100%);
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff6d6;
      box-shadow:
        4px 0 #fff6d6,
        0 4px #fff6d6,
        4px 4px #fff6d6;
      opacity: 0.75;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.35;
        transform: scale(0.8);
      }

      50% {
        opacity: 0.95;
        transform: scale(1);
      }
    }

    .moon {
      position: absolute;
      right: 17%;
      top: 13%;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #fff9d8 0 10%, transparent 11%),
        radial-gradient(circle at 62% 42%, rgba(165, 150, 120, 0.28) 0 12%, transparent 13%),
        radial-gradient(circle at 43% 68%, rgba(150, 139, 116, 0.23) 0 10%, transparent 11%),
        #f6e8b6;
      box-shadow:
        0 0 0 5px rgba(255, 240, 187, 0.06),
        0 0 36px rgba(255, 236, 180, 0.38),
        0 0 90px rgba(194, 189, 255, 0.16);
      image-rendering: pixelated;
      z-index: 2;
    }

    .cloud {
      position: absolute;
      height: 38px;
      opacity: 0.25;
      filter: blur(0.2px);
      z-index: 2;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      bottom: 0;
      background: #667a9f;
      image-rendering: pixelated;
    }

    .cloud::before {
      width: 170px;
      height: 22px;
      left: 0;
      box-shadow:
        22px -16px 0 #667a9f,
        62px -24px 0 #667a9f,
        102px -10px 0 #667a9f;
    }

    .cloud::after {
      width: 88px;
      height: 12px;
      left: 118px;
      bottom: 0;
      background: #6d82aa;
    }

    .cloud.one {
      top: 24%;
      left: 37%;
      transform: scale(0.95);
    }

    .cloud.two {
      top: 38%;
      left: 8%;
      transform: scale(0.75);
    }

    .cloud.three {
      top: 32%;
      right: 22%;
      transform: scale(0.65);
    }

    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 30px 7vw 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      position: relative;
      image-rendering: pixelated;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 16px;
      width: 16px;
      height: 14px;
      background: var(--cream);
      box-shadow:
        -8px -10px 0 -2px var(--cream),
        9px -10px 0 -2px var(--cream),
        -14px 0 0 -3px var(--cream),
        15px 0 0 -3px var(--cream),
        0 12px 0 -5px var(--cream);
      border-radius: 4px;
    }

    .brand-text {
      line-height: 1.15;
    }

    .brand-title {
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--cream);
      font-weight: 700;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
    }

    .brand-subtitle {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(246, 234, 214, 0.58);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 34px;
      color: rgba(255, 248, 236, 0.78);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: var(--cream);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      bottom: -5px;
      height: 3px;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(244, 215, 166, 0.55);
    }

    .nav-action {
      padding: 9px 18px;
      border: 2px solid rgba(246, 234, 214, 0.28);
      background: rgba(6, 14, 27, 0.35);
      color: var(--cream);
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .hero {
      position: relative;
      z-index: 5;
      min-height: calc(100vh - 72px);
      display: grid;
      grid-template-columns: minmax(360px, 0.9fr) minmax(480px, 1.1fr);
      align-items: center;
      gap: 40px;
      padding: 60px 7vw 92px;
    }

    .welcome-card {
      position: relative;
      max-width: 500px;
      padding: 52px 48px 44px;
      background:
        linear-gradient(180deg, rgba(255, 249, 235, 0.97), rgba(246, 234, 214, 0.94));
      color: #25304a;
      border: 4px solid rgba(255, 255, 255, 0.56);
      box-shadow:
        0 0 0 2px rgba(35, 43, 65, 0.25),
        0 22px 60px rgba(0, 0, 0, 0.28);
      image-rendering: pixelated;
    }

    .welcome-card::before,
    .welcome-card::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: rgba(64, 59, 72, 0.25);
      border-style: solid;
    }

    .welcome-card::before {
      top: 16px;
      left: 16px;
      border-width: 3px 0 0 3px;
    }

    .welcome-card::after {
      right: 16px;
      bottom: 16px;
      border-width: 0 3px 3px 0;
    }

    .card-emblem {
      width: 66px;
      height: 42px;
      margin: 0 auto 28px;
      position: relative;
      opacity: 0.55;
    }

    .card-emblem::before {
      content: "⌾";
      position: absolute;
      inset: 0;
      text-align: center;
      font-size: 38px;
      line-height: 42px;
      color: #796f62;
    }

    .welcome-card h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(32px, 4vw, 44px);
      letter-spacing: 2px;
      color: #22283c;
      font-weight: 700;
    }

    .welcome-card .tagline {
      margin: 18px 0 0;
      text-align: center;
      color: #766f70;
      font-size: 17px;
      letter-spacing: 1px;
    }

    .small-divider {
      width: 170px;
      height: 1px;
      background: rgba(50, 44, 55, 0.18);
      margin: 26px auto;
      position: relative;
    }

    .small-divider::after {
      content: "♥";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 0 12px;
      background: var(--cream-2);
      color: #c98b9a;
      font-size: 13px;
    }

    .welcome-card p {
      text-align: center;
      color: #5f6575;
      line-height: 1.9;
      font-size: 15px;
      margin: 0 0 30px;
    }

    .button-stack {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .pixel-button {
      position: relative;
      min-height: 58px;
      border: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 26px;
      font-weight: 700;
      letter-spacing: 2px;
      transition: transform 0.15s ease, filter 0.15s ease;
      image-rendering: pixelated;
    }

    .pixel-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .pixel-button:active {
      transform: translateY(1px);
    }

    .pixel-button.primary {
      background: #152846;
      color: var(--cream);
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.07),
        6px 6px 0 rgba(19, 25, 42, 0.26);
    }

    .pixel-button.secondary {
      background: rgba(255, 255, 255, 0.38);
      color: #2f3854;
      box-shadow:
        inset 0 0 0 3px rgba(47, 56, 84, 0.15),
        6px 6px 0 rgba(47, 56, 84, 0.09);
    }

    .button-left {
      display: flex;
      align-items: center;
      gap: 13px;
      font-size: 20px;
    }

    .button-icon {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      font-size: 20px;
    }

    .lang-row {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    .language-select {
      min-width: 160px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.36);
      border: 2px solid rgba(47, 56, 84, 0.16);
      color: #3e465e;
      outline: none;
    }

    .garden {
      position: relative;
      min-height: 550px;
      align-self: stretch;
    }

    .ground {
      position: absolute;
      left: -5%;
      right: -12%;
      bottom: 0;
      height: 56%;
      background:
        radial-gradient(ellipse at 68% 72%, rgba(246, 204, 119, 0.18), transparent 26%),
        radial-gradient(ellipse at 47% 58%, rgba(143, 168, 141, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(35, 73, 74, 0.08), #173028 45%, #10251f 100%);
      border-radius: 60% 40% 0 0 / 24% 18% 0 0;
      box-shadow: 0 -40px 80px rgba(9, 17, 33, 0.2);
      z-index: 2;
    }

    .hill {
      position: absolute;
      bottom: 36%;
      height: 160px;
      background: rgba(39, 63, 79, 0.52);
      border-radius: 50% 50% 0 0;
      z-index: 1;
    }

    .hill.one {
      left: -5%;
      width: 45%;
      bottom: 35%;
    }

    .hill.two {
      left: 20%;
      width: 50%;
      bottom: 33%;
      background: rgba(49, 74, 89, 0.42);
    }

    .hill.three {
      right: -14%;
      width: 62%;
      bottom: 36%;
      background: rgba(38, 58, 77, 0.55);
    }

    .path {
      position: absolute;
      left: 8%;
      bottom: 7%;
      width: 70%;
      height: 35%;
      z-index: 3;
      transform: perspective(320px) rotateX(58deg) rotateZ(-8deg);
      transform-origin: bottom center;
    }

    .stone-step {
      position: absolute;
      width: 84px;
      height: 28px;
      background: #5d6579;
      border: 3px solid rgba(255, 255, 255, 0.12);
      box-shadow: 5px 5px 0 rgba(10, 16, 30, 0.35);
      opacity: 0.82;
    }

    .stone-step.s1 { left: 15%; bottom: 6%; }
    .stone-step.s2 { left: 31%; bottom: 16%; width: 100px; }
    .stone-step.s3 { left: 47%; bottom: 30%; width: 118px; }
    .stone-step.s4 { left: 61%; bottom: 47%; width: 132px; }
    .stone-step.s5 { left: 72%; bottom: 66%; width: 112px; }

    .tree {
      position: absolute;
      right: -2%;
      bottom: 20%;
      width: 240px;
      height: 360px;
      z-index: 5;
      pointer-events: none;
    }

    .trunk {
      position: absolute;
      right: 78px;
      bottom: 0;
      width: 54px;
      height: 246px;
      background:
        linear-gradient(90deg, #2a1f24, #54363b 45%, #241b22);
      box-shadow:
        -14px 42px 0 #2b2027,
        18px 86px 0 #3b2930;
      transform: skewX(-7deg);
    }

    .branch {
      position: absolute;
      background: #3c2931;
      height: 22px;
      transform-origin: left center;
    }

    .branch.b1 {
      width: 170px;
      right: 34px;
      top: 92px;
      transform: rotate(-23deg);
    }

    .branch.b2 {
      width: 120px;
      right: 104px;
      top: 146px;
      transform: rotate(-48deg);
    }

    .branch.b3 {
      width: 130px;
      right: 20px;
      top: 170px;
      transform: rotate(18deg);
    }

    .blossom {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #8d659f;
      box-shadow:
        18px 0 #a77ab1,
        -18px 0 #735789,
        0 18px #b784b0,
        0 -18px #8e6aaa,
        36px 18px #956ca7,
        -36px 20px #694f82,
        16px -34px #b181b6;
      opacity: 0.9;
    }

    .blossom.c1 { right: 8px; top: 54px; }
    .blossom.c2 { right: 84px; top: 30px; transform: scale(1.2); }
    .blossom.c3 { right: 122px; top: 94px; transform: scale(1.1); }
    .blossom.c4 { right: 20px; top: 134px; transform: scale(0.9); }
    .blossom.c5 { right: 150px; top: 145px; transform: scale(0.8); }

    .tomb-area {
      position: absolute;
      right: 18%;
      bottom: 17%;
      width: 230px;
      height: 300px;
      z-index: 6;
    }

    .tombstone {
      position: absolute;
      left: 32px;
      bottom: 52px;
      width: 155px;
      height: 210px;
      background:
        radial-gradient(circle at 40% 28%, rgba(255, 255, 255, 0.18), transparent 8%),
        linear-gradient(90deg, #6e7182, #8a8b98 46%, #5c6375);
      border: 5px solid rgba(27, 31, 45, 0.55);
      border-radius: 74px 74px 8px 8px;
      box-shadow:
        inset 9px 0 0 rgba(255, 255, 255, 0.1),
        inset -10px -8px 0 rgba(0, 0, 0, 0.12),
        12px 12px 0 rgba(5, 12, 24, 0.32);
    }

    .tombstone::before {
      content: "";
      position: absolute;
      left: -12px;
      right: -12px;
      bottom: -28px;
      height: 30px;
      background: #62697c;
      border: 4px solid rgba(27, 31, 45, 0.5);
      box-shadow: inset 5px 5px 0 rgba(255, 255, 255, 0.08);
    }

    .paw-on-stone {
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
      width: 42px;
      height: 36px;
    }

    .paw-on-stone::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 15px;
      width: 20px;
      height: 17px;
      background: rgba(39, 45, 62, 0.75);
      border-radius: 8px 8px 7px 7px;
      box-shadow:
        -9px -9px 0 -4px rgba(39, 45, 62, 0.75),
        9px -9px 0 -4px rgba(39, 45, 62, 0.75),
        -16px 2px 0 -5px rgba(39, 45, 62, 0.75),
        17px 2px 0 -5px rgba(39, 45, 62, 0.75);
    }

    .stone-text {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 92px;
      text-align: center;
      color: rgba(24, 31, 48, 0.82);
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.18);
    }

    .pet-name {
      display: block;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .pet-years {
      display: block;
      font-size: 14px;
      letter-spacing: 1px;
      line-height: 1.7;
    }

    .heart-mark {
      margin-top: 12px;
      color: rgba(34, 37, 54, 0.8);
      font-size: 14px;
    }

    .lantern {
      position: absolute;
      left: -6px;
      bottom: 30px;
      width: 54px;
      height: 74px;
      background: #2f2730;
      border: 4px solid #1a1720;
      z-index: 7;
      box-shadow:
        0 0 38px rgba(255, 192, 96, 0.55),
        0 0 90px rgba(255, 192, 96, 0.2);
    }

    .lantern::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 12px;
      bottom: 12px;
      background:
        radial-gradient(circle, #fff4b7 0 20%, #ffc15f 21% 48%, rgba(255, 193, 95, 0.1) 49%);
      box-shadow: inset 0 0 0 3px rgba(60, 39, 24, 0.32);
    }

    .lantern::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: -16px;
      height: 14px;
      border: 4px solid #1a1720;
      border-bottom: 0;
    }

    .flower-bed {
      position: absolute;
      left: 125px;
      bottom: 36px;
      width: 94px;
      height: 62px;
      z-index: 8;
    }

    .flower {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #e9d4d6;
      box-shadow:
        12px 0 #c88aa2,
        0 12px #dfadc5,
        12px 12px #f2e8d8;
    }

    .flower.f1 { left: 0; bottom: 14px; }
    .flower.f2 { left: 32px; bottom: 28px; transform: scale(0.9); }
    .flower.f3 { left: 58px; bottom: 8px; transform: scale(1.15); }

    .grass {
      position: absolute;
      bottom: 0;
      width: 8px;
      height: 44px;
      background: #4f7b61;
      box-shadow:
        10px 10px 0 #719a72,
        22px 1px 0 #385f4d,
        35px 16px 0 #719a72,
        46px 3px 0 #4c7660,
        59px 12px 0 #5f8d69;
      transform: skewX(-9deg);
      opacity: 0.85;
    }

    .grass.g1 { left: 8%; bottom: 10%; }
    .grass.g2 { left: 26%; bottom: 14%; transform: scale(0.8) skewX(10deg); }
    .grass.g3 { right: 8%; bottom: 12%; transform: scale(1.1) skewX(-7deg); }

    .hidden-pet {
      position: absolute;
      right: 6%;
      bottom: 15%;
      width: 62px;
      height: 48px;
      z-index: 9;
      opacity: 0.88;
      transform: translateY(6px);
      transition: transform 0.25s ease;
    }

    .hidden-pet:hover {
      transform: translateY(0);
    }

    .pet-head {
      position: absolute;
      left: 8px;
      top: 6px;
      width: 42px;
      height: 36px;
      background: #d8c0a8;
      border-radius: 12px 12px 14px 14px;
      box-shadow:
        inset -8px 0 0 #7a5b52,
        0 5px 0 rgba(0,0,0,0.18);
    }

    .pet-head::before,
    .pet-head::after {
      content: "";
      position: absolute;
      top: -9px;
      width: 16px;
      height: 16px;
      background: #d8c0a8;
      transform: rotate(45deg);
    }

    .pet-head::before {
      left: 2px;
    }

    .pet-head::after {
      right: 2px;
      background: #7a5b52;
    }

    .pet-eyes {
      position: absolute;
      left: 12px;
      top: 17px;
      width: 5px;
      height: 5px;
      background: #1e2431;
      box-shadow: 16px 0 0 #1e2431;
    }

    .pet-nose {
      position: absolute;
      left: 20px;
      top: 25px;
      width: 5px;
      height: 4px;
      background: #2d2730;
    }

    .pet-hint {
      position: absolute;
      right: 7%;
      bottom: 10%;
      z-index: 9;
      font-size: 12px;
      color: rgba(246, 234, 214, 0.55);
      letter-spacing: 1px;
    }

    .petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 12;
    }

    .petal {
      position: absolute;
      width: 12px;
      height: 7px;
      background: #dd91aa;
      opacity: 0.78;
      border-radius: 10px 0 10px 0;
      animation: fall linear infinite;
      image-rendering: pixelated;
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, -8vh, 0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.85;
      }

      100% {
        transform: translate3d(var(--drift), 105vh, 0) rotate(260deg);
        opacity: 0;
      }
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 18px 7vw;
      background: rgba(5, 12, 25, 0.42);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(246, 234, 214, 0.62);
      font-size: 13px;
      letter-spacing: 1px;
      backdrop-filter: blur(8px);
    }

    .footer-links {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(20px);
      padding: 14px 22px;
      background: rgba(8, 17, 33, 0.92);
      color: var(--cream);
      border: 2px solid rgba(246, 234, 214, 0.22);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 99;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .header {
        padding: 22px 22px 0;
      }

      .nav {
        display: none;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 38px 22px 100px;
      }

      .welcome-card {
        max-width: none;
        padding: 38px 26px 32px;
      }

      .garden {
        min-height: 470px;
      }

      .moon {
        right: 8%;
        top: 42%;
        width: 82px;
        height: 82px;
      }

      .tomb-area {
        right: 19%;
        transform: scale(0.9);
      }

      .footer {
        position: relative;
        flex-direction: column;
        align-items: flex-start;
        padding: 18px 22px;
      }
    }

    @media (max-width: 620px) {
      .brand-title {
        font-size: 20px;
      }

      .welcome-card h1 {
        font-size: 30px;
      }

      .button-left {
        font-size: 17px;
      }

      .garden {
        min-height: 390px;
      }

      .tree {
        right: -90px;
        transform: scale(0.75);
        transform-origin: bottom right;
      }

      .tomb-area {
        right: 8%;
        bottom: 13%;
        transform: scale(0.72);
      }

      .hidden-pet,
      .pet-hint {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="stars" id="stars"></div>

    <div class="moon" aria-hidden="true"></div>
    <div class="cloud one" aria-hidden="true"></div>
    <div class="cloud two" aria-hidden="true"></div>
    <div class="cloud three" aria-hidden="true"></div>

    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-title">宠物纪念园</span>
          <span class="brand-subtitle">珍藏每一次相遇</span>
        </span>
      </a>

      <nav class="nav" aria-label="主导航">
        <a class="active" href="index.html">首页</a>
        <a href="#" id="navGarden">纪念园</a>
        <a href="create.html">创建纪念</a>
        <a href="#" data-soon="故事页面后面制作">故事</a>
        <button class="nav-action" type="button" data-soon="登录功能后面再接">登录</button>
      </nav>
    </header>

    <section class="hero">
      <section class="welcome-card" aria-label="欢迎区域">
        <div class="card-emblem" aria-hidden="true"></div>

        <h1>欢迎来到宠物纪念园</h1>

        <p class="tagline">铭记爱与陪伴 · 思念从未离开</p>

        <div class="small-divider" aria-hidden="true"></div>

        <p>
          这是一个为爱宠而设的宁静空间，<br />
          在这里，回忆被温柔珍藏，思念得以安放。
        </p>

        <div class="button-stack">
          <button class="pixel-button primary" type="button" id="enterGarden">
            <span class="button-left">
              <span class="button-icon">▣</span>
              进入纪念园
            </span>
            <span>›</span>
          </button>

          <button class="pixel-button secondary" type="button" id="createMemorial">
            <span class="button-left">
              <span class="button-icon">✿</span>
              开始创建
            </span>
            <span>›</span>
          </button>
        </div>

        <div class="lang-row">
          <select class="language-select" id="languageSelect" aria-label="选择语言">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </section>

      <section class="garden" aria-label="像素纪念园夜景">
        <div class="hill one"></div>
        <div class="hill two"></div>
        <div class="hill three"></div>

        <div class="ground"></div>

        <div class="path" aria-hidden="true">
          <span class="stone-step s1"></span>
          <span class="stone-step s2"></span>
          <span class="stone-step s3"></span>
          <span class="stone-step s4"></span>
          <span class="stone-step s5"></span>
        </div>

        <div class="tree" aria-hidden="true">
          <div class="trunk"></div>
          <div class="branch b1"></div>
          <div class="branch b2"></div>
          <div class="branch b3"></div>
          <div class="blossom c1"></div>
          <div class="blossom c2"></div>
          <div class="blossom c3"></div>
          <div class="blossom c4"></div>
          <div class="blossom c5"></div>
        </div>

        <div class="tomb-area">
          <div class="tombstone">
            <div class="paw-on-stone"></div>
            <div class="stone-text">
              <span class="pet-name">小橘</span>
              <span class="pet-years">2012 - 2023</span>
              <div class="heart-mark">♥</div>
            </div>
          </div>

          <div class="lantern" aria-hidden="true"></div>

          <div class="flower-bed" aria-hidden="true">
            <span class="flower f1"></span>
            <span class="flower f2"></span>
            <span class="flower f3"></span>
          </div>
        </div>

        <div class="grass g1" aria-hidden="true"></div>
        <div class="grass g2" aria-hidden="true"></div>
        <div class="grass g3" aria-hidden="true"></div>

        <div class="hidden-pet" title="一只小猫悄悄躲在这里">
          <div class="pet-head">
            <div class="pet-eyes"></div>
            <div class="pet-nose"></div>
          </div>
        </div>

        <div class="pet-hint">小猫躲在花丛里</div>
      </section>
    </section>

    <div class="petals" id="petals"></div>

    <footer class="footer">
      <div class="footer-links">
        <a href="#" data-soon="关于我们页面后面制作">关于我们</a>
        <a href="#" data-soon="使用条款后面制作">使用条款</a>
        <a href="#" data-soon="隐私政策后面制作">隐私政策</a>
        <a href="#" data-soon="帮助中心后面制作">帮助中心</a>
      </div>
      <div>♥ 用爱延续每一段陪伴</div>
    </footer>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stars = document.getElementById("stars");
    const petals = document.getElementById("petals");
    const toast = document.getElementById("toast");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars() {
      const count = 46;

      for (let i = 0; i < count; i += 1) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${random(4, 96)}%`;
        star.style.top = `${random(8, 58)}%`;
        star.style.animationDelay = `${random(0, 4)}s`;
        star.style.transform = `scale(${random(0.55, 1.1)})`;
        stars.appendChild(star);
      }
    }

    function createPetals() {
      const count = 20;

      for (let i = 0; i < count; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = `${random(8, 95)}%`;
        petal.style.top = `${random(-30, 40)}%`;
        petal.style.setProperty("--drift", `${random(-80, 80)}px`);
        petal.style.animationDuration = `${random(12, 22)}s`;
        petal.style.animationDelay = `${random(0, 16)}s`;
        petals.appendChild(petal);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", () => {
      openGarden();
    });

    document.getElementById("navGarden").addEventListener("click", (event) => {
      event.preventDefault();
      openGarden();
    });

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.querySelectorAll("[data-soon]").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(item.dataset.soon);
      });
    });

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      const value = event.target.value;
      localStorage.setItem("petMemorialLanguage", value);
      showToast("语言选择已保存，后面页面会继续使用");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage");
    if (savedLanguage) {
      document.getElementById("languageSelect").value = savedLanguage;
    }

    createStars();
    createPetals();
  </script>
</body>
</html>
