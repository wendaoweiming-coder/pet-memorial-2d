<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    :root {
      --bg-deep: #060b15;
      --bg-night: #0b1628;
      --bg-blue: #12243a;
      --cream: #f7ead4;
      --cream-soft: rgba(247, 234, 212, 0.72);
      --cream-faint: rgba(247, 234, 212, 0.46);
      --gold: #e8c98e;
      --rose: #d99caf;
      --purple: #9c87bd;
      --green: #6f8f75;
      --panel: rgba(255, 248, 232, 0.92);
      --panel-text: #222941;
      --panel-muted: #6f7280;
      --glass: rgba(255, 255, 255, 0.07);
      --glass-line: rgba(255, 245, 220, 0.16);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      color: var(--cream);
      background: var(--bg-deep);
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 68% 18%, rgba(232, 201, 142, 0.18), transparent 13%),
        radial-gradient(circle at 24% 80%, rgba(156, 135, 189, 0.16), transparent 24%),
        linear-gradient(180deg, #050914 0%, #0b1628 48%, #102335 100%);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 7px 7px;
      opacity: 0.42;
      pointer-events: none;
      z-index: 1;
    }

    .soft-glow {
      position: absolute;
      left: 54%;
      top: 16%;
      width: 460px;
      height: 460px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 201, 142, 0.15), transparent 62%);
      filter: blur(8px);
      pointer-events: none;
      z-index: 1;
    }

    .stars,
    .petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 2;
    }

    .petals {
      z-index: 20;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 244, 205, 0.9);
      box-shadow:
        3px 0 rgba(255, 244, 205, 0.9),
        0 3px rgba(255, 244, 205, 0.9),
        3px 3px rgba(255, 244, 205, 0.9);
      opacity: 0.68;
      image-rendering: pixelated;
      animation: starBlink 4.8s ease-in-out infinite;
    }

    @keyframes starBlink {
      0%, 100% {
        opacity: 0.25;
        transform: scale(0.75);
      }

      50% {
        opacity: 0.9;
        transform: scale(1);
      }
    }

    .moon {
      position: absolute;
      right: 15vw;
      top: 104px;
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 34%, rgba(255,255,255,0.72) 0 8%, transparent 9%),
        radial-gradient(circle at 64% 45%, rgba(126,108,82,0.22) 0 12%, transparent 13%),
        radial-gradient(circle at 44% 69%, rgba(126,108,82,0.18) 0 10%, transparent 11%),
        #f2dfaa;
      box-shadow:
        0 0 0 8px rgba(242, 223, 170, 0.045),
        0 0 38px rgba(242, 223, 170, 0.34),
        0 0 110px rgba(171, 160, 255, 0.16);
      z-index: 2;
      image-rendering: pixelated;
    }

    .mist {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: 28%;
      height: 150px;
      background:
        linear-gradient(90deg, transparent, rgba(190, 200, 225, 0.07), transparent),
        linear-gradient(180deg, transparent, rgba(190, 200, 225, 0.06), transparent);
      filter: blur(14px);
      z-index: 2;
    }

    .header {
      position: relative;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 7vw 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      position: relative;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(247, 234, 212, 0.18);
      background: rgba(255, 255, 255, 0.055);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 14px 32px rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 16px;
      width: 16px;
      height: 14px;
      background: var(--cream);
      border-radius: 5px;
      box-shadow:
        -8px -10px 0 -2px var(--cream),
        9px -10px 0 -2px var(--cream),
        -14px 0 0 -3px var(--cream),
        15px 0 0 -3px var(--cream),
        0 12px 0 -5px var(--cream);
    }

    .brand-title {
      display: block;
      color: var(--cream);
      font-size: 23px;
      font-weight: 800;
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 3px 0 rgba(0,0,0,0.22);
    }

    .brand-subtitle {
      display: block;
      margin-top: 7px;
      color: rgba(247, 234, 212, 0.52);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 26px;
      color: rgba(247, 234, 212, 0.72);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: var(--cream);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: -5px;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(232, 201, 142, 0.58);
    }

    .nav-action {
      cursor: pointer;
      color: var(--cream);
      padding: 9px 18px;
      border: 1px solid rgba(247, 234, 212, 0.2);
      background: rgba(255, 255, 255, 0.055);
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
    }

    .hero {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 72px);
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(520px, 1.08fr);
      align-items: center;
      gap: 52px;
      padding: 58px 7vw 92px;
    }

    .copy {
      max-width: 560px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding: 9px 14px;
      color: rgba(247, 234, 212, 0.75);
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(247, 234, 212, 0.14);
      box-shadow: 0 14px 38px rgba(0,0,0,0.16);
      backdrop-filter: blur(8px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .eyebrow-icon {
      width: 8px;
      height: 8px;
      background: var(--gold);
      box-shadow:
        10px 0 0 rgba(217,156,175,0.9),
        20px 0 0 rgba(156,135,189,0.9);
    }

    .copy h1 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(42px, 5.4vw, 74px);
      line-height: 1.05;
      letter-spacing: 2px;
      text-shadow:
        0 5px 0 rgba(0,0,0,0.18),
        0 26px 76px rgba(0,0,0,0.46);
    }

    .copy h1 span {
      display: block;
      color: var(--gold);
    }

    .desc {
      max-width: 470px;
      margin: 24px 0 0;
      color: rgba(247, 234, 212, 0.72);
      font-size: 16px;
      line-height: 1.95;
    }

    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .pixel-button {
      min-height: 58px;
      cursor: pointer;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      padding: 0 25px;
      font-weight: 800;
      letter-spacing: 1.5px;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .pixel-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.05);
    }

    .pixel-button:active {
      transform: translateY(1px);
    }

    .pixel-button.primary {
      min-width: 188px;
      color: #20283f;
      background: var(--panel);
      box-shadow:
        inset 0 0 0 2px rgba(32,40,63,0.1),
        7px 7px 0 rgba(0,0,0,0.22),
        0 18px 48px rgba(0,0,0,0.26);
    }

    .pixel-button.secondary {
      min-width: 168px;
      color: var(--cream);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(247,234,212,0.24);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        7px 7px 0 rgba(0,0,0,0.16);
      backdrop-filter: blur(8px);
    }

    .button-icon {
      font-size: 18px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 470px;
      margin-top: 34px;
    }

    .step-card {
      min-height: 86px;
      padding: 15px 13px;
      background: rgba(255,255,255,0.048);
      border: 1px solid rgba(247,234,212,0.13);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.025),
        0 12px 34px rgba(0,0,0,0.16);
      backdrop-filter: blur(8px);
    }

    .step-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 18px;
    }

    .step-card span {
      color: rgba(247,234,212,0.58);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .language-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 26px;
      color: rgba(247,234,212,0.54);
      font-size: 13px;
    }

    .language-select {
      min-width: 150px;
      padding: 10px 14px;
      color: var(--cream);
      outline: none;
      border: 1px solid rgba(247,234,212,0.18);
      background: rgba(255,255,255,0.06);
    }

    .language-select option {
      color: var(--cream);
      background: #0b1628;
    }

    .showcase {
      position: relative;
      min-height: 660px;
    }

    .garden-frame {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 1px solid rgba(247, 234, 212, 0.18);
      background:
        radial-gradient(circle at 62% 26%, rgba(242, 223, 170, 0.09), transparent 18%),
        linear-gradient(180deg, rgba(18, 36, 58, 0.72), rgba(8, 20, 34, 0.84));
      box-shadow:
        0 34px 100px rgba(0,0,0,0.36),
        inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
    }

    .garden-frame::before,
    .garden-frame::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      z-index: 30;
      border-color: rgba(247, 234, 212, 0.22);
      border-style: solid;
    }

    .garden-frame::before {
      top: 18px;
      left: 18px;
      border-width: 2px 0 0 2px;
    }

    .garden-frame::after {
      right: 18px;
      bottom: 18px;
      border-width: 0 2px 2px 0;
    }

    .frame-label {
      position: absolute;
      left: 34px;
      top: 32px;
      z-index: 31;
      padding: 10px 14px;
      color: rgba(247,234,212,0.7);
      background: rgba(5, 11, 21, 0.38);
      border: 1px solid rgba(247,234,212,0.12);
      backdrop-filter: blur(8px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .horizon {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: 40%;
      height: 160px;
      z-index: 2;
    }

    .hill {
      position: absolute;
      bottom: 0;
      height: 145px;
      border-radius: 50% 50% 0 0;
      background: rgba(46, 73, 88, 0.5);
    }

    .hill.one {
      left: -10%;
      width: 50%;
    }

    .hill.two {
      left: 18%;
      width: 56%;
      bottom: -10px;
      background: rgba(49, 78, 91, 0.4);
    }

    .hill.three {
      right: -14%;
      width: 60%;
      background: rgba(38, 59, 76, 0.56);
    }

    .ground {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 0;
      height: 55%;
      z-index: 4;
      border-radius: 58% 42% 0 0 / 20% 18% 0 0;
      background:
        radial-gradient(ellipse at 50% 58%, rgba(232, 201, 142, 0.18), transparent 23%),
        radial-gradient(ellipse at 38% 66%, rgba(111, 143, 117, 0.24), transparent 28%),
        linear-gradient(180deg, rgba(33, 70, 64, 0.05), #16352b 42%, #0e241e 100%);
      box-shadow: 0 -34px 70px rgba(0,0,0,0.18);
    }

    .path {
      position: absolute;
      left: 13%;
      bottom: 3%;
      width: 68%;
      height: 38%;
      z-index: 5;
      transform: perspective(320px) rotateX(58deg) rotateZ(-7deg);
      transform-origin: bottom center;
    }

    .path span {
      position: absolute;
      display: block;
      height: 26px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(92, 102, 122, 0.9);
      box-shadow: 5px 5px 0 rgba(4, 9, 18, 0.33);
    }

    .path .p1 { left: 12%; bottom: 8%; width: 82px; }
    .path .p2 { left: 28%; bottom: 21%; width: 98px; }
    .path .p3 { left: 43%; bottom: 38%; width: 116px; }
    .path .p4 { left: 58%; bottom: 58%; width: 128px; }

    .tree {
      position: absolute;
      right: -54px;
      bottom: 118px;
      width: 280px;
      height: 380px;
      z-index: 9;
      pointer-events: none;
    }

    .trunk {
      position: absolute;
      right: 88px;
      bottom: 0;
      width: 54px;
      height: 252px;
      background:
        linear-gradient(90deg, #251b22, #52363b 48%, #21181f);
      box-shadow:
        -14px 46px 0 #2a1e25,
        18px 92px 0 #3a2930;
      transform: skewX(-6deg);
    }

    .branch {
      position: absolute;
      height: 20px;
      background: #3a2830;
      transform-origin: left center;
    }

    .branch.b1 {
      width: 178px;
      right: 40px;
      top: 96px;
      transform: rotate(-22deg);
    }

    .branch.b2 {
      width: 130px;
      right: 118px;
      top: 152px;
      transform: rotate(-48deg);
    }

    .branch.b3 {
      width: 142px;
      right: 20px;
      top: 178px;
      transform: rotate(17deg);
    }

    .leaf {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #80619a;
      box-shadow:
        18px 0 #a17ab4,
        -18px 0 #675381,
        0 18px #b187b8,
        0 -18px #9270ac,
        36px 18px #8f6ba7,
        -36px 18px #665181,
        18px -36px #b188bc;
      opacity: 0.88;
    }

    .leaf.l1 { right: 8px; top: 56px; }
    .leaf.l2 { right: 88px; top: 30px; transform: scale(1.14); }
    .leaf.l3 { right: 138px; top: 98px; transform: scale(1.02); }
    .leaf.l4 { right: 24px; top: 142px; transform: scale(0.92); }

    .tomb-zone {
      position: absolute;
      left: 48%;
      bottom: 118px;
      width: 280px;
      height: 360px;
      transform: translateX(-50%);
      z-index: 14;
    }

    .tomb {
      position: absolute;
      left: 50%;
      bottom: 68px;
      width: 168px;
      height: 226px;
      transform: translateX(-50%);
      border: 4px solid rgba(25, 31, 47, 0.62);
      border-radius: 82px 82px 10px 10px;
      background:
        radial-gradient(circle at 42% 28%, rgba(255,255,255,0.16), transparent 8%),
        linear-gradient(90deg, #687083, #8d8d98 48%, #596176);
      box-shadow:
        inset 9px 0 0 rgba(255,255,255,0.1),
        inset -10px -8px 0 rgba(0,0,0,0.13),
        14px 14px 0 rgba(5, 11, 22, 0.3);
    }

    .tomb::before {
      content: "";
      position: absolute;
      left: -14px;
      right: -14px;
      bottom: -30px;
      height: 32px;
      background: #606a7d;
      border: 4px solid rgba(25, 31, 47, 0.52);
      box-shadow: inset 5px 5px 0 rgba(255,255,255,0.08);
    }

    .paw {
      position: absolute;
      left: 50%;
      top: 43px;
      width: 42px;
      height: 36px;
      transform: translateX(-50%);
    }

    .paw::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 15px;
      width: 20px;
      height: 17px;
      background: rgba(33, 40, 58, 0.75);
      border-radius: 8px;
      box-shadow:
        -9px -9px 0 -4px rgba(33, 40, 58, 0.75),
        9px -9px 0 -4px rgba(33, 40, 58, 0.75),
        -16px 2px 0 -5px rgba(33, 40, 58, 0.75),
        17px 2px 0 -5px rgba(33, 40, 58, 0.75);
    }

    .tomb-text {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 96px;
      text-align: center;
      color: rgba(24, 31, 48, 0.82);
      text-shadow: 1px 1px 0 rgba(255,255,255,0.18);
    }

    .tomb-text strong {
      display: block;
      font-size: 23px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .tomb-text span {
      display: block;
      font-size: 14px;
      line-height: 1.6;
    }

    .lantern {
      position: absolute;
      left: 12px;
      bottom: 48px;
      width: 50px;
      height: 70px;
      z-index: 15;
      background: #2f2730;
      border: 3px solid #171620;
      box-shadow:
        0 0 34px rgba(255, 192, 96, 0.55),
        0 0 90px rgba(255, 192, 96, 0.2);
    }

    .lantern::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 12px;
      bottom: 12px;
      background:
        radial-gradient(circle, #fff4b7 0 20%, #ffc15f 21% 50%, rgba(255,193,95,0.12) 52%);
    }

    .lantern::after {
      content: "";
      position: absolute;
      left: 13px;
      right: 13px;
      top: -15px;
      height: 14px;
      border: 3px solid #171620;
      border-bottom: 0;
    }

    .flowers {
      position: absolute;
      right: 8px;
      bottom: 50px;
      width: 92px;
      height: 58px;
      z-index: 15;
    }

    .flower {
      position: absolute;
      width: 11px;
      height: 11px;
      background: #ead8da;
      box-shadow:
        11px 0 #c9899f,
        0 11px #dfa7c1,
        11px 11px #f2e5d4;
    }

    .flower.f1 { left: 0; bottom: 14px; }
    .flower.f2 { left: 32px; bottom: 28px; transform: scale(0.88); }
    .flower.f3 { left: 58px; bottom: 8px; transform: scale(1.08); }

    .quiet-note {
      position: absolute;
      right: 34px;
      bottom: 32px;
      z-index: 30;
      max-width: 230px;
      padding: 15px 16px;
      color: rgba(247,234,212,0.72);
      background: rgba(5, 11, 21, 0.42);
      border: 1px solid rgba(247,234,212,0.12);
      backdrop-filter: blur(8px);
      line-height: 1.7;
      font-size: 13px;
    }

    .petal {
      position: absolute;
      width: 12px;
      height: 7px;
      background: var(--rose);
      border-radius: 10px 0 10px 0;
      opacity: 0.68;
      image-rendering: pixelated;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% {
        transform: translate3d(0, -8vh, 0) rotate(0deg);
        opacity: 0;
      }

      14% {
        opacity: 0.68;
      }

      100% {
        transform: translate3d(var(--drift), 105vh, 0) rotate(260deg);
        opacity: 0;
      }
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 35;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 7vw;
      color: rgba(247,234,212,0.54);
      background: rgba(5, 11, 21, 0.46);
      border-top: 1px solid rgba(247,234,212,0.1);
      backdrop-filter: blur(8px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .footer-links {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 100;
      padding: 14px 22px;
      color: var(--cream);
      background: rgba(7, 15, 30, 0.94);
      border: 1px solid rgba(247,234,212,0.22);
      box-shadow: 0 16px 42px rgba(0,0,0,0.34);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1040px) {
      .nav {
        display: none;
      }

      .header {
        padding: 24px 24px 0;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 44px 24px 100px;
      }

      .copy {
        max-width: none;
      }

      .showcase {
        min-height: 560px;
      }

      .moon {
        right: 8vw;
        top: 138px;
        width: 88px;
        height: 88px;
      }

      .footer {
        position: relative;
        align-items: flex-start;
        flex-direction: column;
        padding: 18px 24px;
      }
    }

    @media (max-width: 640px) {
      .brand-title {
        font-size: 20px;
      }

      .copy h1 {
        font-size: 42px;
      }

      .desc {
        font-size: 15px;
      }

      .actions {
        display: grid;
      }

      .pixel-button {
        width: 100%;
      }

      .steps {
        grid-template-columns: 1fr;
      }

      .showcase {
        min-height: 470px;
      }

      .tree {
        right: -138px;
        transform: scale(0.76);
        transform-origin: bottom right;
      }

      .tomb-zone {
        left: 45%;
        bottom: 72px;
        transform: translateX(-50%) scale(0.78);
      }

      .quiet-note {
        display: none;
      }

      .frame-label {
        left: 22px;
        top: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="soft-glow" aria-hidden="true"></div>
    <div class="stars" id="stars"></div>
    <div class="petals" id="petals"></div>
    <div class="moon" aria-hidden="true"></div>
    <div class="mist" aria-hidden="true"></div>

    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <span class="brand-title">宠物纪念园</span>
          <span class="brand-subtitle">珍藏每一次相遇</span>
        </span>
      </a>

      <nav class="nav" aria-label="主导航">
        <a class="active" href="index.html">首页</a>
        <a href="#" id="navGarden">纪念园</a>
        <a href="create.html">创建纪念</a>
        <a href="#" data-soon="故事页面后面制作">故事</a>
        <button class="nav-action" type="button" data-soon="登录功能后面再接">登录</button>
      </nav>
    </header>

    <section class="hero">
      <section class="copy">
        <div class="eyebrow">
          <span class="eyebrow-icon"></span>
          <span>一座安静的宠物纪念花园</span>
        </div>

        <h1>
          把想念
          <span>安放在这里</span>
        </h1>

        <p class="desc">
          为离开的爱宠建立一座小小纪念馆。
          写下名字、故事和想说的话，让回忆被温柔保存，也让思念有一个可以回来的地方。
        </p>

        <div class="actions">
          <button class="pixel-button primary" type="button" id="enterGarden">
            <span class="button-icon">▣</span>
            进入纪念园
          </button>

          <button class="pixel-button secondary" type="button" id="createMemorial">
            <span class="button-icon">✿</span>
            开始创建
          </button>
        </div>

        <div class="steps">
          <div class="step-card">
            <strong>01</strong>
            <span>写下名字与故事</span>
          </div>

          <div class="step-card">
            <strong>02</strong>
            <span>选择纪念墓碑</span>
          </div>

          <div class="step-card">
            <strong>03</strong>
            <span>留下留言与花瓣</span>
          </div>
        </div>

        <div class="language-wrap">
          <span>语言</span>
          <select class="language-select" id="languageSelect" aria-label="选择语言">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </section>

      <section class="showcase" aria-label="首页纪念园插画">
        <div class="garden-frame">
          <div class="frame-label">今晚，也有人轻轻想起它</div>

          <div class="horizon">
            <div class="hill one"></div>
            <div class="hill two"></div>
            <div class="hill three"></div>
          </div>

          <div class="ground"></div>

          <div class="path" aria-hidden="true">
            <span class="p1"></span>
            <span class="p2"></span>
            <span class="p3"></span>
            <span class="p4"></span>
          </div>

          <div class="tree" aria-hidden="true">
            <div class="trunk"></div>
            <div class="branch b1"></div>
            <div class="branch b2"></div>
            <div class="branch b3"></div>
            <div class="leaf l1"></div>
            <div class="leaf l2"></div>
            <div class="leaf l3"></div>
            <div class="leaf l4"></div>
          </div>

          <div class="tomb-zone">
            <div class="tomb">
              <div class="paw"></div>
              <div class="tomb-text">
                <strong>小橘</strong>
                <span>2012 - 2023</span>
                <span>♥</span>
              </div>
            </div>

            <div class="lantern" aria-hidden="true"></div>

            <div class="flowers" aria-hidden="true">
              <span class="flower f1"></span>
              <span class="flower f2"></span>
              <span class="flower f3"></span>
            </div>
          </div>

          <div class="quiet-note">
            这里没有喧闹的告别，只有一盏灯、一片花瓣，和还没有说完的话。
          </div>
        </div>
      </section>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="#" data-soon="关于我们页面后面制作">关于我们</a>
        <a href="#" data-soon="使用条款后面制作">使用条款</a>
        <a href="#" data-soon="隐私政策后面制作">隐私政策</a>
        <a href="#" data-soon="帮助中心后面制作">帮助中心</a>
      </div>

      <div>♥ 用爱延续每一段陪伴</div>
    </footer>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stars = document.getElementById("stars");
    const petals = document.getElementById("petals");
    const toast = document.getElementById("toast");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars() {
      const count = 56;

      for (let i = 0; i < count; i += 1) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${random(4, 96)}%`;
        star.style.top = `${random(7, 62)}%`;
        star.style.animationDelay = `${random(0, 4.5)}s`;
        star.style.transform = `scale(${random(0.55, 1.05)})`;
        stars.appendChild(star);
      }
    }

    function createPetals() {
      const count = 14;

      for (let i = 0; i < count; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = `${random(8, 94)}%`;
        petal.style.top = `${random(-28, 30)}%`;
        petal.style.setProperty("--drift", `${random(-85, 85)}px`);
        petal.style.animationDuration = `${random(14, 25)}s`;
        petal.style.animationDelay = `${random(0, 16)}s`;
        petals.appendChild(petal);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", () => {
      openGarden();
    });

    document.getElementById("navGarden").addEventListener("click", (event) => {
      event.preventDefault();
      openGarden();
    });

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.querySelectorAll("[data-soon]").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(item.dataset.soon);
      });
    });

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      const value = event.target.value;
      localStorage.setItem("petMemorialLanguage", value);
      showToast("语言选择已保存");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage");
    if (savedLanguage) {
      document.getElementById("languageSelect").value = savedLanguage;
    }

    createStars();
    createPetals();
  </script>
</body>
</html>
