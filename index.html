<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      background: #06101f;
      color: #f7ead4;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(4, 8, 18, 0.84) 0%, rgba(4, 8, 18, 0.58) 42%, rgba(4, 8, 18, 0.12) 100%),
        url("hero.png") center / cover no-repeat;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 75% 18%, rgba(255, 216, 148, 0.12), transparent 22%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.28));
      pointer-events: none;
      z-index: 1;
    }

    .header {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 34px 6vw 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #f6d59a;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
    }

    .brand-icon {
      font-size: 30px;
      line-height: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 34px;
      color: rgba(247, 234, 212, 0.78);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: #f7ead4;
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: -5px;
      height: 2px;
      background: #f6d59a;
    }

    .language-select {
      padding: 9px 14px;
      color: #f7ead4;
      border: 1px solid rgba(247, 234, 212, 0.32);
      background: rgba(4, 8, 18, 0.36);
      outline: none;
    }

    .language-select option {
      color: #f7ead4;
      background: #06101f;
    }

    .hero {
      position: relative;
      z-index: 5;
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      padding: 0 6vw 72px;
    }

    .copy {
      max-width: 620px;
      transform: translateY(-8px);
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 6vw, 86px);
      line-height: 1.14;
      letter-spacing: 3px;
      color: #fff0c8;
      text-shadow:
        0 5px 0 rgba(0, 0, 0, 0.22),
        0 22px 55px rgba(0, 0, 0, 0.55);
    }

    h1 span {
      color: #f6d59a;
    }

    .subtitle {
      margin: 26px 0 0;
      max-width: 520px;
      color: rgba(247, 234, 212, 0.82);
      font-size: 18px;
      line-height: 1.9;
      letter-spacing: 1px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
    }

    .actions {
      display: flex;
      gap: 18px;
      margin-top: 42px;
      flex-wrap: wrap;
    }

    .button {
      min-width: 190px;
      height: 62px;
      border: 0;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 2px;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .button:hover {
      transform: translateY(-3px);
      filter: brightness(1.06);
    }

    .button.primary {
      color: #1f2432;
      background: linear-gradient(180deg, #ffe7bb, #d7a45f);
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.18),
        7px 7px 0 rgba(0, 0, 0, 0.28);
    }

    .button.secondary {
      color: #f7ead4;
      background: rgba(6, 12, 26, 0.42);
      border: 1px solid rgba(247, 234, 212, 0.42);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.04),
        7px 7px 0 rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 20;
      padding: 14px 22px;
      color: #f7ead4;
      background: rgba(7, 15, 30, 0.94);
      border: 1px solid rgba(247, 234, 212, 0.22);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      .nav {
        display: none;
      }

      .header {
        padding: 24px 22px 0;
      }

      .brand {
        font-size: 21px;
      }

      .hero {
        padding: 70px 22px 80px;
        align-items: flex-start;
      }

      .copy {
        max-width: 100%;
      }

      h1 {
        font-size: 42px;
      }

      .subtitle {
        font-size: 16px;
      }

      .actions {
        display: grid;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-icon"> paw </span>
        <span>宠物纪念园</span>
      </a>

      <nav class="nav">
        <a class="active" href="index.html">首页</a>
        <a href="#" id="navGarden">纪念园</a>
        <a href="create.html">创建纪念</a>
        <a href="#" data-soon="故事页面后面制作">故事</a>
      </nav>

      <select class="language-select" id="languageSelect">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </header>

    <section class="hero">
      <div class="copy">
        <h1>
          每一份<span>爱</span>，<br />
          都值得被温柔铭记
        </h1>

        <p class="subtitle">
          为离开的爱宠留下一座安静的纪念花园。
        </p>

        <div class="actions">
          <button class="button primary" type="button" id="enterGarden">进入纪念园 →</button>
          <button class="button secondary" type="button" id="createMemorial">开始创建 →</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);

    document.getElementById("navGarden").addEventListener("click", (event) => {
      event.preventDefault();
      openGarden();
    });

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.querySelectorAll("[data-soon]").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(item.dataset.soon);
      });
    });

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      localStorage.setItem("petMemorialLanguage", event.target.value);
      showToast("语言选择已保存");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage");
    if (savedLanguage) {
      document.getElementById("languageSelect").value = savedLanguage;
    }
  </script>
</body>
</html>
