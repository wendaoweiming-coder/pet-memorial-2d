<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #060b16;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url("hero.png") center center / cover no-repeat;
    }

    .click-area {
      position: absolute;
      z-index: 5;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .enter {
      left: 7.6%;
      top: 66.2%;
      width: 16.2%;
      height: 8.2%;
    }

    .create {
      left: 25.6%;
      top: 66.2%;
      width: 16.2%;
      height: 8.2%;
    }

    .nav-home {
      left: 46%;
      top: 4.2%;
      width: 4.6%;
      height: 6%;
    }

    .nav-garden {
      left: 51.5%;
      top: 4.2%;
      width: 5.2%;
      height: 6%;
    }

    .nav-create {
      left: 58%;
      top: 4.2%;
      width: 6.8%;
      height: 6%;
    }

    .nav-story {
      left: 66.2%;
      top: 4.2%;
      width: 4.8%;
      height: 6%;
    }

    .language {
      right: 4.8%;
      top: 4.2%;
      width: 8.2%;
      height: 6%;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 20;
      padding: 14px 22px;
      color: #fff0c8;
      background: rgba(7, 15, 30, 0.94);
      border: 1px solid rgba(255, 240, 200, 0.22);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        background-position: center center;
      }

      .enter {
        left: 8%;
        top: 66%;
        width: 20%;
      }

      .create {
        left: 31%;
        top: 66%;
        width: 20%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <button class="click-area enter" type="button" id="enterGarden" aria-label="进入纪念园"></button>
    <button class="click-area create" type="button" id="createMemorial" aria-label="开始创建"></button>

    <button class="click-area nav-home" type="button" aria-label="首页"></button>
    <button class="click-area nav-garden" type="button" id="navGarden" aria-label="纪念园"></button>
    <button class="click-area nav-create" type="button" id="navCreate" aria-label="创建纪念"></button>
    <button class="click-area nav-story" type="button" id="navStory" aria-label="故事"></button>
    <button class="click-area language" type="button" id="languageButton" aria-label="语言"></button>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);

    document.getElementById("navGarden").addEventListener("click", openGarden);

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.getElementById("navCreate").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.getElementById("navStory").addEventListener("click", () => {
      showToast("故事页面后面制作");
    });

    document.getElementById("languageButton").addEventListener("click", () => {
      showToast("语言切换后面单独接");
    });
  </script>
</body>
</html>
