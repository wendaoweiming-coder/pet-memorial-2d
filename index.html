<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #07111f;
      color: #fff1d0;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      overflow: hidden;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(5, 10, 22, 0.42) 0%, rgba(5, 10, 22, 0.30) 36%, rgba(5, 10, 22, 0.08) 68%, rgba(5, 10, 22, 0.02) 100%),
        url("home-bg-v6.png?v=20260625-new-html") center center / cover no-repeat;
    }

    .brand {
      position: absolute;
      left: 5vw;
      top: 5vh;
      z-index: 3;
      color: #f7e7bd;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
      text-shadow:
        2px 2px 0 #2a2018,
        0 0 10px rgba(247, 231, 189, 0.16);
    }

    .brand::after {
      content: "";
      display: block;
      width: 210px;
      height: 3px;
      margin-top: 12px;
      background: #cfa766;
      box-shadow: 0 0 8px rgba(207, 167, 102, 0.35);
    }

    .language-select {
      position: absolute;
      right: 5vw;
      top: 4.5vh;
      z-index: 4;
      width: 170px;
      height: 52px;
      padding: 0 18px;
      border: 3px solid #d6b477;
      background: rgba(13, 20, 38, 0.68);
      color: #fff1d0;
      outline: none;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      text-align-last: center;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 #251d18;
      cursor: pointer;
    }

    .language-select option {
      background: #07111f;
      color: #fff1d0;
    }

    .hero {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      padding-left: 5vw;
      padding-bottom: 3vh;
    }

    .copy {
      width: min(720px, 48vw);
      transform: translateY(22px);
    }

    .title {
      margin: 0;
      color: #fff4da;
      font-size: clamp(56px, 5.5vw, 84px);
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow:
        3px 3px 0 #2c2118,
        5px 5px 0 rgba(0, 0, 0, 0.32),
        0 0 12px rgba(255, 244, 218, 0.10);
    }

    .subtitle {
      margin: 34px 0 0;
      color: rgba(255, 241, 208, 0.92);
      font-size: 22px;
      line-height: 1.7;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.45);
    }

    .actions {
      display: flex;
      gap: 28px;
      margin-top: 44px;
    }

    .button {
      width: 280px;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      cursor: pointer;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .button.primary {
      color: #302214;
      background: #ecd49d;
      border: 4px solid #fff0c8;
      box-shadow:
        inset 0 0 0 3px #bd8b4a,
        8px 8px 0 rgba(0, 0, 0, 0.34);
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.35);
    }

    .button.secondary {
      color: #fff1d0;
      background: rgba(27, 35, 62, 0.74);
      border: 4px solid #7f8fc0;
      box-shadow:
        inset 0 0 0 3px rgba(42, 52, 88, 0.95),
        8px 8px 0 rgba(0, 0, 0, 0.34);
      text-shadow: 2px 2px 0 #171a2d;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      transform: translateX(-50%) translateY(16px);
      padding: 12px 18px;
      border: 1px solid rgba(246, 212, 142, 0.35);
      background: rgba(9, 16, 31, 0.95);
      color: #f6eedf;
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        height: auto;
      }

      .brand {
        left: 24px;
        top: 24px;
        font-size: 21px;
      }

      .brand::after {
        width: 170px;
      }

      .language-select {
        right: 22px;
        top: 22px;
        width: 128px;
        height: 44px;
        font-size: 15px;
      }

      .hero {
        min-height: 100vh;
        height: auto;
        align-items: flex-start;
        padding: 170px 24px 80px;
      }

      .copy {
        width: 100%;
        transform: none;
      }

      .title {
        font-size: 44px;
      }

      .subtitle {
        font-size: 17px;
        margin-top: 26px;
      }

      .actions {
        display: grid;
        gap: 18px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="brand">宠物纪念园</div>

    <select class="language-select" id="languageSelect">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>

    <section class="hero">
      <div class="copy">
        <h1 class="title">每一份爱，<br>都值得被铭记</h1>
        <p class="subtitle">为离开的爱宠留下一座安静的纪念花园。</p>

        <div class="actions">
          <button class="button primary" id="enterGarden" type="button">进入纪念园</button>
          <button class="button secondary" id="createMemorial" type="button">开始创建</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先去创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    const languageSelect = document.getElementById("languageSelect");
    const savedLanguage = localStorage.getItem("petMemorialLanguage");

    if (savedLanguage) {
      languageSelect.value = savedLanguage;
    }

    languageSelect.addEventListener("change", function () {
      localStorage.setItem("petMemorialLanguage", this.value);
      showToast("语言已保存");
    });
  </script>
</body>
</html>
