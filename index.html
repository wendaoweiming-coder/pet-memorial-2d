<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #050914;
      color: #ffe8b8;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(
          90deg,
          rgba(5, 9, 20, 0.88) 0%,
          rgba(5, 9, 20, 0.74) 34%,
          rgba(5, 9, 20, 0.34) 58%,
          rgba(5, 9, 20, 0.06) 100%
        ),
        url("hero.png?v=final-clean-1") center center / cover no-repeat;
    }

    .header {
      position: relative;
      z-index: 5;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5.2vw;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #ffd98d;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow:
        2px 0 #4b2a13,
        0 2px #4b2a13,
        3px 3px 0 rgba(0, 0, 0, 0.55);
    }

    .brand-paw {
      position: relative;
      width: 34px;
      height: 30px;
      image-rendering: pixelated;
    }

    .brand-paw::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 13px;
      width: 13px;
      height: 11px;
      background: #ffd98d;
      box-shadow:
        -10px -10px 0 -3px #ffd98d,
        10px -10px 0 -3px #ffd98d,
        -15px 0 0 -4px #ffd98d,
        15px 0 0 -4px #ffd98d;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 34px;
      color: rgba(255, 232, 184, 0.82);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow:
        2px 0 #1e1520,
        0 2px #1e1520,
        3px 3px 0 rgba(0, 0, 0, 0.55);
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: #ffd98d;
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      bottom: -5px;
      height: 3px;
      background: #ffd98d;
      box-shadow: 0 0 12px rgba(255, 217, 141, 0.65);
    }

    .language-select {
      min-width: 132px;
      height: 42px;
      padding: 0 14px;
      color: #ffe8b8;
      background: rgba(5, 9, 20, 0.46);
      border: 2px solid rgba(255, 217, 141, 0.52);
      outline: none;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow:
        2px 0 #1e1520,
        0 2px #1e1520;
    }

    .language-select option {
      color: #ffe8b8;
      background: #050914;
    }

    .hero {
      position: relative;
      z-index: 4;
      min-height: calc(100vh - 92px);
      display: flex;
      align-items: center;
      padding: 0 5.2vw 8vh;
    }

    .copy {
      max-width: 720px;
    }

    .title {
      margin: 0;
      color: #ffe8b8;
      font-size: clamp(48px, 6vw, 92px);
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow:
        4px 0 #4b2a13,
        0 4px #4b2a13,
        4px 4px 0 #4b2a13,
        8px 8px 0 rgba(0, 0, 0, 0.42),
        0 0 28px rgba(255, 216, 140, 0.22);
    }

    .subtitle {
      margin: 28px 0 0;
      max-width: 560px;
      color: rgba(255, 232, 184, 0.9);
      font-size: 22px;
      line-height: 1.8;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow:
        2px 0 #1e1520,
        0 2px #1e1520,
        3px 3px 0 rgba(0, 0, 0, 0.58);
    }

    .actions {
      display: flex;
      gap: 22px;
      margin-top: 44px;
      flex-wrap: wrap;
    }

    .button {
      min-width: 220px;
      height: 68px;
      cursor: pointer;
      border: 0;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      image-rendering: pixelated;
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .button:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
    }

    .button.primary {
      color: #2b1b12;
      background: #ffd98d;
      border: 4px solid #fff1c8;
      box-shadow:
        inset -6px -6px 0 #c98d43,
        inset 6px 6px 0 #fff4cf,
        8px 8px 0 rgba(0, 0, 0, 0.42);
    }

    .button.secondary {
      color: #ffe8b8;
      background: rgba(13, 18, 38, 0.76);
      border: 4px solid rgba(255, 217, 141, 0.68);
      box-shadow:
        inset -6px -6px 0 rgba(0, 0, 0, 0.28),
        inset 6px 6px 0 rgba(255, 255, 255, 0.06),
        8px 8px 0 rgba(0, 0, 0, 0.35);
      text-shadow:
        2px 0 #1e1520,
        0 2px #1e1520;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 20;
      padding: 14px 22px;
      color: #ffe8b8;
      background: rgba(7, 15, 30, 0.94);
      border: 2px solid rgba(255, 217, 141, 0.52);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      .header {
        height: 78px;
        padding: 0 22px;
      }

      .brand {
        font-size: 20px;
      }

      .nav {
        display: none;
      }

      .language-select {
        min-width: 104px;
        font-size: 13px;
      }

      .hero {
        min-height: calc(100vh - 78px);
        align-items: flex-start;
        padding: 64px 22px 80px;
      }

      .title {
        font-size: 44px;
      }

      .subtitle {
        font-size: 17px;
      }

      .actions {
        display: grid;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-paw"></span>
        <span>宠物纪念园</span>
      </a>

      <nav class="nav">
        <a class="active" href="index.html">首页</a>
        <a href="#" id="navGarden">纪念园</a>
        <a href="create.html">创建纪念</a>
        <a href="#" data-soon="故事页面后面制作">故事</a>
      </nav>

      <select class="language-select" id="languageSelect">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </header>

    <section class="hero">
      <div class="copy">
        <h1 class="title">
          每一份爱，<br />
          都值得被温柔铭记
        </h1>

        <p class="subtitle">
          为离开的爱宠留下一座安静的纪念花园。
        </p>

        <div class="actions">
          <button class="button primary" type="button" id="enterGarden">进入纪念园</button>
          <button class="button secondary" type="button" id="createMemorial">开始创建</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);

    document.getElementById("navGarden").addEventListener("click", (event) => {
      event.preventDefault();
      openGarden();
    });

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.querySelectorAll("[data-soon]").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(item.dataset.soon);
      });
    });

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      localStorage.setItem("petMemorialLanguage", event.target.value);
      showToast("语言选择已保存");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage");
    if (savedLanguage) {
      document.getElementById("languageSelect").value = savedLanguage;
    }
  </script>
</body>
</html>
