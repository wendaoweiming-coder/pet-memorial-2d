<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星爪纪念花园</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="星爪纪念花园首页">
        <span class="brand-title" data-i18n="brand">星爪纪念花园</span>
        <span class="brand-line" aria-hidden="true">
          <span></span>
          <i class="paw-mark"></i>
          <span></span>
        </span>
      </a>

      <div class="language" id="languageBox">
        <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
          <span class="globe" aria-hidden="true"></span>
          <span id="languageText">简体中文</span>
          <span class="chevron" aria-hidden="true"></span>
        </button>

        <div class="language-menu" id="languageMenu">
          <button type="button" class="language-option" data-lang="zh-CN">简体中文</button>
          <button type="button" class="language-option" data-lang="zh-TW">繁體中文</button>
          <button type="button" class="language-option" data-lang="en">English</button>
          <button type="button" class="language-option" data-lang="ja">日本語</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-divider" aria-hidden="true">
        <span></span>
        <i class="paw-mark large"></i>
        <span></span>
      </div>

      <h1 class="hero-title">
        <span data-i18n="title1">让想念，</span>
        <span data-i18n="title2">有一个安静的地方</span>
      </h1>

      <div class="subtitle-wrap">
        <span aria-hidden="true">◇</span>
        <p class="hero-subtitle" data-i18n="subtitle">
          为离开的爱宠，留下一处可以回来看望的纪念花园。
        </p>
        <span aria-hidden="true">◇</span>
      </div>

      <div class="actions">
        <button class="main-button primary" type="button" id="enterGarden">
          <i class="button-paw" aria-hidden="true"></i>
          <span data-i18n="enter">进入纪念园</span>
        </button>

        <button class="main-button secondary" type="button" id="createMemorial">
          <i class="button-paw" aria-hidden="true"></i>
          <span data-i18n="create">开始创建</span>
        </button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
