<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星归园</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #07111f; }
    button { font: inherit; border: 0; padding: 0; background: transparent; cursor: pointer; }
    .viewport { position: fixed; inset: 0; overflow: hidden; background: #07111f; }
    .stage { position:absolute; left:50%; top:50%; width:1672px; height:941px; transform-origin:center center; background: linear-gradient(90deg, rgba(5,10,22,.16) 0%, rgba(5,10,22,.04) 55%, rgba(5,10,22,0) 100%), url("assets/bg.png?v=xinggui-title-inline-1") center center / cover no-repeat; }
    .content-group { position:absolute; left:82px; top:145px; z-index:10; }
    .hero-image { display:block; width:650px; height:auto; opacity:.92; filter:saturate(.76) brightness(.90); }
    .actions { margin-top:14px; margin-left:18px; display:flex; gap:18px; }
    .pixel-button { position:relative; width:224px; height:52px; display:inline-flex; align-items:center; justify-content:center; gap:10px; color:rgba(232,201,148,.90); background:rgba(11,22,43,.56); border:2px solid rgba(198,151,85,.62); box-shadow: inset 0 0 0 2px rgba(255,231,174,.06), 0 8px 20px rgba(0,0,0,.18); font-family:"Microsoft YaHei","PingFang SC",serif; font-size:16px; font-weight:900; letter-spacing:1px; text-shadow:0 2px 0 rgba(17,12,8,.34); transition:transform .14s ease,border-color .14s ease,background .14s ease; }
    .pixel-button::before,.pixel-button::after { content:""; position:absolute; width:7px; height:7px; border:2px solid rgba(198,151,85,.45); pointer-events:none; }
    .pixel-button::before { left:8px; top:8px; border-right:0; border-bottom:0; }
    .pixel-button::after { right:8px; bottom:8px; border-left:0; border-top:0; }
    .pixel-button.primary { border-color:rgba(220,170,98,.76); background:rgba(16,30,55,.62); }
    .pixel-button:hover { transform:translateY(-1px); background:rgba(20,35,62,.70); border-color:rgba(236,191,116,.82); }
    .pixel-button img { width:18px; height:18px; object-fit:contain; opacity:.82; pointer-events:none; image-rendering:pixelated; }
    .language { position:absolute; right:76px; top:48px; z-index:40; }
    .language-button { height:40px; min-width:152px; display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:0 14px; color:rgba(232,201,148,.86); background:rgba(8,17,35,.50); border:2px solid rgba(198,151,85,.54); box-shadow:inset 0 0 0 2px rgba(255,232,178,.05),0 8px 20px rgba(0,0,0,.16); letter-spacing:1px; font-size:15px; font-weight:800; }
    .globe-svg { width:19px; height:19px; opacity:.88; flex:none; }
    .language-button .arrow { font-size:14px; transform:translateY(-1px); opacity:.78; }
    .language-menu { position:absolute; top:48px; right:0; width:152px; display:none; padding:6px; background:rgba(8,16,32,.96); border:2px solid rgba(198,151,85,.54); box-shadow:0 18px 34px rgba(0,0,0,.32); }
    .language.open .language-menu { display:grid; gap:4px; }
    .language-menu button { height:34px; color:rgba(232,201,148,.9); font-size:14px; font-weight:800; letter-spacing:.8px; }
    .language-menu button:hover,.language-menu button.active { background:rgba(232,191,116,.12); }
    .toast { position:fixed; left:50%; bottom:28px; z-index:100; padding:12px 18px; color:#e8c994; background:rgba(9,16,31,.96); border:1px solid rgba(198,151,85,.45); transform:translateX(-50%) translateY(16px); opacity:0; pointer-events:none; transition:.22s ease; letter-spacing:1px; font:700 15px "Microsoft YaHei","PingFang SC",sans-serif; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body data-version="xinggui-title-inline-1">
  <main class="viewport"><section class="stage" id="stage">
    <div class="language" id="languageBox"><button class="language-button" type="button" id="languageButton" aria-label="选择语言"><svg class="globe-svg" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="rgba(232,201,148,.86)" stroke-width="2" shape-rendering="crispEdges"/><path d="M4 12H20" fill="none" stroke="rgba(232,201,148,.82)" stroke-width="2" shape-rendering="crispEdges"/><path d="M6 8H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/><path d="M6 16H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/><path d="M12 3C9 6 8 9 8 12C8 15 9 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/><path d="M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/></svg><span id="languageLabel">简体中文</span><span class="arrow">⌄</span></button><div class="language-menu"><button type="button" data-lang="zh-CN">简体中文</button><button type="button" data-lang="zh-TW">繁體中文</button><button type="button" data-lang="en">English</button><button type="button" data-lang="ja">日本語</button></div></div>
    <div class="content-group"><img class="hero-image" id="heroImage" alt="让想念，有一个安静的地方" /><div class="actions"><button class="pixel-button primary" type="button" id="enterGarden"><img src="assets/paw_icon.png?v=xinggui-title-inline-1" alt="" /><span id="enterText">进入纪念园</span></button><button class="pixel-button" type="button" id="createMemorial"><img src="assets/paw_icon.png?v=xinggui-title-inline-1" alt="" /><span id="createText">开始创建</span></button></div></div>
  </section></main><div class="toast" id="toast"></div>
  <script>
    const HERO_IMAGES = { zh_CN:"assets/hero_zh_CN.png?v=xinggui-title-inline-1", zh_TW:"assets/hero_zh_TW.png?v=xinggui-title-inline-1", en:"assets/hero_en.png?v=xinggui-title-inline-1", ja:"assets/hero_ja.png?v=xinggui-title-inline-1" };
    const TEXTS = { "zh-CN":{key:"zh_CN",brand:"星归园",enter:"进入纪念园",create:"开始创建",langLabel:"简体中文",saved:"语言已保存",noMemorial:"还没有创建纪念，先去创建页面。"}, "zh-TW":{key:"zh_TW",brand:"星歸園",enter:"進入紀念園",create:"開始建立",langLabel:"繁體中文",saved:"語言已保存",noMemorial:"還沒有建立紀念，先去建立頁面。"}, en:{key:"en",brand:"Starhome Garden",enter:"Enter Garden",create:"Create Memorial",langLabel:"English",saved:"Language saved",noMemorial:"No memorial yet. Opening the creation page."}, ja:{key:"ja",brand:"星帰園",enter:"記念園へ",create:"作成する",langLabel:"日本語",saved:"言語を保存しました",noMemorial:"まだ記念ページがありません。作成ページへ移動します。"} };
    const stage=document.getElementById("stage"),toast=document.getElementById("toast"),languageBox=document.getElementById("languageBox"),languageButton=document.getElementById("languageButton"),heroImage=document.getElementById("heroImage"),languageLabel=document.getElementById("languageLabel"),enterText=document.getElementById("enterText"),createText=document.getElementById("createText");
    function resizeStage(){const scale=Math.max(window.innerWidth/1672,window.innerHeight/941);stage.style.transform=`translate(-50%, -50%) scale(${scale})`;} window.addEventListener("resize",resizeStage); resizeStage();
    function showToast(message){toast.textContent=message;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),1500);}
    function applyLanguage(lang){const data=TEXTS[lang]||TEXTS["zh-CN"];const key=data.key;heroImage.src=HERO_IMAGES[key]||HERO_IMAGES.zh_CN;languageLabel.textContent=data.langLabel;enterText.textContent=data.enter;createText.textContent=data.create;document.querySelectorAll(".language-menu button").forEach((button)=>button.classList.toggle("active",button.dataset.lang===lang));}
    function hasSavedMemorial(){try{const draft=JSON.parse(localStorage.getItem("petMemorialDraft"));return Boolean(draft&&draft.petName);}catch(error){return false;}}
    function openGarden(){const lang=localStorage.getItem("petMemorialLanguage")||"zh-CN";const data=TEXTS[lang]||TEXTS["zh-CN"];if(hasSavedMemorial()){window.location.href="cemetery.html";return;}showToast(data.noMemorial);setTimeout(()=>window.location.href="create.html",700);}
    document.getElementById("enterGarden").addEventListener("click",openGarden);document.getElementById("createMemorial").addEventListener("click",()=>window.location.href="create.html");languageButton.addEventListener("click",(event)=>{event.stopPropagation();languageBox.classList.toggle("open");});document.querySelectorAll(".language-menu button").forEach((button)=>button.addEventListener("click",(event)=>{event.stopPropagation();const lang=button.dataset.lang;localStorage.setItem("petMemorialLanguage",lang);applyLanguage(lang);languageBox.classList.remove("open");const data=TEXTS[lang]||TEXTS["zh-CN"];showToast(data.saved);}));document.addEventListener("click",()=>languageBox.classList.remove("open"));localStorage.setItem("starpawHomeVersion","xinggui-title-inline-1");applyLanguage(localStorage.getItem("petMemorialLanguage")||"zh-CN");
  </script>
</body></html>
