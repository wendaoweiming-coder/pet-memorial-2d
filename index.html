<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星爪纪念花园</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #07111f;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "STKaiti", "KaiTi", sans-serif;
      color: #f8ddb1;
    }

    button {
      font: inherit;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(4, 9, 19, 0.50) 0%, rgba(4, 9, 19, 0.34) 40%, rgba(4, 9, 19, 0.08) 70%, rgba(4, 9, 19, 0.02) 100%),
        url("home-bg-real.png?v=real-button-20260625") center center / cover no-repeat;
    }

    .brand {
      position: absolute;
      left: 4.6vw;
      top: 4.8vh;
      z-index: 5;
      color: #f3c982;
      font-size: clamp(26px, 2.15vw, 38px);
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow:
        2px 2px 0 rgba(33, 22, 11, 0.95),
        0 0 18px rgba(243, 201, 130, 0.22);
    }

    .brand-line {
      position: relative;
      width: 300px;
      height: 26px;
      margin-top: 9px;
    }

    .brand-line::before,
    .brand-line::after {
      content: "";
      position: absolute;
      top: 12px;
      width: 126px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c89555, #f1cf8b);
      box-shadow: 0 0 10px rgba(241, 207, 139, 0.28);
    }

    .brand-line::before { left: 0; }
    .brand-line::after { right: 0; transform: scaleX(-1); }

    .brand-line span {
      position: absolute;
      left: 134px;
      top: -5px;
      font-size: 24px;
      line-height: 1;
      filter: sepia(1) saturate(1.3) brightness(1.12);
    }

    .language {
      position: absolute;
      right: 4.7vw;
      top: 4.8vh;
      z-index: 20;
    }

    .language-main {
      width: 220px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 2px solid rgba(232, 191, 116, 0.95);
      background: rgba(11, 20, 38, 0.82);
      color: #f8ddb1;
      cursor: pointer;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 rgba(24, 18, 13, 0.75);
      box-shadow:
        inset 0 0 0 2px rgba(61, 43, 22, 0.58),
        0 0 18px rgba(0, 0, 0, 0.18);
    }

    .language-main .globe {
      font-size: 23px;
      line-height: 1;
    }

    .language-main .arrow {
      width: 9px;
      height: 9px;
      border-right: 2px solid #f8ddb1;
      border-bottom: 2px solid #f8ddb1;
      transform: rotate(45deg) translateY(-3px);
    }

    .language-menu {
      position: absolute;
      top: 64px;
      right: 0;
      width: 220px;
      padding: 8px;
      display: none;
      background: rgba(9, 16, 31, 0.98);
      border: 2px solid rgba(232, 191, 116, 0.95);
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.36);
    }

    .language.open .language-menu {
      display: grid;
      gap: 4px;
    }

    .language-option {
      height: 42px;
      border: 0;
      background: transparent;
      color: #f8ddb1;
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .language-option:hover,
    .language-option.active {
      background: rgba(232, 191, 116, 0.18);
    }

    .hero {
      position: relative;
      z-index: 4;
      width: min(790px, 49vw);
      padding-left: 4.9vw;
      padding-top: 28vh;
    }

    .divider {
      width: 560px;
      max-width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 18px;
      color: #d7a15c;
      opacity: 0.95;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c89555);
    }

    .divider::after {
      background: linear-gradient(90deg, #c89555, transparent);
    }

    .divider span {
      font-size: 34px;
      line-height: 1;
      filter: sepia(1) saturate(1.2) brightness(1.1);
    }

    .title {
      margin: 0;
      color: #f7dca6;
      font-size: clamp(58px, 5.7vw, 96px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 5px;
      text-shadow:
        3px 3px 0 rgba(41, 29, 16, 0.95),
        0 0 24px rgba(247, 220, 166, 0.16);
    }

    .title span {
      display: block;
    }

    .subtitle-row {
      width: 650px;
      max-width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      color: #ebc587;
    }

    .subtitle-row::before,
    .subtitle-row::after {
      content: "◇";
      color: #d49b56;
      font-size: 14px;
    }

    .subtitle {
      margin: 0;
      flex: 1;
      padding-top: 8px;
      border-top: 1px solid rgba(205, 151, 82, 0.72);
      color: #f0d0a0;
      font-size: clamp(19px, 1.45vw, 27px);
      line-height: 1.75;
      font-weight: 800;
      letter-spacing: 2px;
      text-align: center;
      text-shadow:
        2px 2px 0 rgba(16, 13, 13, 0.62),
        0 0 14px rgba(240, 208, 160, 0.10);
    }

    .actions {
      display: flex;
      gap: 24px;
      margin-top: 44px;
    }

    .main-button {
      position: relative;
      width: 300px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 4px;
      border: 0;
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .main-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .main-button::before {
      content: "🐾";
      position: absolute;
      top: -22px;
      left: 50%;
      width: 44px;
      height: 44px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 24px;
      line-height: 1;
      filter: sepia(1) saturate(1.2) brightness(1.05);
    }

    .main-button::after {
      content: "";
      position: absolute;
      inset: 9px;
      pointer-events: none;
    }

    .main-button.primary {
      color: #1f160d;
      background: #ecd19a;
      border: 3px solid #f7ddb0;
      text-shadow: 1px 1px 0 rgba(255, 246, 221, 0.46);
      box-shadow:
        inset 0 0 0 3px #b77e43,
        inset 0 0 24px rgba(255, 238, 193, 0.24),
        0 8px 0 rgba(17, 11, 7, 0.28);
    }

    .main-button.primary::before {
      background: #ecd19a;
      border: 3px solid #b77e43;
    }

    .main-button.primary::after {
      border: 1px solid rgba(150, 92, 36, 0.55);
    }

    .main-button.secondary {
      color: #f8ddb1;
      background: rgba(21, 33, 67, 0.86);
      border: 3px solid #d0a46a;
      text-shadow:
        2px 2px 0 rgba(16, 17, 35, 0.82),
        0 0 12px rgba(248, 221, 177, 0.16);
      box-shadow:
        inset 0 0 0 3px rgba(64, 77, 126, 0.84),
        inset 0 0 24px rgba(137, 151, 212, 0.10),
        0 8px 0 rgba(7, 10, 19, 0.32);
    }

    .main-button.secondary::before {
      background: rgba(21, 33, 67, 0.96);
      border: 3px solid #d0a46a;
    }

    .main-button.secondary::after {
      border: 1px solid rgba(231, 191, 116, 0.42);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      padding: 12px 18px;
      color: #f8ddb1;
      background: rgba(9, 16, 31, 0.95);
      border: 1px solid rgba(224, 180, 106, 0.55);
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body { overflow: auto; }

      .page {
        min-height: 100vh;
        height: auto;
        background-position: center center;
      }

      .brand {
        left: 22px;
        top: 22px;
        font-size: 24px;
      }

      .brand-line {
        width: 220px;
      }

      .brand-line::before,
      .brand-line::after {
        width: 88px;
      }

      .brand-line span {
        left: 98px;
      }

      .language {
        right: 18px;
        top: 20px;
      }

      .language-main {
        width: 126px;
        height: 42px;
        gap: 7px;
        font-size: 14px;
      }

      .language-main .globe {
        display: none;
      }

      .language-menu {
        top: 49px;
        width: 126px;
      }

      .hero {
        width: 100%;
        padding: 170px 22px 80px;
      }

      .divider {
        width: 100%;
      }

      .title {
        font-size: 48px;
      }

      .subtitle {
        font-size: 17px;
      }

      .actions {
        display: grid;
        gap: 22px;
      }

      .main-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="brand">
      星爪纪念花园
      <div class="brand-line"><span>🐾</span></div>
    </div>

    <div class="language" id="languageBox">
      <button class="language-main" type="button" id="languageButton">
        <span class="globe">◎</span>
        <span id="languageText">简体中文</span>
        <span class="arrow"></span>
      </button>

      <div class="language-menu" id="languageMenu">
        <button class="language-option" type="button" data-lang="zh-CN">简体中文</button>
        <button class="language-option" type="button" data-lang="zh-TW">繁體中文</button>
        <button class="language-option" type="button" data-lang="en">English</button>
        <button class="language-option" type="button" data-lang="ja">日本語</button>
      </div>
    </div>

    <section class="hero">
      <div class="divider"><span>🐾</span></div>

      <h1 class="title">
        <span>让想念，</span>
        <span>有一个安静的地方</span>
      </h1>

      <div class="subtitle-row">
        <p class="subtitle">为离开的爱宠，留下一处可以回来看望的纪念花园。</p>
      </div>

      <div class="actions">
        <button class="main-button primary" type="button" id="enterGarden">进入纪念园</button>
        <button class="main-button secondary" type="button" id="createMemorial">开始创建</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");
    const languageBox = document.getElementById("languageBox");
    const languageButton = document.getElementById("languageButton");
    const languageText = document.getElementById("languageText");

    const labels = {
      "zh-CN": "简体中文",
      "zh-TW": "繁體中文",
      "en": "English",
      "ja": "日本語"
    };

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先去创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    languageButton.addEventListener("click", (event) => {
      event.stopPropagation();
      languageBox.classList.toggle("open");
    });

    document.querySelectorAll(".language-option").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();

        const lang = button.dataset.lang;
        localStorage.setItem("petMemorialLanguage", lang);
        languageText.textContent = labels[lang];

        document.querySelectorAll(".language-option").forEach((item) => {
          item.classList.remove("active");
        });

        button.classList.add("active");
        languageBox.classList.remove("open");
        showToast("语言已保存");
      });
    });

    document.addEventListener("click", () => {
      languageBox.classList.remove("open");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage") || "zh-CN";
    languageText.textContent = labels[savedLanguage] || labels["zh-CN"];

    document.querySelectorAll(".language-option").forEach((button) => {
      if (button.dataset.lang === savedLanguage) {
        button.classList.add("active");
      }
    });
  </script>
</body>
</html>
