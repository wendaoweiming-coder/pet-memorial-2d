<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星爪纪念花园</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #07111f;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url("homepage.png?v=exact-20260625") center center / cover no-repeat;
    }

    .click-area {
      position: absolute;
      z-index: 10;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .enter {
      left: 4.9%;
      top: 63.1%;
      width: 17.0%;
      height: 11.2%;
    }

    .create {
      left: 23.3%;
      top: 63.1%;
      width: 16.3%;
      height: 11.2%;
    }

    .language-select {
      position: absolute;
      z-index: 11;
      right: 4.6%;
      top: 5.0%;
      width: 12.2%;
      height: 5.8%;
      opacity: 0.01;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      padding: 12px 18px;
      color: #f8ddb1;
      background: rgba(9, 16, 31, 0.95);
      border: 1px solid rgba(224, 180, 106, 0.55);
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        background-position: center center;
      }

      .enter {
        left: 5%;
        top: 64%;
        width: 24%;
        height: 9%;
      }

      .create {
        left: 31%;
        top: 64%;
        width: 23%;
        height: 9%;
      }

      .language-select {
        right: 4%;
        top: 4.5%;
        width: 22%;
        height: 6%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <button class="click-area enter" type="button" id="enterGarden" aria-label="进入纪念园"></button>
    <button class="click-area create" type="button" id="createMemorial" aria-label="开始创建"></button>

    <select class="language-select" id="languageSelect" aria-label="语言选择">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先去创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", openGarden);

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    const languageSelect = document.getElementById("languageSelect");
    const savedLanguage = localStorage.getItem("petMemorialLanguage");

    if (savedLanguage) {
      languageSelect.value = savedLanguage;
    }

    languageSelect.addEventListener("change", function () {
      localStorage.setItem("petMemorialLanguage", this.value);
      showToast("语言已保存");
    });
  </script>
</body>
</html>
