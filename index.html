<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物纪念园</title>

  <style>
    :root {
      --bg: #050914;
      --bg-2: #0a1425;
      --cream: #f7ead4;
      --cream-soft: rgba(247, 234, 212, 0.72);
      --cream-faint: rgba(247, 234, 212, 0.45);
      --gold: #e8c98e;
      --gold-2: #c99e63;
      --panel: rgba(10, 18, 34, 0.68);
      --panel-2: rgba(255, 255, 255, 0.07);
      --line: rgba(247, 234, 212, 0.16);
      --line-strong: rgba(232, 201, 142, 0.42);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      background: var(--bg);
      color: var(--cream);
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 74% 24%, rgba(232, 201, 142, 0.15), transparent 16%),
        radial-gradient(circle at 15% 72%, rgba(117, 93, 155, 0.16), transparent 24%),
        linear-gradient(180deg, #050914 0%, #081326 48%, #0d1d31 100%);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 7px 7px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 1;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(5, 9, 20, 0.92) 0%, rgba(5, 9, 20, 0.74) 37%, rgba(5, 9, 20, 0.18) 72%, rgba(5, 9, 20, 0.22) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .stars,
    .petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 3;
    }

    .petals {
      z-index: 18;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 241, 200, 0.9);
      box-shadow:
        3px 0 rgba(255, 241, 200, 0.9),
        0 3px rgba(255, 241, 200, 0.9),
        3px 3px rgba(255, 241, 200, 0.9);
      animation: twinkle 4.5s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.22;
        transform: scale(0.75);
      }

      50% {
        opacity: 0.85;
        transform: scale(1);
      }
    }

    .petal {
      position: absolute;
      width: 12px;
      height: 7px;
      border-radius: 10px 0 10px 0;
      background: #d99caf;
      opacity: 0.65;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% {
        transform: translate3d(0, -8vh, 0) rotate(0deg);
        opacity: 0;
      }

      12% {
        opacity: 0.68;
      }

      100% {
        transform: translate3d(var(--drift), 105vh, 0) rotate(260deg);
        opacity: 0;
      }
    }

    .header {
      position: relative;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 7vw 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      position: relative;
      width: 46px;
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: rgba(255,255,255,0.055);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 16px 34px rgba(0,0,0,0.24);
      backdrop-filter: blur(10px);
    }

    .brand-logo::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 18px;
      width: 18px;
      height: 15px;
      background: var(--cream);
      border-radius: 6px;
      box-shadow:
        -9px -11px 0 -3px var(--cream),
        10px -11px 0 -3px var(--cream),
        -15px 0 0 -4px var(--cream),
        16px 0 0 -4px var(--cream),
        0 13px 0 -6px var(--cream);
    }

    .brand-title {
      display: block;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--cream);
    }

    .brand-subtitle {
      display: block;
      margin-top: 7px;
      color: rgba(247, 234, 212, 0.52);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 30px;
      color: rgba(247, 234, 212, 0.72);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: var(--cream);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: -5px;
      height: 2px;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(232, 201, 142, 0.58);
    }

    .language-select {
      min-width: 138px;
      padding: 9px 14px;
      color: var(--cream);
      outline: none;
      border: 1px solid rgba(247, 234, 212, 0.22);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }

    .language-select option {
      color: var(--cream);
      background: #0b1628;
    }

    .hero {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 74px);
      display: grid;
      grid-template-columns: minmax(360px, 0.9fr) minmax(520px, 1.1fr);
      align-items: center;
      gap: 46px;
      padding: 58px 7vw 92px;
    }

    .copy {
      position: relative;
      z-index: 20;
      max-width: 560px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding: 9px 14px;
      color: rgba(247, 234, 212, 0.76);
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(247, 234, 212, 0.14);
      border-radius: 999px;
      box-shadow: 0 14px 38px rgba(0,0,0,0.16);
      backdrop-filter: blur(10px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .eyebrow-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow:
        11px 0 0 rgba(217,156,175,0.9),
        22px 0 0 rgba(156,135,189,0.9);
    }

    .copy h1 {
      margin: 0;
      color: var(--cream);
      font-size: clamp(44px, 5.4vw, 76px);
      line-height: 1.08;
      letter-spacing: 2px;
      font-weight: 700;
      text-shadow:
        0 5px 0 rgba(0,0,0,0.18),
        0 28px 78px rgba(0,0,0,0.48);
    }

    .copy h1 span {
      color: var(--gold);
    }

    .divider {
      width: min(420px, 100%);
      height: 1px;
      margin: 24px 0;
      background: linear-gradient(90deg, var(--gold), transparent);
      position: relative;
    }

    .divider::after {
      content: "●";
      position: absolute;
      left: 185px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 8px;
    }

    .desc {
      max-width: 470px;
      margin: 0;
      color: rgba(247, 234, 212, 0.72);
      font-size: 16px;
      line-height: 1.95;
    }

    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .main-button {
      min-height: 58px;
      cursor: pointer;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      padding: 0 26px;
      font-weight: 800;
      letter-spacing: 1.5px;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .main-button:hover {
      transform: translateY(-3px);
      filter: brightness(1.05);
    }

    .main-button:active {
      transform: translateY(1px);
    }

    .main-button.primary {
      min-width: 188px;
      color: #20283f;
      background: linear-gradient(180deg, #ffe4b8, #d7aa68);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.2),
        7px 7px 0 rgba(0,0,0,0.22),
        0 18px 48px rgba(0,0,0,0.26);
    }

    .main-button.secondary {
      min-width: 168px;
      color: var(--cream);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(247,234,212,0.28);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        7px 7px 0 rgba(0,0,0,0.16);
      backdrop-filter: blur(10px);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      max-width: 620px;
      margin-top: 48px;
      border: 1px solid rgba(247,234,212,0.11);
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
    }

    .feature {
      min-height: 118px;
      padding: 20px 16px;
      background: rgba(255,255,255,0.035);
    }

    .feature-icon {
      display: block;
      color: var(--gold);
      font-size: 22px;
      margin-bottom: 12px;
    }

    .feature strong {
      display: block;
      color: var(--cream);
      font-size: 14px;
      margin-bottom: 7px;
      letter-spacing: 1px;
    }

    .feature span {
      color: rgba(247,234,212,0.52);
      font-size: 12px;
      line-height: 1.6;
    }

    .quote {
      margin-top: 32px;
      color: rgba(247,234,212,0.45);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .art {
      position: relative;
      z-index: 12;
      min-height: 650px;
    }

    .art-card {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(247,234,212,0.18);
      border-radius: 30px;
      background:
        linear-gradient(90deg, rgba(5,9,20,0.08), rgba(5,9,20,0)),
        url("hero.png") center / cover no-repeat;
      box-shadow:
        0 34px 100px rgba(0,0,0,0.38),
        inset 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .art-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 45% 18%, rgba(232,201,142,0.1), transparent 24%),
        linear-gradient(180deg, rgba(5,9,20,0.02), rgba(5,9,20,0.28));
      pointer-events: none;
    }

    .art-card::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(232,201,142,0.22);
      border-radius: 24px;
      pointer-events: none;
    }

    .art-note {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 28px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      color: rgba(247,234,212,0.72);
      background: rgba(5, 9, 20, 0.48);
      border: 1px solid rgba(247,234,212,0.14);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      font-size: 14px;
      line-height: 1.7;
    }

    .art-note button {
      flex: 0 0 auto;
      cursor: pointer;
      padding: 11px 16px;
      color: var(--cream);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(247,234,212,0.24);
      border-radius: 999px;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 32;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 7vw;
      color: rgba(247,234,212,0.48);
      background: rgba(5, 9, 20, 0.48);
      border-top: 1px solid rgba(247,234,212,0.09);
      backdrop-filter: blur(10px);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .footer-links {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 100;
      padding: 14px 22px;
      color: var(--cream);
      background: rgba(7, 15, 30, 0.94);
      border: 1px solid rgba(247,234,212,0.22);
      box-shadow: 0 16px 42px rgba(0,0,0,0.34);
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.24s ease;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1100px) {
      .nav {
        display: none;
      }

      .header {
        padding: 24px 24px 0;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 44px 24px 100px;
      }

      .copy {
        max-width: none;
      }

      .art {
        min-height: 620px;
      }

      .features {
        max-width: none;
      }

      .footer {
        position: relative;
        flex-direction: column;
        align-items: flex-start;
        padding: 18px 24px;
      }
    }

    @media (max-width: 680px) {
      .brand-title {
        font-size: 20px;
      }

      .brand-subtitle {
        display: none;
      }

      .language-select {
        min-width: 112px;
        padding: 8px 10px;
      }

      .copy h1 {
        font-size: 42px;
      }

      .desc {
        font-size: 15px;
      }

      .actions {
        display: grid;
      }

      .main-button {
        width: 100%;
      }

      .features {
        grid-template-columns: 1fr 1fr;
      }

      .art {
        min-height: 520px;
      }

      .art-note {
        left: 18px;
        right: 18px;
        bottom: 18px;
        display: block;
      }

      .art-note button {
        margin-top: 12px;
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="stars" id="stars"></div>
    <div class="petals" id="petals"></div>

    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-logo" aria-hidden="true"></span>
        <span>
          <span class="brand-title">宠物纪念园</span>
          <span class="brand-subtitle">爱从未离开 · 思念永不褪色</span>
        </span>
      </a>

      <nav class="nav" aria-label="主导航">
        <a class="active" href="index.html">首页</a>
        <a href="#" id="navGarden">纪念园</a>
        <a href="create.html">创建纪念</a>
        <a href="#" data-soon="故事页面后面制作">故事</a>
      </nav>

      <select class="language-select" id="languageSelect" aria-label="选择语言">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </header>

    <section class="hero">
      <section class="copy">
        <div class="eyebrow">
          <span class="eyebrow-dot"></span>
          <span>一座安静的宠物纪念花园</span>
        </div>

        <h1>
          每一份<span>爱</span><br />
          都值得被温柔铭记
        </h1>

        <div class="divider" aria-hidden="true"></div>

        <p class="desc">
          为离开的爱宠建立一座小小纪念馆。
          写下名字、故事和想说的话，让回忆被温柔保存，也让思念有一个可以回来的地方。
        </p>

        <div class="actions">
          <button class="main-button primary" type="button" id="enterGarden">
            进入纪念园 →
          </button>

          <button class="main-button secondary" type="button" id="createMemorial">
            开始创建 →
          </button>
        </div>

        <section class="features" aria-label="功能介绍">
          <div class="feature">
            <span class="feature-icon">♡</span>
            <strong>专属纪念空间</strong>
            <span>为爱宠创建独一无二的纪念页</span>
          </div>

          <div class="feature">
            <span class="feature-icon">✿</span>
            <strong>珍藏美好回忆</strong>
            <span>保存照片、故事、留言与思念</span>
          </div>

          <div class="feature">
            <span class="feature-icon">▣</span>
            <strong>温暖缅怀氛围</strong>
            <span>让每一次想念都有安放之处</span>
          </div>

          <div class="feature">
            <span class="feature-icon">☆</span>
            <strong>隐私安全守护</strong>
            <span>后续支持公开、邀请、私密访问</span>
          </div>
        </section>

        <div class="quote">“你来过，便是永恒。”</div>
      </section>

      <section class="art" aria-label="纪念园主视觉">
        <div class="art-card">
          <div class="art-note">
            <span>一盏灯，一片花瓣，都是没有说完的想念。</span>
            <button type="button" id="lightButton">点亮心灯</button>
          </div>
        </div>
      </section>
    </section>

    <footer class="footer">
      <div class="footer-links">
        <a href="#" data-soon="关于我们页面后面制作">关于我们</a>
        <a href="#" data-soon="使用条款后面制作">使用条款</a>
        <a href="#" data-soon="隐私政策后面制作">隐私政策</a>
        <a href="#" data-soon="帮助中心后面制作">帮助中心</a>
      </div>

      <div>♥ 用爱延续每一段陪伴</div>
    </footer>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stars = document.getElementById("stars");
    const petals = document.getElementById("petals");
    const toast = document.getElementById("toast");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars() {
      for (let i = 0; i < 52; i += 1) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${random(4, 96)}%`;
        star.style.top = `${random(7, 64)}%`;
        star.style.animationDelay = `${random(0, 4.5)}s`;
        star.style.transform = `scale(${random(0.55, 1.05)})`;
        stars.appendChild(star);
      }
    }

    function createPetals() {
      for (let i = 0; i < 12; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = `${random(8, 94)}%`;
        petal.style.top = `${random(-28, 30)}%`;
        petal.style.setProperty("--drift", `${random(-85, 85)}px`);
        petal.style.animationDuration = `${random(15, 26)}s`;
        petal.style.animationDelay = `${random(0, 16)}s`;
        petals.appendChild(petal);
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function hasSavedMemorial() {
      try {
        const draft = JSON.parse(localStorage.getItem("petMemorialDraft"));
        return Boolean(draft && draft.petName && draft.epitaph);
      } catch (error) {
        return false;
      }
    }

    function openGarden() {
      if (hasSavedMemorial()) {
        window.location.href = "cemetery.html";
        return;
      }

      showToast("还没有创建纪念，先进入创建页面。");

      setTimeout(() => {
        window.location.href = "create.html";
      }, 700);
    }

    document.getElementById("enterGarden").addEventListener("click", () => {
      openGarden();
    });

    document.getElementById("navGarden").addEventListener("click", (event) => {
      event.preventDefault();
      openGarden();
    });

    document.getElementById("createMemorial").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    document.getElementById("lightButton").addEventListener("click", () => {
      showToast("心灯已点亮，愿思念被温柔照亮。");
    });

    document.querySelectorAll("[data-soon]").forEach((item) => {
      item.addEventListener("click", (event) => {
        event.preventDefault();
        showToast(item.dataset.soon);
      });
    });

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      const value = event.target.value;
      localStorage.setItem("petMemorialLanguage", value);
      showToast("语言选择已保存");
    });

    const savedLanguage = localStorage.getItem("petMemorialLanguage");
    if (savedLanguage) {
      document.getElementById("languageSelect").value = savedLanguage;
    }

    createStars();
    createPetals();
  </script>
</body>
</html>
