<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STILLIGHT</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111f}
    button{font:inherit;border:0;padding:0;background:transparent;cursor:pointer}
    .viewport{position:fixed;inset:0;overflow:hidden;background:#07111f}
    .stage{position:absolute;left:50%;top:50%;width:1672px;height:941px;transform-origin:center center;background:linear-gradient(90deg,rgba(5,10,22,.2) 0%,rgba(5,10,22,.06) 56%,rgba(5,10,22,0) 100%),url("assets/bg_v61_option_d.png") center/cover no-repeat;}
    .stage::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.18;background:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.01) 1px,transparent 1px);background-size:4px 4px;}
    .language{position:absolute;right:76px;top:48px;z-index:50}
    .language-button{height:42px;min-width:158px;display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:0 14px;color:rgba(235,205,153,.9);background:rgba(8,17,35,.58);border:2px solid rgba(204,157,88,.62);box-shadow:inset 0 0 0 2px rgba(255,232,178,.04),0 8px 20px rgba(0,0,0,.17);letter-spacing:1px;font-size:15px;font-weight:800}
    .globe-svg{width:19px;height:19px;opacity:.9;flex:none}
    .language-button .arrow{font-size:14px;transform:translateY(-1px);opacity:.78}
    .language-menu{position:absolute;top:50px;right:0;width:158px;display:none;padding:6px;background:rgba(8,16,32,.97);border:2px solid rgba(198,151,85,.58);box-shadow:0 18px 34px rgba(0,0,0,.34)}
    .language.open .language-menu{display:grid;gap:4px}
    .language-menu button{height:34px;color:rgba(235,205,153,.92);font-size:14px;font-weight:800;letter-spacing:.8px}
    .language-menu button:hover,.language-menu button.active{background:rgba(232,191,116,.12)}

    .content-group{position:absolute;left:62px;top:276px;z-index:12;width:700px;display:flex;flex-direction:column;align-items:center}
    .full-logo{display:block;width:430px;height:auto;object-fit:contain;image-rendering:auto;filter:drop-shadow(0 5px 9px rgba(0,0,0,.34))}
    .supporting-copy{display:block;width:680px;height:44px;margin-top:10px;image-rendering:pixelated;image-rendering:crisp-edges}
    .actions{margin-top:16px;display:flex;gap:18px}
    .pixel-button{--gold:#c8913f;--gold-bright:#e0ad58;position:relative;width:218px;height:52px;display:inline-flex;align-items:center;justify-content:center;color:#d6a04c;background:rgba(6,17,34,.32);border:2px solid var(--gold);clip-path:polygon(6px 0,calc(100% - 6px) 0,calc(100% - 6px) 2px,100% 2px,100% calc(100% - 6px),calc(100% - 2px) calc(100% - 6px),calc(100% - 2px) 100%,6px 100%,6px calc(100% - 2px),0 calc(100% - 2px),0 6px,2px 6px,2px 2px,6px 2px);font-family:"Microsoft YaHei","PingFang SC",serif;font-size:16px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 0 rgba(17,12,8,.4);image-rendering:pixelated;transition:color .12s steps(2,end),border-color .12s steps(2,end),background .12s steps(2,end),transform .12s steps(2,end)}
    .pixel-button::before{content:"";position:absolute;left:50%;top:-4px;width:7px;height:7px;transform:translateX(-50%) rotate(45deg);background:var(--gold);box-shadow:0 0 0 2px rgba(6,17,34,.72);pointer-events:none}
    .pixel-button.primary{background:rgba(6,17,34,.32);border-color:var(--gold)}
    .pixel-button:hover{transform:translateY(-2px);color:#f0bf69;background:rgba(10,25,48,.48);border-color:var(--gold-bright)}
    .button-ornament{position:absolute;top:50%;width:11px;height:22px;transform:translateY(-50%);pointer-events:none}
    .button-ornament.left{left:10px}
    .button-ornament.right{right:10px;transform:translateY(-50%) scaleX(-1)}
    .button-ornament::before,.button-ornament::after{content:"";position:absolute;left:4px;width:4px;height:4px;background:var(--gold);box-shadow:3px -4px 0 -1px var(--gold),3px 4px 0 -1px var(--gold)}
    .button-ornament::before{top:5px}
    .button-ornament::after{top:13px}
    .pixel-button .button-label{position:relative;z-index:2}
    .toast{position:fixed;left:50%;bottom:28px;z-index:100;padding:12px 18px;color:#e8c994;background:rgba(9,16,31,.96);border:1px solid rgba(198,151,85,.45);transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;transition:.22s ease;letter-spacing:1px;font:700 15px "Microsoft YaHei","PingFang SC",sans-serif}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body data-version="stillight-homepage-v66-single-gold-frame">
  <main class="viewport">
    <section class="stage" id="stage">
      <div class="language" id="languageBox">
        <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
          <svg class="globe-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" shape-rendering="crispEdges"/>
            <path d="M4 12H20M6 8H18M6 16H18M12 3C9 6 8 9 8 12C8 15 9 18 12 21M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="currentColor" stroke-width="1.6" shape-rendering="crispEdges"/>
          </svg>
          <span id="languageLabel">简体中文</span><span class="arrow">⌄</span>
        </button>
        <div class="language-menu">
          <button type="button" data-lang="zh-CN">简体中文</button>
          <button type="button" data-lang="zh-TW">繁體中文</button>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="ja">日本語</button>
        </div>
      </div>

      <div class="content-group">
        <img class="full-logo" id="fullLogo" src="assets/logo_zh_CN.png" alt="STILLIGHT — 在记忆中，爱依然存在。" />
        <canvas class="supporting-copy" id="supportingCopy" width="510" height="33" role="img" aria-label="让思念，在这里安静停留。"></canvas>
        <div class="actions">
          <button class="pixel-button primary" type="button" id="enterGarden"><i class="button-ornament left" aria-hidden="true"></i><span class="button-label" id="enterText">进入纪念园</span><i class="button-ornament right" aria-hidden="true"></i></button>
          <button class="pixel-button" type="button" id="createMemorial"><i class="button-ornament left" aria-hidden="true"></i><span class="button-label" id="createText">开始创建</span><i class="button-ornament right" aria-hidden="true"></i></button>
        </div>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    const TEXTS={
      "zh-CN":{logo:"assets/logo_zh_CN.png",logoAlt:"STILLIGHT — 在记忆中，爱依然存在。",copy:"让思念，在这里安静停留。",enter:"进入纪念园",create:"开始创建",langLabel:"简体中文",saved:"语言已保存",noMemorial:"还没有创建纪念，先去创建页面。"},
      "zh-TW":{logo:"assets/logo_zh_TW.png",logoAlt:"STILLIGHT — 在記憶中，愛依然存在。",copy:"讓思念，在這裡安靜停留。",enter:"進入紀念園",create:"開始建立",langLabel:"繁體中文",saved:"語言已保存",noMemorial:"還沒有建立紀念，先去建立頁面。"},
      "en":{logo:"assets/logo_en.png",logoAlt:"STILLIGHT — In memory, love remains.",copy:"A quiet place to hold every memory.",enter:"Enter Garden",create:"Create Memorial",langLabel:"English",saved:"Language saved",noMemorial:"No memorial yet. Opening the creation page."},
      "ja":{logo:"assets/logo_ja.png",logoAlt:"STILLIGHT — 記憶の中で、愛は生き続ける。",copy:"想いが、静かに留まる場所。",enter:"記念園へ",create:"作成する",langLabel:"日本語",saved:"言語を保存しました",noMemorial:"まだ記念ページがありません。作成ページへ移動します。"}
    };
    const stage=document.getElementById("stage"),toast=document.getElementById("toast"),languageBox=document.getElementById("languageBox"),languageButton=document.getElementById("languageButton"),fullLogo=document.getElementById("fullLogo"),supportingCopy=document.getElementById("supportingCopy"),languageLabel=document.getElementById("languageLabel"),enterText=document.getElementById("enterText"),createText=document.getElementById("createText");
    function resizeStage(){const scale=Math.max(innerWidth/1672,innerHeight/941);stage.style.transform=`translate(-50%, -50%) scale(${scale})`}
    addEventListener("resize",resizeStage);resizeStage();
    function showToast(message){toast.textContent=message;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),1500)}
    function drawPixelCopy(text,lang){const ctx=supportingCopy.getContext("2d");ctx.clearRect(0,0,supportingCopy.width,supportingCopy.height);ctx.imageSmoothingEnabled=false;ctx.textAlign="center";ctx.textBaseline="middle";ctx.font=(lang==="en"?'700 16px "Courier New",monospace':'900 18px "SimSun","MS Gothic",monospace');ctx.fillStyle="rgba(28,18,10,.46)";ctx.fillText(text,256,18);ctx.fillStyle="#d8a348";ctx.fillText(text,255,17);supportingCopy.setAttribute("aria-label",text)}
    function applyLanguage(lang){const data=TEXTS[lang]||TEXTS["zh-CN"];document.documentElement.lang=lang;fullLogo.src=data.logo;fullLogo.alt=data.logoAlt;drawPixelCopy(data.copy,lang);languageLabel.textContent=data.langLabel;enterText.textContent=data.enter;createText.textContent=data.create;document.querySelectorAll(".language-menu button").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang))}
    function hasSavedMemorial(){try{const draft=JSON.parse(localStorage.getItem("petMemorialDraft"));return Boolean(draft&&draft.petName)}catch(e){return false}}
    function openGarden(){const lang=localStorage.getItem("petMemorialLanguage")||"zh-CN",data=TEXTS[lang]||TEXTS["zh-CN"];if(hasSavedMemorial()){location.href="cemetery.html";return}showToast(data.noMemorial);setTimeout(()=>location.href="create.html",700)}
    document.getElementById("enterGarden").addEventListener("click",openGarden);
    document.getElementById("createMemorial").addEventListener("click",()=>location.href="create.html");
    languageButton.addEventListener("click",e=>{e.stopPropagation();languageBox.classList.toggle("open")});
    document.querySelectorAll(".language-menu button").forEach(button=>button.addEventListener("click",e=>{e.stopPropagation();const lang=button.dataset.lang;localStorage.setItem("petMemorialLanguage",lang);applyLanguage(lang);languageBox.classList.remove("open");showToast((TEXTS[lang]||TEXTS["zh-CN"]).saved)}));
    document.addEventListener("click",()=>languageBox.classList.remove("open"));
    localStorage.setItem("starpawHomeVersion","stillight-homepage-v66-single-gold-frame");
    applyLanguage(localStorage.getItem("petMemorialLanguage")||"zh-CN");
  </script>
</body>
</html>
