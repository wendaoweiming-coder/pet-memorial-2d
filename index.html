<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星爪纪念花园</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="viewport">
    <section class="stage" id="stage">
      <img class="brand-image" id="brandImage" src="assets/brand_zh_CN.png" alt="星爪纪念花园" />

      <div class="language" id="languageBox">
        <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
          <img id="languageImage" src="assets/language_zh_CN.png" alt="简体中文" />
        </button>

        <div class="language-menu">
          <button type="button" data-lang="zh-CN">简体中文</button>
          <button type="button" data-lang="zh-TW">繁體中文</button>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="ja">日本語</button>
        </div>
      </div>

      <img class="hero-image" id="heroImage" src="assets/hero_zh_CN.png" alt="让想念，有一个安静的地方" />

      <div class="actions">
        <button class="real-button" type="button" id="enterGarden">
          <img id="enterImage" src="assets/button_enter_zh_CN.png" alt="进入纪念园" />
        </button>

        <button class="real-button" type="button" id="createMemorial">
          <img id="createImage" src="assets/button_create_zh_CN.png" alt="开始创建" />
        </button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
