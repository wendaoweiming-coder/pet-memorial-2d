<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>选择墓碑｜星归园</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050d19}
body{font-family:"SimSun","Courier New",monospace}
button{font:inherit}
.viewport{position:fixed;inset:0;display:grid;place-items:center;background:#050d19;overflow:hidden}
.stage{
  position:relative;width:1672px;height:941px;transform-origin:center center;overflow:hidden;
  background:
    linear-gradient(90deg,rgba(3,8,20,.78),rgba(3,8,20,.54) 52%,rgba(3,8,20,.44)),
    url("assets/create_garden_bg.png") center/cover no-repeat;
}
.stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.42;
  background:
    linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:4px 4px;
}
.paw{width:34px;height:34px;image-rendering:pixelated}
.header{position:absolute;left:88px;right:96px;top:42px;height:58px;display:flex;align-items:center;justify-content:space-between;z-index:5}
.brand{display:flex;align-items:center;gap:14px}
.top-actions{display:flex;align-items:center;gap:28px}
.pixel-button,.language-button{
  position:relative;height:48px;border:3px solid rgba(219,171,97,.76);background:rgba(5,15,34,.72);
  display:flex;align-items:center;justify-content:center;box-shadow:5px 5px 0 rgba(0,0,0,.24);cursor:pointer;text-decoration:none;
}
.pixel-button{width:148px}
.language-button{width:190px;gap:9px}
.pixel-button::before,.pixel-button::after,.language-button::before,.language-button::after,.panel::before,.panel::after{
  content:"";position:absolute;width:11px;height:11px;border-color:rgba(241,197,119,.88);border-style:solid;pointer-events:none
}
.pixel-button::before,.language-button::before,.panel::before{left:9px;top:9px;border-width:2px 0 0 2px}
.pixel-button::after,.language-button::after,.panel::after{right:9px;bottom:9px;border-width:0 2px 2px 0}
.globe{width:22px;height:22px}
.language{position:relative;z-index:20}
.menu{
  position:absolute;right:0;top:56px;display:none;width:190px;padding:7px;z-index:60;
  background:rgba(5,15,34,.98);border:3px solid rgba(219,171,97,.76);box-shadow:6px 6px 0 rgba(0,0,0,.28)
}
.menu.open{display:grid;gap:4px}
.menu button{height:34px;border:0;background:transparent;color:#e5bd78;cursor:pointer;font:900 16px "SimSun","Courier New",monospace;text-align:left;padding-left:12px}
.menu button:hover{background:rgba(230,190,116,.12)}
.panel{
  position:absolute;background:rgba(4,15,36,.84);border:3px solid rgba(219,171,97,.70);
  box-shadow:inset 0 0 0 2px rgba(255,232,178,.04),8px 8px 0 rgba(0,0,0,.25)
}
.preview-panel{left:80px;top:112px;width:720px;height:780px;padding:30px}
.side-panel{left:830px;top:112px;width:760px;height:780px;padding:30px}
.panel-title{height:36px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.showcase{
  position:relative;width:660px;height:605px;border:3px solid rgba(219,171,97,.55);overflow:hidden;
  background:
    linear-gradient(rgba(6,15,31,.12),rgba(6,15,31,.22)),
    url("assets/create_garden_bg.png") center/cover no-repeat;
  box-shadow:inset 0 0 0 2px rgba(255,232,178,.035)
}
.showcase::after{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.48;
  background:
    linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:4px 4px
}
#mainStone{position:absolute;left:50%;bottom:18px;height:520px;transform:translateX(-50%);image-rendering:pixelated;filter:drop-shadow(12px 13px 0 rgba(0,0,0,.28));z-index:2}
#stoneText{position:absolute;left:50%;top:196px;width:240px;height:220px;transform:translateX(-50%);image-rendering:pixelated;z-index:3;pointer-events:none}
.note{position:absolute;left:30px;bottom:28px;width:660px;height:45px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.card{
  position:relative;height:220px;border:3px solid rgba(219,171,97,.45);background:rgba(3,13,31,.72);
  cursor:pointer;box-shadow:5px 5px 0 rgba(0,0,0,.18);overflow:hidden
}
.card.active{border-color:rgba(241,197,119,.94);background:rgba(230,190,116,.08)}
.card::before,.card::after{content:"";position:absolute;width:10px;height:10px;border-color:rgba(241,197,119,.72);border-style:solid}
.card::before{left:8px;top:8px;border-width:2px 0 0 2px}.card::after{right:8px;bottom:8px;border-width:0 2px 2px 0}
.card img{position:absolute;left:50%;bottom:42px;height:142px;transform:translateX(-50%);image-rendering:pixelated;filter:drop-shadow(5px 6px 0 rgba(0,0,0,.25))}
.card canvas{position:absolute;left:18px;bottom:14px}
.actions{position:absolute;left:30px;right:30px;bottom:30px;display:flex;justify-content:flex-end;gap:18px}
.action{
  position:relative;width:220px;height:52px;border:3px solid rgba(219,171,97,.82);background:linear-gradient(#d8b574,#b99052);
  box-shadow:5px 5px 0 rgba(0,0,0,.24);cursor:pointer
}
.secondary{background:rgba(5,15,34,.75);width:160px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:100;padding:10px 18px;background:rgba(5,15,34,.96);border:2px solid rgba(219,171,97,.78);color:#e5bd78;opacity:0;pointer-events:none;transition:opacity .18s;font:900 16px "SimSun","Courier New",monospace}
.toast.show{opacity:1}
</style>
</head>
<body>
<main class="viewport">
<section class="stage" id="stage">
  <header class="header">
    <div class="brand"><img class="paw" src="assets/paw.png" alt=""><canvas class="txt" data-k="pageTitle" data-w="190" data-h="34" data-size="24"></canvas></div>
    <div class="top-actions">
      <a class="pixel-button" href="create.html"><canvas class="txt" data-k="backCreate" data-w="112" data-h="25" data-size="17"></canvas></a>
      <div class="language">
        <button class="language-button" id="langButton" type="button">
          <svg class="globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="rgba(230,190,116,.86)" stroke-width="2" shape-rendering="crispEdges"/><path d="M4 12H20M6 8H18M6 16H18M12 3C9 6 8 9 8 12C8 15 9 18 12 21M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="rgba(230,190,116,.76)" stroke-width="1.6" shape-rendering="crispEdges"/></svg>
          <canvas class="txt" data-k="languageLabel" data-w="88" data-h="25" data-size="16"></canvas><span style="color:#e5bd78">⌄</span>
        </button>
        <div class="menu" id="langMenu">
          <button data-lang="zh-CN">简体中文</button><button data-lang="zh-TW">繁體中文</button><button data-lang="en">English</button><button data-lang="ja">日本語</button>
        </div>
      </div>
    </div>
  </header>

  <aside class="panel preview-panel">
    <div class="panel-title"><img class="paw" src="assets/paw.png" alt=""><canvas class="txt" data-k="previewTitle" data-w="180" data-h="30" data-size="20"></canvas></div>
    <div class="showcase">
      <img id="mainStone" src="assets/stone_moon_gray.png" alt="">
      <canvas id="stoneText"></canvas>
    </div>
    <canvas class="note txt" data-k="note" data-w="660" data-h="45" data-size="15"></canvas>
  </aside>

  <section class="panel side-panel">
    <div class="panel-title"><img class="paw" src="assets/paw.png" alt=""><canvas class="txt" data-k="chooseTitle" data-w="190" data-h="30" data-size="20"></canvas></div>

    <div class="grid">
      <div class="card active" data-stone="stone_moon_gray.png" data-name="moonGray"><img src="assets/stone_moon_gray.png" alt=""><canvas class="txt" data-k="moonGray" data-w="250" data-h="25" data-size="16"></canvas></div>
      <div class="card" data-stone="stone_warm_sand.png" data-name="warmSand"><img src="assets/stone_warm_sand.png" alt=""><canvas class="txt" data-k="warmSand" data-w="250" data-h="25" data-size="16"></canvas></div>
      <div class="card" data-stone="stone_blue_slate.png" data-name="blueSlate"><img src="assets/stone_blue_slate.png" alt=""><canvas class="txt" data-k="blueSlate" data-w="250" data-h="25" data-size="16"></canvas></div>
      <div class="card" data-stone="stone_moss_old.png" data-name="mossOld"><img src="assets/stone_moss_old.png" alt=""><canvas class="txt" data-k="mossOld" data-w="250" data-h="25" data-size="16"></canvas></div>
    </div>

    <div class="actions">
      <button class="action secondary" type="button" id="backBtn"><canvas class="txt" data-k="back" data-w="130" data-h="28" data-size="17"></canvas></button>
      <button class="action" type="button" id="confirmBtn"><canvas class="txt" data-k="confirm" data-w="190" data-h="28" data-size="17"></canvas></button>
    </div>
  </section>
</section>
</main>
<div class="toast" id="toast"></div>

<script>
const T={
"zh-CN":{pageTitle:"选择墓碑",backCreate:"返回创建",languageLabel:"简体中文",previewTitle:"最终预览",chooseTitle:"选择墓碑样式",note:"选择一种墓碑样式。确认后将进入纪念园页面。",moonGray:"月灰石碑",warmSand:"暖砂石碑",blueSlate:"蓝岩石碑",mossOld:"苔痕旧石",back:"返回",confirm:"确认使用",saved:"墓碑样式已保存"},
"zh-TW":{pageTitle:"選擇墓碑",backCreate:"返回建立",languageLabel:"繁體中文",previewTitle:"最終預覽",chooseTitle:"選擇墓碑樣式",note:"選擇一種墓碑樣式。確認後將進入紀念園頁面。",moonGray:"月灰石碑",warmSand:"暖砂石碑",blueSlate:"藍岩石碑",mossOld:"苔痕舊石",back:"返回",confirm:"確認使用",saved:"墓碑樣式已保存"},
"en":{pageTitle:"Choose Tombstone",backCreate:"Back",languageLabel:"English",previewTitle:"Final Preview",chooseTitle:"Choose Style",note:"Choose a tombstone style. After confirming, you will enter the memorial garden.",moonGray:"Moon Gray",warmSand:"Warm Sand",blueSlate:"Blue Slate",mossOld:"Moss Old",back:"Back",confirm:"Confirm",saved:"Tombstone saved"},
"ja":{pageTitle:"墓碑を選ぶ",backCreate:"戻る",languageLabel:"日本語",previewTitle:"最終プレビュー",chooseTitle:"墓碑スタイル",note:"墓碑の種類を選びます。確認後、記念園ページに進みます。",moonGray:"月灰の石碑",warmSand:"暖砂の石碑",blueSlate:"青岩の石碑",mossOld:"苔むした石碑",back:"戻る",confirm:"これにする",saved:"保存しました"}
};
const S={lang:localStorage.getItem("petMemorialLanguage")||"zh-CN",stone:"stone_moon_gray.png",stoneName:"moonGray"};
const stage=document.getElementById("stage"),stoneText=document.getElementById("stoneText"),toast=document.getElementById("toast");
function tr(k){return(T[S.lang]&&T[S.lang][k])||T["zh-CN"][k]||k}
function resize(){stage.style.transform=`scale(${Math.min(innerWidth/1672,innerHeight/941)})`}addEventListener("resize",resize);resize();
function setup(c,w,h,r=1){c.style.width=w+"px";c.style.height=h+"px";c.width=Math.max(1,Math.floor(w/r));c.height=Math.max(1,Math.floor(h/r));const ctx=c.getContext("2d");ctx.imageSmoothingEnabled=false;return{ctx,r}}
function px(c,text,opt={}){const w=+c.dataset.w||opt.w||c.clientWidth||120,h=+c.dataset.h||opt.h||c.clientHeight||24,size=+c.dataset.size||opt.size||16;const {ctx,r}=setup(c,w,h,opt.ratio||1);ctx.clearRect(0,0,c.width,c.height);ctx.font=`900 ${Math.round(size/r)}px "SimSun","Courier New",monospace`;ctx.textBaseline="top";ctx.textAlign=opt.align||"left";const color=opt.color||"rgba(230,196,126,.92)";String(text||"").split("\\n").forEach((line,i)=>{const y=i*Math.round(size*1.5/r);ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(line,(opt.align==="center"?c.width/2:0)+1,y+1);ctx.fillStyle=color;ctx.fillText(line,opt.align==="center"?c.width/2:0,y)})}
function wrap(ctx,text,max){let out=[],line="";for(const ch of String(text||"")){let test=line+ch;if(ctx.measureText(test).width>max&&line){out.push(line);line=ch}else line=test}if(line)out.push(line);return out}
function drawStoneText(){
  const draft=JSON.parse(localStorage.getItem("petMemorialDraft")||"{}");
  const name=draft.petName||"小布丁";
  const birth=draft.birthDate?draft.birthDate.replaceAll("-","."):"2014.06.12";
  const death=draft.deathDate?draft.deathDate.replaceAll("-","."):"2025.11.03";
  const epi=draft.epitaph||"";
  const {ctx}=setup(stoneText,240,220,1);
  ctx.clearRect(0,0,stoneText.width,stoneText.height);
  ctx.font='900 13px "SimSun","Courier New",monospace';ctx.textAlign="center";ctx.textBaseline="top";
  function line(text,y,size,maxW,maxLines,color){ctx.font=`900 ${size}px "SimSun","Courier New",monospace`;wrap(ctx,text,maxW).slice(0,maxLines).forEach((ln,i)=>{let yy=y+i*Math.round(size*1.35);ctx.fillStyle="rgba(220,210,190,.22)";ctx.fillText(ln,110/2+1,yy+1);ctx.fillStyle=color;ctx.fillText(ln,110/2,yy)})}
  line(name,22,24,150,2,"rgba(38,34,30,.86)");
  line(birth,78,15,150,1,"rgba(42,38,34,.76)");
  line("—",106,15,150,1,"rgba(42,38,34,.76)");
  line(death,134,15,150,1,"rgba(42,38,34,.76)");
  if(epi) line(epi,168,13,150,2,"rgba(42,38,34,.68)");
}
function updateStatic(){document.querySelectorAll(".txt").forEach(c=>px(c,tr(c.dataset.k)||c.dataset.k))}
updateStatic();drawStoneText();

document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click",()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
    card.classList.add("active");
    S.stone=card.dataset.stone;S.stoneName=card.dataset.name;
    document.getElementById("mainStone").src="assets/"+S.stone;
  });
});
document.getElementById("backBtn").onclick=()=>location.href="create.html";
document.getElementById("confirmBtn").onclick=()=>{
  localStorage.setItem("petMemorialStone",JSON.stringify({stone:S.stone,stoneName:S.stoneName}));
  toast.textContent=tr("saved");toast.classList.add("show");setTimeout(()=>{toast.classList.remove("show");location.href="cemetery.html"},650);
};
const langBtn=document.getElementById("langButton"),langMenu=document.getElementById("langMenu");
langBtn.addEventListener("click",e=>{e.stopPropagation();langMenu.classList.toggle("open")});
langMenu.querySelectorAll("button").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.lang=b.dataset.lang;localStorage.setItem("petMemorialLanguage",S.lang);langMenu.classList.remove("open");updateStatic()}));
document.addEventListener("click",()=>langMenu.classList.remove("open"));
</script>
</body>
</html>
