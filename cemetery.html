<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>纪念馆｜宠物纪念园</title>

  <style>
    :root {
      --night-1: #071326;
      --night-2: #0d1d38;
      --cream: #f6ead6;
      --gold: #f4d7a6;
      --paper: rgba(255, 248, 236, 0.96);
      --paper-text: #27304a;
      --line: rgba(255, 236, 205, 0.22);
      --panel: rgba(9, 20, 39, 0.74);
      --muted: rgba(247, 239, 226, 0.68);
      --pink: #e7a9b9;
      --lavender: #b8a7d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        "Microsoft YaHei",
        "PingFang SC",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 70% 16%, rgba(244, 215, 166, 0.18), transparent 13%),
        linear-gradient(180deg, var(--night-1), var(--night-2) 56%, #101f32);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      padding-bottom: 44px;
    }

    .stars,
    .petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 1;
    }

    .petals {
      z-index: 20;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff6d6;
      box-shadow:
        4px 0 #fff6d6,
        0 4px #fff6d6,
        4px 4px #fff6d6;
      opacity: 0.65;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.28;
        transform: scale(0.8);
      }

      50% {
        opacity: 0.92;
        transform: scale(1);
      }
    }

    .moon {
      position: absolute;
      right: 12%;
      top: 95px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #fff9d8 0 10%, transparent 11%),
        radial-gradient(circle at 62% 42%, rgba(165, 150, 120, 0.28) 0 12%, transparent 13%),
        radial-gradient(circle at 43% 68%, rgba(150, 139, 116, 0.23) 0 10%, transparent 11%),
        #f6e8b6;
      box-shadow:
        0 0 32px rgba(255, 236, 180, 0.38),
        0 0 90px rgba(194, 189, 255, 0.16);
      z-index: 2;
    }

    .header {
      position: relative;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 7vw 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      position: relative;
      image-rendering: pixelated;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 16px;
      width: 16px;
      height: 14px;
      background: var(--cream);
      box-shadow:
        -8px -10px 0 -2px var(--cream),
        9px -10px 0 -2px var(--cream),
        -14px 0 0 -3px var(--cream),
        15px 0 0 -3px var(--cream),
        0 12px 0 -5px var(--cream);
      border-radius: 4px;
    }

    .brand-title {
      display: block;
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--cream);
      font-weight: 700;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
    }

    .brand-subtitle {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(246, 234, 214, 0.58);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 26px;
      color: rgba(255, 248, 236, 0.78);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .nav a {
      position: relative;
      padding: 8px 0;
    }

    .nav a.active {
      color: var(--cream);
    }

    .nav a.active::after {
      content: "";
      position: absolute;
      left: 3px;
      right: 3px;
      bottom: -5px;
      height: 3px;
      background: var(--gold);
    }

    .memorial-shell {
      position: relative;
      z-index: 5;
      width: min(1240px, calc(100% - 40px));
      margin: 44px auto 0;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 30px;
      align-items: stretch;
    }

    .garden-card {
      position: relative;
      min-height: 720px;
      background: var(--panel);
      border: 2px solid var(--line);
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.26),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .garden-title {
      position: relative;
      z-index: 8;
      padding: 34px 36px 0;
      max-width: 520px;
    }

    .garden-title h1 {
      margin: 0;
      font-size: clamp(34px, 4vw, 50px);
      letter-spacing: 2px;
      color: var(--cream);
    }

    .garden-title p {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .garden {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .hill {
      position: absolute;
      bottom: 33%;
      height: 170px;
      background: rgba(39, 63, 79, 0.52);
      border-radius: 50% 50% 0 0;
      z-index: 1;
    }

    .hill.one {
      left: -8%;
      width: 46%;
    }

    .hill.two {
      left: 20%;
      width: 54%;
      background: rgba(49, 74, 89, 0.42);
    }

    .hill.three {
      right: -18%;
      width: 66%;
      background: rgba(38, 58, 77, 0.55);
    }

    .ground {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 0;
      height: 52%;
      background:
        radial-gradient(ellipse at 55% 62%, rgba(246, 204, 119, 0.18), transparent 25%),
        radial-gradient(ellipse at 47% 58%, rgba(143, 168, 141, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(35, 73, 74, 0.08), #173028 45%, #10251f 100%);
      border-radius: 60% 40% 0 0 / 22% 18% 0 0;
      z-index: 2;
    }

    .path {
      position: absolute;
      left: 18%;
      bottom: 5%;
      width: 65%;
      height: 36%;
      z-index: 3;
      transform: perspective(320px) rotateX(58deg) rotateZ(-5deg);
      transform-origin: bottom center;
    }

    .stone-step {
      position: absolute;
      width: 92px;
      height: 30px;
      background: #5d6579;
      border: 3px solid rgba(255, 255, 255, 0.12);
      box-shadow: 5px 5px 0 rgba(10, 16, 30, 0.35);
      opacity: 0.82;
    }

    .stone-step.s1 { left: 14%; bottom: 8%; }
    .stone-step.s2 { left: 29%; bottom: 20%; width: 106px; }
    .stone-step.s3 { left: 43%; bottom: 35%; width: 124px; }
    .stone-step.s4 { left: 57%; bottom: 53%; width: 138px; }
    .stone-step.s5 { left: 70%; bottom: 72%; width: 118px; }

    .tree {
      position: absolute;
      right: -70px;
      bottom: 110px;
      width: 260px;
      height: 360px;
      z-index: 5;
      pointer-events: none;
    }

    .trunk {
      position: absolute;
      right: 78px;
      bottom: 0;
      width: 54px;
      height: 246px;
      background:
        linear-gradient(90deg, #2a1f24, #54363b 45%, #241b22);
      box-shadow:
        -14px 42px 0 #2b2027,
        18px 86px 0 #3b2930;
      transform: skewX(-7deg);
    }

    .branch {
      position: absolute;
      background: #3c2931;
      height: 22px;
      transform-origin: left center;
    }

    .branch.b1 {
      width: 170px;
      right: 34px;
      top: 92px;
      transform: rotate(-23deg);
    }

    .branch.b2 {
      width: 120px;
      right: 104px;
      top: 146px;
      transform: rotate(-48deg);
    }

    .branch.b3 {
      width: 130px;
      right: 20px;
      top: 170px;
      transform: rotate(18deg);
    }

    .blossom {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #8d659f;
      box-shadow:
        18px 0 #a77ab1,
        -18px 0 #735789,
        0 18px #b784b0,
        0 -18px #8e6aaa,
        36px 18px #956ca7,
        -36px 20px #694f82,
        16px -34px #b181b6;
      opacity: 0.88;
    }

    .blossom.c1 { right: 8px; top: 54px; }
    .blossom.c2 { right: 84px; top: 30px; transform: scale(1.2); }
    .blossom.c3 { right: 122px; top: 94px; transform: scale(1.1); }
    .blossom.c4 { right: 20px; top: 134px; transform: scale(0.9); }

    .main-tomb-wrap {
      position: absolute;
      left: 50%;
      bottom: 112px;
      width: 280px;
      height: 380px;
      transform: translateX(-50%);
      z-index: 12;
    }

    .main-tomb {
      position: absolute;
      left: 50%;
      bottom: 64px;
      width: 170px;
      height: 232px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #6e7182, #8a8b98 46%, #5c6375);
      border: 5px solid rgba(27, 31, 45, 0.58);
      box-shadow:
        inset 9px 0 0 rgba(255, 255, 255, 0.1),
        inset -10px -8px 0 rgba(0, 0, 0, 0.12),
        14px 14px 0 rgba(5, 12, 24, 0.32);
      transition: 0.25s ease;
    }

    .main-tomb.round {
      border-radius: 82px 82px 8px 8px;
    }

    .main-tomb.soft {
      border-radius: 38px 38px 8px 8px;
    }

    .main-tomb.tall {
      width: 146px;
      height: 260px;
      border-radius: 74px 74px 8px 8px;
    }

    .main-tomb.wide {
      width: 210px;
      height: 198px;
      border-radius: 72px 72px 8px 8px;
    }

    .main-tomb.dark {
      background: linear-gradient(90deg, #4f5364, #747789 46%, #444c5f);
    }

    .main-tomb.pale {
      background: linear-gradient(90deg, #858894, #b4b1b0 46%, #767d8c);
    }

    .main-tomb::before {
      content: "";
      position: absolute;
      left: -14px;
      right: -14px;
      bottom: -30px;
      height: 32px;
      background: #62697c;
      border: 4px solid rgba(27, 31, 45, 0.5);
      box-shadow: inset 5px 5px 0 rgba(255, 255, 255, 0.08);
    }

    .paw-on-stone {
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
      width: 42px;
      height: 36px;
    }

    .paw-on-stone::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 15px;
      width: 20px;
      height: 17px;
      background: rgba(39, 45, 62, 0.75);
      border-radius: 8px 8px 7px 7px;
      box-shadow:
        -9px -9px 0 -4px rgba(39, 45, 62, 0.75),
        9px -9px 0 -4px rgba(39, 45, 62, 0.75),
        -16px 2px 0 -5px rgba(39, 45, 62, 0.75),
        17px 2px 0 -5px rgba(39, 45, 62, 0.75);
    }

    .stone-text {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 96px;
      text-align: center;
      color: rgba(24, 31, 48, 0.82);
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.18);
    }

    .pet-name {
      display: block;
      font-weight: 800;
      font-size: 23px;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .pet-years {
      display: block;
      font-size: 14px;
      letter-spacing: 1px;
      line-height: 1.7;
    }

    .epitaph {
      display: block;
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      opacity: 0.86;
    }

    .lantern {
      position: absolute;
      left: 10px;
      bottom: 42px;
      width: 54px;
      height: 74px;
      background: #2f2730;
      border: 4px solid #1a1720;
      z-index: 14;
      box-shadow:
        0 0 38px rgba(255, 192, 96, 0.55),
        0 0 90px rgba(255, 192, 96, 0.2);
    }

    .lantern::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 12px;
      bottom: 12px;
      background:
        radial-gradient(circle, #fff4b7 0 20%, #ffc15f 21% 48%, rgba(255, 193, 95, 0.1) 49%);
    }

    .flower-bed {
      position: absolute;
      right: 6px;
      bottom: 40px;
      width: 96px;
      height: 64px;
      z-index: 14;
    }

    .flower {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #e9d4d6;
      box-shadow:
        12px 0 #c88aa2,
        0 12px #dfadc5,
        12px 12px #f2e8d8;
    }

    .flower.f1 { left: 0; bottom: 14px; }
    .flower.f2 { left: 32px; bottom: 28px; transform: scale(0.9); }
    .flower.f3 { left: 58px; bottom: 8px; transform: scale(1.15); }

    .can {
      position: absolute;
      left: 112px;
      bottom: 44px;
      width: 38px;
      height: 28px;
      background: #c98b9a;
      border: 3px solid rgba(26, 22, 30, 0.72);
      z-index: 15;
      display: none;
      box-shadow: inset 0 5px 0 rgba(255,255,255,0.2);
    }

    .can.show {
      display: block;
    }

    .cat {
      position: absolute;
      left: -90px;
      bottom: 51px;
      width: 70px;
      height: 50px;
      z-index: 16;
      opacity: 0;
      transition: 1.4s ease;
    }

    .cat.show {
      left: 72px;
      opacity: 1;
    }

    .cat-body {
      position: absolute;
      left: 16px;
      top: 18px;
      width: 44px;
      height: 24px;
      background: #d8c0a8;
      border-radius: 12px 12px 10px 10px;
      box-shadow: inset -10px 0 0 #7a5b52;
    }

    .cat-head {
      position: absolute;
      left: 0;
      top: 7px;
      width: 36px;
      height: 32px;
      background: #d8c0a8;
      border-radius: 11px 11px 13px 13px;
      box-shadow: inset -7px 0 0 #7a5b52;
    }

    .cat-head::before,
    .cat-head::after {
      content: "";
      position: absolute;
      top: -8px;
      width: 14px;
      height: 14px;
      background: #d8c0a8;
      transform: rotate(45deg);
    }

    .cat-head::before {
      left: 3px;
    }

    .cat-head::after {
      right: 3px;
      background: #7a5b52;
    }

    .cat-eyes {
      position: absolute;
      left: 10px;
      top: 16px;
      width: 5px;
      height: 5px;
      background: #1e2431;
      box-shadow: 13px 0 0 #1e2431;
    }

    .cat-tail {
      position: absolute;
      right: 0;
      top: 12px;
      width: 18px;
      height: 10px;
      border-top: 5px solid #7a5b52;
      border-right: 5px solid #7a5b52;
      border-radius: 0 12px 0 0;
    }

    .info-card {
      position: relative;
      padding: 32px;
      background: var(--paper);
      color: var(--paper-text);
      border: 4px solid rgba(255, 255, 255, 0.58);
      box-shadow:
        0 0 0 2px rgba(35, 43, 65, 0.22),
        0 22px 60px rgba(0, 0, 0, 0.26);
      min-height: 720px;
    }

    .info-card::before,
    .info-card::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: rgba(64, 59, 72, 0.25);
      border-style: solid;
    }

    .info-card::before {
      top: 16px;
      left: 16px;
      border-width: 3px 0 0 3px;
    }

    .info-card::after {
      right: 16px;
      bottom: 16px;
      border-width: 0 3px 3px 0;
    }

    .info-head {
      text-align: center;
      margin-bottom: 24px;
    }

    .info-head h2 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
      color: #22283c;
    }

    .info-head p {
      margin: 10px 0 0;
      color: #77717a;
      line-height: 1.7;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .stat {
      padding: 14px 10px;
      background: rgba(255, 255, 255, 0.42);
      border: 2px solid rgba(47, 56, 84, 0.12);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 20px;
      color: #22283c;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: #7b7480;
    }

    .tab-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 22px 0;
    }

    .tab-button {
      min-height: 48px;
      border: 2px solid rgba(47, 56, 84, 0.14);
      background: rgba(255, 255, 255, 0.4);
      color: #3d455f;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .tab-button.active {
      background: rgba(184, 167, 216, 0.28);
      border-color: rgba(130, 102, 164, 0.62);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.62);
    }

    .tab-panel {
      display: none;
      min-height: 250px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.38);
      border: 2px solid rgba(47, 56, 84, 0.12);
    }

    .tab-panel.active {
      display: block;
    }

    .message-list {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .message {
      padding: 14px;
      background: rgba(255, 255, 255, 0.42);
      border: 2px solid rgba(47, 56, 84, 0.1);
      color: #4d5368;
      line-height: 1.7;
    }

    .message strong {
      color: #22283c;
    }

    .message small {
      display: block;
      color: #8a8490;
      margin-top: 6px;
      font-size: 12px;
    }

    .message-form {
      display: grid;
      gap: 10px;
    }

    input,
    textarea {
      width: 100%;
      border: 2px solid rgba(47, 56, 84, 0.18);
      background: rgba(255, 255, 255, 0.56);
      color: #2f3854;
      outline: none;
      padding: 12px 13px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.45);
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.7;
    }

    .album-empty,
    .story-text {
      color: #53596e;
      line-height: 1.9;
      font-size: 14px;
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .album-item {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(184, 167, 216, 0.24), rgba(244, 215, 166, 0.22));
      border: 2px solid rgba(47, 56, 84, 0.12);
      color: #7b7480;
      font-size: 13px;
      text-align: center;
      padding: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 22px;
    }

    .pixel-button {
      min-height: 54px;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .pixel-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .pixel-button.primary {
      background: #152846;
      color: var(--cream);
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.07),
        6px 6px 0 rgba(19, 25, 42, 0.18);
    }

    .pixel-button.secondary {
      background: rgba(255, 255, 255, 0.48);
      color: #2f3854;
      box-shadow:
        inset 0 0 0 3px rgba(47, 56, 84, 0.13),
        6px 6px 0 rgba(47, 56, 84, 0.08);
    }

    .single-petal {
      position: absolute;
      width: 12px;
      height: 7px;
      background: #dd91aa;
      opacity: 0.78;
      border-radius: 10px 0 10px 0;
      image-rendering: pixelated;
      animation: singleFall 3.8s ease-in forwards;
    }

    @keyframes singleFall {
      0% {
        transform: translate3d(0, -30px, 0) rotate(0deg);
        opacity: 0;
      }

      15% {
        opacity: 0.85;
      }

      100% {
        transform: translate3d(var(--drift), 58vh, 0) rotate(260deg);
        opacity: 0.9;
      }
    }

    .petal {
      position: absolute;
      width: 12px;
      height: 7px;
      background: #dd91aa;
      opacity: 0.62;
      border-radius: 10px 0 10px 0;
      animation: fall linear infinite;
      image-rendering: pixelated;
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, -8vh, 0) rotate(0deg);
        opacity: 0;
      }

      12% {
        opacity: 0.72;
      }

      100% {
        transform: translate3d(var(--drift), 105vh, 0) rotate(260deg);
        opacity: 0;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(20px);
      padding: 14px 22px;
      background: rgba(8, 17, 33, 0.94);
      color: var(--cream);
      border: 2px solid rgba(246, 234, 214, 0.22);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 99;
      letter-spacing: 1px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .header {
        padding: 22px 22px 0;
      }

      .nav {
        display: none;
      }

      .memorial-shell {
        grid-template-columns: 1fr;
        width: min(760px, calc(100% - 32px));
      }

      .garden-card,
      .info-card {
        min-height: 620px;
      }
    }

    @media (max-width: 620px) {
      .info-card {
        padding: 28px 22px;
      }

      .stats,
      .tab-buttons,
      .actions {
        grid-template-columns: 1fr;
      }

      .main-tomb-wrap {
        transform: translateX(-50%) scale(0.86);
      }

      .tree {
        right: -130px;
        transform: scale(0.78);
        transform-origin: bottom right;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="stars" id="stars"></div>
    <div class="moon" aria-hidden="true"></div>
    <div class="petals" id="petals"></div>

    <header class="header">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <span class="brand-title">宠物纪念园</span>
          <span class="brand-subtitle">珍藏每一次相遇</span>
        </span>
      </a>

      <nav class="nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="create.html">创建纪念</a>
        <a href="select-stone.html">选择墓碑</a>
        <a class="active" href="cemetery.html">纪念馆</a>
      </nav>
    </header>

    <section class="memorial-shell">
      <section class="garden-card">
        <div class="garden-title">
          <h1 id="pageTitle">小橘的纪念馆</h1>
          <p id="pageSubtitle">
            一片安静的小小花园，放下思念，也保存那些曾经真实发生过的陪伴。
          </p>
        </div>

        <div class="garden">
          <div class="hill one"></div>
          <div class="hill two"></div>
          <div class="hill three"></div>
          <div class="ground"></div>

          <div class="path" aria-hidden="true">
            <span class="stone-step s1"></span>
            <span class="stone-step s2"></span>
            <span class="stone-step s3"></span>
            <span class="stone-step s4"></span>
            <span class="stone-step s5"></span>
          </div>

          <div class="tree" aria-hidden="true">
            <div class="trunk"></div>
            <div class="branch b1"></div>
            <div class="branch b2"></div>
            <div class="branch b3"></div>
            <div class="blossom c1"></div>
            <div class="blossom c2"></div>
            <div class="blossom c3"></div>
            <div class="blossom c4"></div>
          </div>

          <div class="main-tomb-wrap">
            <div class="main-tomb round" id="mainTomb">
              <div class="paw-on-stone"></div>
              <div class="stone-text">
                <span class="pet-name" id="previewName">小橘</span>
                <span class="pet-years" id="previewYears">2012 - 2023</span>
                <span class="epitaph" id="previewEpitaph">谢谢你陪伴我的每一天</span>
              </div>
            </div>

            <div class="lantern" aria-hidden="true"></div>

            <div class="flower-bed" aria-hidden="true">
              <span class="flower f1"></span>
              <span class="flower f2"></span>
              <span class="flower f3"></span>
            </div>

            <div class="can" id="foodCan" aria-hidden="true"></div>

            <div class="cat" id="cat" aria-hidden="true">
              <div class="cat-tail"></div>
              <div class="cat-body"></div>
              <div class="cat-head">
                <div class="cat-eyes"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="info-card">
        <div class="info-head">
          <h2 id="cardTitle">小橘</h2>
          <p id="cardSubtitle">永远被温柔记得</p>
        </div>

        <div class="stats">
          <div class="stat">
            <strong id="petalCount">1</strong>
            <span>花瓣</span>
          </div>

          <div class="stat">
            <strong id="messageCount">2</strong>
            <span>留言</span>
          </div>

          <div class="stat">
            <strong id="companionCount">0</strong>
            <span>陪伴</span>
          </div>
        </div>

        <div class="tab-buttons">
          <button class="tab-button active" type="button" data-tab="messages">留言板</button>
          <button class="tab-button" type="button" data-tab="album">相册</button>
          <button class="tab-button" type="button" data-tab="story">故事</button>
        </div>

        <section class="tab-panel active" id="messages">
          <div class="message-list" id="messageList"></div>

          <form class="message-form" id="messageForm">
            <input id="visitorName" type="text" placeholder="你的名字" />
            <textarea id="visitorMessage" placeholder="写下你想对它说的话……"></textarea>
            <button class="pixel-button primary" type="submit">留下留言和一片花瓣</button>
          </form>
        </section>

        <section class="tab-panel" id="album">
          <div class="album-empty">
            照片上传预览已经在创建页做好了。下一步我们会把照片真正带到这里，分成公开照片、隐私照片和墓碑展示照片。
          </div>

          <div class="album-grid">
            <div class="album-item">照片位置</div>
            <div class="album-item">照片位置</div>
            <div class="album-item">照片位置</div>
          </div>
        </section>

        <section class="tab-panel" id="story">
          <div class="story-text" id="storyText">
            这里会显示它的故事。
          </div>
        </section>

        <div class="actions">
          <button class="pixel-button secondary" type="button" id="editButton">返回修改</button>
          <button class="pixel-button primary" type="button" id="foodButton">放一罐罐头</button>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stars = document.getElementById("stars");
    const petals = document.getElementById("petals");
    const toast = document.getElementById("toast");

    const pageTitle = document.getElementById("pageTitle");
    const previewName = document.getElementById("previewName");
    const previewYears = document.getElementById("previewYears");
    const previewEpitaph = document.getElementById("previewEpitaph");
    const cardTitle = document.getElementById("cardTitle");
    const cardSubtitle = document.getElementById("cardSubtitle");
    const mainTomb = document.getElementById("mainTomb");
    const storyText = document.getElementById("storyText");

    const petalCount = document.getElementById("petalCount");
    const messageCount = document.getElementById("messageCount");
    const companionCount = document.getElementById("companionCount");
    const messageList = document.getElementById("messageList");

    const foodCan = document.getElementById("foodCan");
    const cat = document.getElementById("cat");

    let messages = [];
    let petalsTotal = 1;
    let companionTotal = 0;

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStars() {
      for (let i = 0; i < 46; i += 1) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${random(4, 96)}%`;
        star.style.top = `${random(8, 62)}%`;
        star.style.animationDelay = `${random(0, 4)}s`;
        star.style.transform = `scale(${random(0.55, 1.1)})`;
        stars.appendChild(star);
      }
    }

    function createPetals() {
      for (let i = 0; i < 12; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = `${random(8, 95)}%`;
        petal.style.top = `${random(-30, 30)}%`;
        petal.style.setProperty("--drift", `${random(-80, 80)}px`);
        petal.style.animationDuration = `${random(15, 25)}s`;
        petal.style.animationDelay = `${random(0, 15)}s`;
        petals.appendChild(petal);
      }
    }

    function dropSinglePetal() {
      const petal = document.createElement("span");
      petal.className = "single-petal";
      petal.style.left = `${random(42, 62)}%`;
      petal.style.top = "16%";
      petal.style.setProperty("--drift", `${random(-60, 60)}px`);
      petals.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 4200);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1900);
    }

    function getDraft() {
      try {
        return JSON.parse(localStorage.getItem("petMemorialDraft")) || null;
      } catch (error) {
        return null;
      }
    }

    function saveDraft(draft) {
      localStorage.setItem("petMemorialDraft", JSON.stringify(draft));
    }

    function formatYears(draft) {
      const birth = draft.birthDate ? draft.birthDate.slice(0, 4) : "";
      const death = draft.deathDate ? draft.deathDate.slice(0, 4) : "";

      if (birth && death) {
        return `${birth} - ${death}`;
      }

      if (death) {
        return `离开于 ${death}`;
      }

      return "永远被爱";
    }

    function applyStone(stone) {
      const shape = stone?.shape || "round";
      const color = stone?.color || "normal";

      mainTomb.className = `main-tomb ${shape}`;

      if (color !== "normal") {
        mainTomb.classList.add(color);
      }
    }

    function loadMemorial() {
      const draft = getDraft();

      if (!draft) {
        messages = [
          {
            name: "妈妈",
            text: "小橘，今天也很想你。愿你在另一边自由奔跑。",
            time: "刚刚"
          },
          {
            name: "路过的人",
            text: "留下一片花瓣，愿这份爱一直被记得。",
            time: "刚刚"
          }
        ];

        renderMessages();
        updateStats();
        return;
      }

      const name = draft.petName || "小橘";
      const years = formatYears(draft);
      const epitaph = draft.epitaph || "谢谢你陪伴我的每一天";

      pageTitle.textContent = `${name}的纪念馆`;
      previewName.textContent = name;
      previewYears.textContent = years;
      previewEpitaph.textContent = epitaph;
      cardTitle.textContent = name;
      cardSubtitle.textContent = epitaph;

      storyText.textContent = draft.story || "这里还没有写下故事。你可以回到创建页面，为它补上一段属于你们的回忆。";

      applyStone(draft.stone);

      messages = draft.messages || [
        {
          name: "妈妈",
          text: `${name}，今天也很想你。愿你在另一边自由奔跑。`,
          time: "刚刚"
        },
        {
          name: "路过的人",
          text: "留下一片花瓣，愿这份爱一直被记得。",
          time: "刚刚"
        }
      ];

      petalsTotal = draft.petalsTotal || 1;
      companionTotal = draft.companionTotal || 0;

      if (companionTotal > 0) {
        foodCan.classList.add("show");
        cat.classList.add("show");
      }

      renderMessages();
      updateStats();
    }

    function renderMessages() {
      messageList.innerHTML = "";

      messages.forEach((message) => {
        const item = document.createElement("div");
        item.className = "message";
        item.innerHTML = `
          <strong>${escapeHTML(message.name)}</strong>
          <div>${escapeHTML(message.text)}</div>
          <small>${escapeHTML(message.time)}</small>
        `;
        messageList.appendChild(item);
      });

      messageCount.textContent = messages.length;
    }

    function updateStats() {
      petalCount.textContent = petalsTotal;
      messageCount.textContent = messages.length;
      companionCount.textContent = companionTotal;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => {
        const target = button.dataset.tab;

        document.querySelectorAll(".tab-button").forEach((item) => {
          item.classList.remove("active");
        });

        document.querySelectorAll(".tab-panel").forEach((panel) => {
          panel.classList.remove("active");
        });

        button.classList.add("active");
        document.getElementById(target).classList.add("active");
      });
    });

    document.getElementById("messageForm").addEventListener("submit", (event) => {
      event.preventDefault();

      const nameInput = document.getElementById("visitorName");
      const messageInput = document.getElementById("visitorMessage");

      const name = nameInput.value.trim() || "路过的人";
      const text = messageInput.value.trim();

      if (!text) {
        showToast("请先写下一句话");
        return;
      }

      messages.unshift({
        name,
        text,
        time: "刚刚"
      });

      petalsTotal += 1;

      const draft = getDraft() || {};
      draft.messages = messages;
      draft.petalsTotal = petalsTotal;
      saveDraft(draft);

      nameInput.value = "";
      messageInput.value = "";

      renderMessages();
      updateStats();
      dropSinglePetal();
      showToast("留言已留下，一片花瓣落下了");
    });

    document.getElementById("foodButton").addEventListener("click", () => {
      foodCan.classList.add("show");

      setTimeout(() => {
        cat.classList.add("show");
      }, 300);

      companionTotal = Math.max(companionTotal, 1);

      const draft = getDraft() || {};
      draft.companionTotal = companionTotal;
      saveDraft(draft);

      updateStats();
      showToast("一只小猫被罐头吸引过来了");
    });

    document.getElementById("editButton").addEventListener("click", () => {
      window.location.href = "create.html";
    });

    createStars();
    createPetals();
    loadMemorial();

    setTimeout(() => {
      dropSinglePetal();
    }, 900);
  </script>
</body>
</html>
