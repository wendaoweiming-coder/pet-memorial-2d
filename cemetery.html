<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>纪念园｜星归园</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050d19}
body{font-family:"SimSun","Courier New",monospace;color:#e5bd78}
.stage{position:absolute;left:50%;top:50%;width:1672px;height:941px;transform-origin:center center;background:linear-gradient(rgba(4,9,22,.58),rgba(4,9,22,.70)),url("assets/create_garden_bg.png") center/cover no-repeat;display:grid;place-items:center}
.card{width:760px;height:420px;border:3px solid rgba(219,171,97,.76);background:rgba(4,15,36,.84);box-shadow:8px 8px 0 rgba(0,0,0,.25);display:grid;place-items:center;text-align:center;font-size:28px;font-weight:900}
a{color:#e5bd78}
</style>
<link rel="stylesheet" href="assets/global-language.css" />
</head>
<body>
<div class="stage" id="stage">
  <div class="language-fixed" id="languageBox">
    <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
      <svg class="globe-svg" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" shape-rendering="crispEdges"/>
        <path d="M4 12H20M6 8H18M6 16H18M12 3C9 6 8 9 8 12C8 15 9 18 12 21M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="currentColor" stroke-width="1.6" shape-rendering="crispEdges"/>
      </svg>
      <span class="language-label" id="languageLabel">简体中文</span><span class="lang-arrow">⌄</span>
    </button>
    <div class="language-menu">
      <button type="button" data-lang="zh-CN">简体中文</button>
      <button type="button" data-lang="zh-TW">繁體中文</button>
      <button type="button" data-lang="en">English</button>
      <button type="button" data-lang="ja">日本語</button>
    </div>
  </div>
  <div class="card"><div><span id="pageCopy">纪念园页面占位</span><br><br><a id="backLink" href="create.html">返回创建页</a></div></div>
</div>
<script>
const TEXTS={
  "zh-CN":{label:"简体中文",copy:"纪念园页面占位",back:"返回创建页"},
  "zh-TW":{label:"繁體中文",copy:"紀念園頁面預留",back:"返回建立頁"},
  "en":{label:"English",copy:"Memorial garden placeholder",back:"Back to creation"},
  "ja":{label:"日本語",copy:"記念園ページ",back:"作成ページへ戻る"}
};
const stage=document.getElementById("stage");
function resizeStage(){const scale=Math.max(innerWidth/1672,innerHeight/941);stage.style.transform=`translate(-50%, -50%) scale(${scale})`}
addEventListener("resize",resizeStage);resizeStage();
const languageBox=document.getElementById("languageBox");
const languageButton=document.getElementById("languageButton");
function applyLanguage(lang){
  const data=TEXTS[lang]||TEXTS["zh-CN"];
  document.documentElement.lang=lang;
  document.getElementById("languageLabel").textContent=data.label;
  document.getElementById("pageCopy").textContent=data.copy;
  document.getElementById("backLink").textContent=data.back;
  document.querySelectorAll(".language-menu button").forEach(button=>button.classList.toggle("active",button.dataset.lang===lang));
}
languageButton.addEventListener("click",event=>{event.stopPropagation();languageBox.classList.toggle("open")});
document.querySelectorAll(".language-menu button").forEach(button=>button.addEventListener("click",event=>{
  event.stopPropagation();
  localStorage.setItem("petMemorialLanguage",button.dataset.lang);
  applyLanguage(button.dataset.lang);
  languageBox.classList.remove("open");
}));
document.addEventListener("click",()=>languageBox.classList.remove("open"));
applyLanguage(localStorage.getItem("petMemorialLanguage")||"zh-CN");
</script>
</body>
</html>
