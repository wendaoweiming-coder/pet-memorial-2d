<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建纪念｜星归园</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --gold: #e6c47e;
      --gold-soft: rgba(230,196,126,.78);
      --gold-dim: rgba(230,196,126,.45);
      --panel: rgba(6,17,36,.86);
      --field: rgba(3,12,28,.92);
      --dark: rgba(0,0,0,.30);
      --stage-w: 1672px;
      --stage-h: 941px;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050d19;
      color: var(--gold);
      font-family: "Courier New", "SimSun", monospace;
    }

    button, input, textarea { font: inherit; }

    .viewport {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #050d19;
    }

    .stage {
      position: relative;
      width: var(--stage-w);
      height: var(--stage-h);
      transform-origin: center center;
      background:
        linear-gradient(90deg, rgba(5,10,22,.74), rgba(5,10,22,.54) 48%, rgba(5,10,22,.36)),
        url("assets/bg.png") center center / cover no-repeat;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 4px 4px;
      opacity: .55;
      z-index: 1;
    }

    .topbar {
      position: absolute;
      left: 72px;
      right: 72px;
      top: 38px;
      height: 52px;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .top-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .pixel-btn, .language-button {
      position: relative;
      width: 140px;
      height: 46px;
      padding: 0;
      border: 2px solid rgba(230,196,126,.72);
      background: rgba(6,17,36,.78);
      color: var(--gold);
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.055),
        5px 5px 0 rgba(0,0,0,.22);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .language-button { width: 178px; gap: 8px; cursor: pointer; }

    .pixel-btn::before, .pixel-btn::after,
    .language-button::before, .language-button::after,
    .panel::before, .panel::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      pointer-events: none;
      border-color: rgba(244,203,126,.82);
      border-style: solid;
    }

    .pixel-btn::before, .language-button::before, .panel::before {
      left: 8px;
      top: 8px;
      border-width: 2px 0 0 2px;
    }

    .pixel-btn::after, .language-button::after, .panel::after {
      right: 8px;
      bottom: 8px;
      border-width: 0 2px 2px 0;
    }

    .globe-svg {
      width: 20px;
      height: 20px;
    }

    .language {
      position: relative;
      z-index: 20;
    }

    .language-menu {
      position: absolute;
      top: 54px;
      right: 0;
      width: 178px;
      display: none;
      padding: 6px;
      border: 2px solid rgba(230,196,126,.72);
      background: rgba(6,17,36,.98);
      box-shadow: 5px 5px 0 rgba(0,0,0,.28);
    }

    .language.open .language-menu { display: grid; gap: 4px; }

    .language-menu button {
      height: 34px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .language-menu button:hover { background: rgba(230,196,126,.10); }

    .layout {
      position: absolute;
      left: 96px;
      right: 96px;
      top: 102px;
      bottom: 54px;
      z-index: 4;
      display: grid;
      grid-template-columns: 540px 1fr;
      gap: 26px;
    }

    .panel {
      position: relative;
      border: 2px solid rgba(230,196,126,.62);
      background: var(--panel);
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.04),
        8px 8px 0 rgba(0,0,0,.24);
    }

    .preview-panel { padding: 24px; }
    .form-panel { padding: 24px 28px; }

    .panel-title {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 36px;
      margin-bottom: 16px;
    }

    .panel-title img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .preview-frame {
      position: relative;
      width: 480px;
      height: 560px;
      margin: 14px auto 18px;
      border: 2px solid rgba(230,196,126,.54);
      background: rgba(2,10,22,.82);
      box-shadow: inset 0 0 0 2px rgba(255,232,178,.035);
    }

    #stoneCanvas {
      display: block;
      width: 480px;
      height: 560px;
      image-rendering: pixelated;
    }

    .preview-note {
      width: 480px;
      margin: 0 auto;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 26px;
      row-gap: 16px;
    }

    .section-bar {
      grid-column: 1 / -1;
      height: 38px;
      display: flex;
      align-items: center;
      background: rgba(230,196,126,.09);
      border-left: 4px solid rgba(230,196,126,.78);
      padding-left: 14px;
      margin-top: 2px;
    }

    .field {
      min-height: 78px;
      display: grid;
      grid-template-rows: 24px 48px;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .field.tall {
      min-height: 128px;
      grid-template-rows: 24px 98px;
    }

    .pixel-field {
      position: relative;
      height: 48px;
      border: 2px solid rgba(230,196,126,.58);
      background: var(--field);
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.03),
        4px 4px 0 rgba(0,0,0,.16);
    }

    .field.tall .pixel-field { height: 98px; }

    .real-input {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      color: transparent;
      caret-color: var(--gold);
      background: transparent;
      padding: 0 14px;
      resize: none;
    }

    textarea.real-input {
      padding-top: 12px;
      line-height: 1.55;
    }

    .real-input::selection { background: rgba(230,196,126,.30); color: transparent; }

    input[type="date"].real-input {
      opacity: 0;
      cursor: pointer;
    }

    .pixel-display {
      position: absolute;
      left: 12px;
      top: 0;
      z-index: 2;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .field.tall .pixel-display { top: 8px; }

    .count-canvas {
      position: absolute;
      right: 10px;
      bottom: 6px;
      z-index: 4;
      image-rendering: pixelated;
      pointer-events: none;
    }

    .select-field { cursor: pointer; }

    .select-menu {
      position: absolute;
      left: -2px;
      right: -2px;
      top: 50px;
      display: none;
      padding: 6px;
      border: 2px solid rgba(230,196,126,.65);
      background: rgba(5,15,33,.98);
      box-shadow: 5px 5px 0 rgba(0,0,0,.22);
      z-index: 30;
    }

    .select-field.open .select-menu { display: grid; gap: 4px; }

    .select-menu button {
      height: 32px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .select-menu button:hover { background: rgba(230,196,126,.12); }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 18px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid rgba(230,196,126,.86);
      z-index: 4;
      pointer-events: none;
    }

    .date-icon {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 22px;
      height: 22px;
      z-index: 2;
      pointer-events: none;
    }

    .date-icon::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 5px;
      width: 16px;
      height: 14px;
      border: 2px solid rgba(230,196,126,.75);
      box-shadow: inset 0 4px 0 rgba(230,196,126,.18);
    }

    .date-icon::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 2px;
      width: 3px;
      height: 6px;
      background: rgba(230,196,126,.78);
      box-shadow: 8px 0 0 rgba(230,196,126,.78);
    }

    .visibility-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .choice {
      position: relative;
      height: 74px;
      border: 2px solid rgba(230,196,126,.46);
      background: rgba(3,12,28,.78);
      box-shadow: 4px 4px 0 rgba(0,0,0,.14);
      cursor: pointer;
      padding: 12px 14px 10px 48px;
    }

    .choice.active {
      border-color: rgba(244,203,126,.88);
      background: rgba(230,196,126,.09);
    }

    .choice .radio {
      position: absolute;
      left: 15px;
      top: 16px;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(230,196,126,.78);
      border-radius: 50%;
    }

    .choice.active .radio::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 8px;
      height: 8px;
      background: rgba(230,196,126,.90);
      border-radius: 50%;
    }

    .upload-area {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 320px repeat(5, 1fr);
      gap: 12px;
    }

    .upload-main,
    .upload-slot {
      position: relative;
      height: 84px;
      border: 2px dashed rgba(230,196,126,.48);
      background: rgba(3,12,28,.62);
      box-shadow: 4px 4px 0 rgba(0,0,0,.12);
      cursor: pointer;
      overflow: hidden;
    }

    .upload-slot {
      border-style: solid;
      border-color: rgba(230,196,126,.32);
    }

    .upload-slot::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      background: url("assets/paw.png") center / contain no-repeat;
      image-rendering: pixelated;
      opacity: .18;
    }

    .upload-slot img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .upload-slot.filled img { display: block; }
    .upload-slot.filled::before { display: none; }

    .remove {
      position: absolute;
      right: 5px;
      top: 5px;
      width: 20px;
      height: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(230,196,126,.72);
      background: rgba(4,12,28,.92);
      color: var(--gold);
      font-size: 15px;
      z-index: 3;
      cursor: pointer;
    }

    .upload-slot.filled .remove { display: flex; }

    .submit-row {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .submit-button {
      width: 236px;
      height: 50px;
      border: 2px solid rgba(230,196,126,.80);
      background: linear-gradient(#d3b06f, #b89054);
      color: #081225;
      box-shadow: 5px 5px 0 rgba(0,0,0,.22);
      font-weight: 900;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      z-index: 100;
      padding: 12px 18px;
      background: rgba(5,14,30,.96);
      border: 2px solid rgba(230,196,126,.65);
      color: var(--gold);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .toast.show { opacity: 1; }
  </style>
</head>

<body>
  <main class="viewport">
    <section class="stage" id="stage">
      <header class="topbar">
        <div class="brand">
          <img src="assets/paw.png" alt="" />
          <canvas class="pixel-text" data-key="pageTitle" data-w="180" data-h="34" data-size="24"></canvas>
        </div>

        <div class="top-actions">
          <a class="pixel-btn" href="index.html">
            <canvas class="pixel-text" data-key="backHome" data-w="112" data-h="24" data-size="17"></canvas>
          </a>

          <div class="language" id="languageBox">
            <button class="language-button" type="button" id="languageButton">
              <svg class="globe-svg" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9" fill="none" stroke="rgba(232,201,148,.86)" stroke-width="2" shape-rendering="crispEdges"/>
                <path d="M4 12H20" fill="none" stroke="rgba(232,201,148,.82)" stroke-width="2" shape-rendering="crispEdges"/>
                <path d="M6 8H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/>
                <path d="M6 16H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/>
                <path d="M12 3C9 6 8 9 8 12C8 15 9 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/>
                <path d="M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/>
              </svg>
              <canvas class="pixel-text" data-key="languageLabel" data-w="88" data-h="24" data-size="16"></canvas>
              <span>⌄</span>
            </button>

            <div class="language-menu">
              <button type="button" data-lang="zh-CN"><canvas class="pixel-text" data-text="简体中文" data-w="120" data-h="24" data-size="15"></canvas></button>
              <button type="button" data-lang="zh-TW"><canvas class="pixel-text" data-text="繁體中文" data-w="120" data-h="24" data-size="15"></canvas></button>
              <button type="button" data-lang="en"><canvas class="pixel-text" data-text="English" data-w="120" data-h="24" data-size="15"></canvas></button>
              <button type="button" data-lang="ja"><canvas class="pixel-text" data-text="日本語" data-w="120" data-h="24" data-size="15"></canvas></button>
            </div>
          </div>
        </div>
      </header>

      <section class="layout">
        <aside class="panel preview-panel">
          <div class="panel-title">
            <img src="assets/paw.png" alt="" />
            <canvas class="pixel-text" data-key="previewTitle" data-w="160" data-h="28" data-size="20"></canvas>
          </div>

          <div class="preview-frame">
            <canvas id="stoneCanvas" width="240" height="280"></canvas>
          </div>

          <canvas class="preview-note pixel-text" data-key="previewNote" data-w="480" data-h="54" data-size="15"></canvas>
        </aside>

        <section class="panel form-panel">
          <div class="panel-title">
            <img src="assets/paw.png" alt="" />
            <canvas class="pixel-text" data-key="formTitle" data-w="160" data-h="28" data-size="20"></canvas>
          </div>

          <form class="form-grid" id="memorialForm">
            <div class="section-bar"><canvas class="pixel-text" data-key="basicSection" data-w="160" data-h="24" data-size="17"></canvas></div>

            <div class="field">
              <canvas class="pixel-text" data-key="petNameLabel" data-w="160" data-h="24" data-size="15"></canvas>
              <div class="pixel-field">
                <canvas class="pixel-display" id="petNameDisplay"></canvas>
                <input class="real-input" id="petName" maxlength="20" autocomplete="off" />
              </div>
            </div>

            <div class="field">
              <canvas class="pixel-text" data-key="petTypeLabel" data-w="160" data-h="24" data-size="15"></canvas>
              <div class="pixel-field select-field" id="petTypeField">
                <canvas class="pixel-display" id="petTypeDisplay"></canvas>
                <span class="select-arrow"></span>
                <div class="select-menu" id="petTypeMenu">
                  <button type="button" data-value="cat"><canvas class="pixel-text" data-key="cat" data-w="110" data-h="24" data-size="15"></canvas></button>
                  <button type="button" data-value="dog"><canvas class="pixel-text" data-key="dog" data-w="110" data-h="24" data-size="15"></canvas></button>
                  <button type="button" data-value="rabbit"><canvas class="pixel-text" data-key="rabbit" data-w="110" data-h="24" data-size="15"></canvas></button>
                  <button type="button" data-value="bird"><canvas class="pixel-text" data-key="bird" data-w="110" data-h="24" data-size="15"></canvas></button>
                  <button type="button" data-value="other"><canvas class="pixel-text" data-key="other" data-w="110" data-h="24" data-size="15"></canvas></button>
                </div>
              </div>
            </div>

            <div class="field">
              <canvas class="pixel-text" data-key="birthLabel" data-w="160" data-h="24" data-size="15"></canvas>
              <div class="pixel-field">
                <canvas class="pixel-display" id="birthDisplay"></canvas>
                <span class="date-icon"></span>
                <input class="real-input" id="birthDate" type="date" />
              </div>
            </div>

            <div class="field">
              <canvas class="pixel-text" data-key="deathLabel" data-w="160" data-h="24" data-size="15"></canvas>
              <div class="pixel-field">
                <canvas class="pixel-display" id="deathDisplay"></canvas>
                <span class="date-icon"></span>
                <input class="real-input" id="deathDate" type="date" />
              </div>
            </div>

            <div class="section-bar"><canvas class="pixel-text" data-key="wordsSection" data-w="160" data-h="24" data-size="17"></canvas></div>

            <div class="field full tall">
              <canvas class="pixel-text" data-key="epitaphLabel" data-w="160" data-h="24" data-size="15"></canvas>
              <div class="pixel-field">
                <canvas class="pixel-display" id="epitaphDisplay"></canvas>
                <textarea class="real-input" id="epitaph" maxlength="120"></textarea>
                <canvas class="count-canvas" id="epitaphCount"></canvas>
              </div>
            </div>

            <div class="field full tall">
              <canvas class="pixel-text" data-key="storyLabel" data-w="220" data-h="24" data-size="15"></canvas>
              <div class="pixel-field">
                <canvas class="pixel-display" id="storyDisplay"></canvas>
                <textarea class="real-input" id="story" maxlength="300"></textarea>
                <canvas class="count-canvas" id="storyCount"></canvas>
              </div>
            </div>

            <div class="section-bar"><canvas class="pixel-text" data-key="visibilitySection" data-w="160" data-h="24" data-size="17"></canvas></div>

            <div class="visibility-row" id="visibilityRow">
              <div class="choice active" data-value="public">
                <span class="radio"></span>
                <canvas class="pixel-text" data-key="public" data-w="120" data-h="22" data-size="15"></canvas>
                <canvas class="pixel-text" data-key="publicDesc" data-w="190" data-h="22" data-size="12"></canvas>
              </div>
              <div class="choice" data-value="invite">
                <span class="radio"></span>
                <canvas class="pixel-text" data-key="invite" data-w="120" data-h="22" data-size="15"></canvas>
                <canvas class="pixel-text" data-key="inviteDesc" data-w="190" data-h="22" data-size="12"></canvas>
              </div>
              <div class="choice" data-value="private">
                <span class="radio"></span>
                <canvas class="pixel-text" data-key="private" data-w="120" data-h="22" data-size="15"></canvas>
                <canvas class="pixel-text" data-key="privateDesc" data-w="190" data-h="22" data-size="12"></canvas>
              </div>
            </div>

            <div class="section-bar"><canvas class="pixel-text" data-key="photoSection" data-w="200" data-h="24" data-size="17"></canvas></div>

            <div class="upload-area">
              <div class="upload-main" id="uploadMain">
                <canvas class="pixel-text" data-key="uploadMain" data-w="290" data-h="34" data-size="15" style="position:absolute;left:18px;top:24px;"></canvas>
              </div>
              <div class="upload-slot"><img alt=""><button type="button" class="remove">×</button></div>
              <div class="upload-slot"><img alt=""><button type="button" class="remove">×</button></div>
              <div class="upload-slot"><img alt=""><button type="button" class="remove">×</button></div>
              <div class="upload-slot"><img alt=""><button type="button" class="remove">×</button></div>
              <div class="upload-slot"><img alt=""><button type="button" class="remove">×</button></div>
              <input id="photoInput" type="file" accept="image/*" multiple hidden />
            </div>

            <div class="submit-row">
              <button class="submit-button" type="submit">
                <canvas class="pixel-text" data-key="submit" data-w="190" data-h="28" data-size="18"></canvas>
              </button>
            </div>
          </form>
        </section>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const TEXTS = {
      "zh-CN": {
        pageTitle: "创建纪念", backHome: "返回首页", languageLabel: "简体中文",
        previewTitle: "墓碑预览", previewNote: "这里是您的墓碑预览效果。填写右侧信息，墓碑将实时更新。",
        formTitle: "纪念信息", basicSection: "基础信息", wordsSection: "文字纪念", visibilitySection: "可见范围", photoSection: "照片（最多5张）",
        petNameLabel: "爱宠名字", petTypeLabel: "爱宠种类", birthLabel: "出生日期", deathLabel: "离开日期",
        epitaphLabel: "墓志铭", storyLabel: "公开的故事（选填）",
        petNamePlaceholder: "请输入爱宠名字", petTypePlaceholder: "请选择爱宠种类", birthPlaceholder: "年 / 月 / 日", deathPlaceholder: "年 / 月 / 日",
        epitaphPlaceholder: "写下您想对爱宠说的话...", storyPlaceholder: "记录一段属于你们的故事，分享这份爱与回忆...",

        epitaphPlaceholder: "伝えたい言葉を書く...", storyPlaceholder: "あなたたちの物語を書く...",

    };

    const state = {
      lang: localStorage.getItem("petMemorialLanguage") || "zh-CN",
      petType: "",
      visibility: "public",
      photos: []
    };

    const stage = document.getElementById("stage");
    const toast = document.getElementById("toast");
    const stoneCanvas = document.getElementById("stoneCanvas");
    const stoneCtx = stoneCanvas.getContext("2d");
    const sceneImage = new Image();
    sceneImage.src = "assets/preview_scene_blank.png";

    const fields = {
      petName: document.getElementById("petName"),
      birthDate: document.getElementById("birthDate"),
      deathDate: document.getElementById("deathDate"),
      epitaph: document.getElementById("epitaph"),
      story: document.getElementById("story")
    };

    const displays = {
      petName: document.getElementById("petNameDisplay"),
      birthDate: document.getElementById("birthDisplay"),
      deathDate: document.getElementById("deathDisplay"),
      epitaph: document.getElementById("epitaphDisplay"),
      story: document.getElementById("storyDisplay"),
      petType: document.getElementById("petTypeDisplay"),
      epitaphCount: document.getElementById("epitaphCount"),
      storyCount: document.getElementById("storyCount")
    };

    function resizeStage() {
      const scale = Math.min(window.innerWidth / 1672, window.innerHeight / 941);
      stage.style.transform = `scale(${scale})`;
    }
    window.addEventListener("resize", resizeStage);
    resizeStage();

    function currentText(key) {
      return (TEXTS[state.lang] && TEXTS[state.lang][key]) || TEXTS["zh-CN"][key] || key;
    }

    function setupCanvas(canvas, width, height, scale = 2) {
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      canvas.width = Math.max(1, Math.floor(width / scale));
      canvas.height = Math.max(1, Math.floor(height / scale));
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      return { ctx, scale, w: canvas.width, h: canvas.height };
    }

    function drawPixelText(canvas, text, options = {}) {
      const w = Number(canvas.dataset.w) || options.width || canvas.parentElement.clientWidth || 120;
      const h = Number(canvas.dataset.h) || options.height || canvas.parentElement.clientHeight || 28;
      const scale = options.scale || 2;
      const { ctx } = setupCanvas(canvas, w, h, scale);
      const size = Math.max(6, Math.round((Number(canvas.dataset.size) || options.size || 16) / scale));
      const color = options.color || "rgba(230,196,126,.92)";
      const shadow = options.shadow ?? true;
      const x = Math.round((options.x ?? 0) / scale);
      let y = Math.round((options.y ?? (h * .68)) / scale);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = `900 ${size}px "SimSun", "Courier New", monospace`;
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = color;

      const lines = String(text || "").split("\\n");
      lines.forEach((line, idx) => {
        const yy = y + idx * Math.round(size * 1.55);
        if (shadow) {
          ctx.fillStyle = "rgba(28,18,10,.55)";
          ctx.fillText(line, x + 1, yy + 1);
        }
        ctx.fillStyle = color;
        ctx.fillText(line, x, yy);
      });
    }

    function wrapText(ctx, text, maxWidth) {
      const result = [];
      let line = "";
      const chars = String(text || "").split("");
      chars.forEach(char => {
        const test = line + char;
        if (ctx.measureText(test).width > maxWidth && line) {
          result.push(line);
          line = char;
        } else {
          line = test;
        }
      });
      if (line) result.push(line);
      return result;
    }

    function drawPixelField(canvas, text, placeholder, options = {}) {
      const parent = canvas.parentElement;
      const width = parent.clientWidth - 24;
      const height = parent.clientHeight - (parent.clientHeight > 60 ? 14 : 0);
      const { ctx } = setupCanvas(canvas, width, height, 2);
      const hasValue = Boolean(String(text || "").trim());
      const content = hasValue ? text : placeholder;
      const size = Math.round((options.size || 18) / 2);
      const color = hasValue ? "rgba(238,205,141,.95)" : "rgba(214,173,105,.62)";

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = `900 ${size}px "SimSun", "Courier New", monospace`;
      ctx.textBaseline = "top";
      ctx.fillStyle = color;

      if (options.multiline) {
        const lines = wrapText(ctx, content, canvas.width - 12).slice(0, options.maxLines || 3);
        lines.forEach((line, i) => {
          ctx.fillStyle = "rgba(28,18,10,.55)";
          ctx.fillText(line, 1, 1 + i * Math.round(size * 1.6));
          ctx.fillStyle = color;
          ctx.fillText(line, 0, i * Math.round(size * 1.6));
        });
      } else {
        const line = String(content || "").slice(0, 38);
        ctx.fillStyle = "rgba(28,18,10,.55)";
        ctx.fillText(line, 1, Math.round((canvas.height - size) / 2) + 2);
        ctx.fillStyle = color;
        ctx.fillText(line, 0, Math.round((canvas.height - size) / 2) + 1);
      }
    }

    function drawAllStaticTexts() {
      document.querySelectorAll(".pixel-text").forEach(canvas => {
        const text = canvas.dataset.text || currentText(canvas.dataset.key);
        drawPixelText(canvas, text);
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function formatDate(value) {
      return value ? value.replaceAll("-", ".") : "----.--.--";
    }

    function drawStoneText(ctx, text, x, y, maxWidth, size, color = "rgba(39,34,30,.86)", maxLines = 1) {
      ctx.font = `900 ${size}px "SimSun", "Courier New", monospace`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      const lines = wrapText(ctx, text, maxWidth).slice(0, maxLines);
      lines.forEach((line, i) => {
        const yy = y + i * Math.round(size * 1.35);
        ctx.fillStyle = "rgba(210,202,184,.22)";
        ctx.fillText(line, x + 1, yy + 1);
        ctx.fillStyle = color;
        ctx.fillText(line, x, yy);
      });
    }

    function updatePreview() {
      stoneCtx.clearRect(0, 0, 240, 280);
      stoneCtx.imageSmoothingEnabled = false;
      if (sceneImage.complete) stoneCtx.drawImage(sceneImage, 0, 0, 240, 280);

      const name = fields.petName.value.trim() || currentText("petNamePlaceholder");
      const birth = formatDate(fields.birthDate.value);
      const death = formatDate(fields.deathDate.value);
      const epi = fields.epitaph.value.trim() || currentText("epitaphPlaceholder");

      drawStoneText(stoneCtx, name, 120, 137, 76, 12, "rgba(38,34,30,.86)", 2);
      drawStoneText(stoneCtx, `${birth}\\n${death}`, 120, 168, 82, 7, "rgba(42,38,34,.76)", 2);
      drawStoneText(stoneCtx, epi, 120, 196, 82, 7, "rgba(42,38,34,.68)", 2);

      drawPixelField(displays.petName, fields.petName.value, currentText("petNamePlaceholder"));
      drawPixelField(displays.birthDate, fields.birthDate.value ? fields.birthDate.value.replaceAll("-", " / ") : "", currentText("birthPlaceholder"));
      drawPixelField(displays.deathDate, fields.deathDate.value ? fields.deathDate.value.replaceAll("-", " / ") : "", currentText("deathPlaceholder"));
      drawPixelField(displays.epitaph, fields.epitaph.value, currentText("epitaphPlaceholder"), { multiline: true, maxLines: 3, size: 18 });
      drawPixelField(displays.story, fields.story.value, currentText("storyPlaceholder"), { multiline: true, maxLines: 3, size: 18 });
      drawPixelField(displays.petType, state.petType ? currentText(state.petType) : "", currentText("petTypePlaceholder"));

      drawPixelText(displays.epitaphCount, `${fields.epitaph.value.length}/120`, { width: 62, height: 20, size: 12, x: 0, y: 14, shadow: false });
      drawPixelText(displays.storyCount, `${fields.story.value.length}/300`, { width: 62, height: 20, size: 12, x: 0, y: 14, shadow: false });
    }

    sceneImage.onload = updatePreview;

    Object.values(fields).forEach(field => {
      field.addEventListener("input", updatePreview);
      field.addEventListener("change", updatePreview);
    });

    ["birthDate", "deathDate"].forEach(id => {
      const input = fields[id];
      input.parentElement.addEventListener("click", () => {
        input.focus();
        if (typeof input.showPicker === "function") input.showPicker();
      });
    });

    const petTypeField = document.getElementById("petTypeField");
    petTypeField.addEventListener("click", event => {
      event.stopPropagation();
      petTypeField.classList.toggle("open");
    });
    document.querySelectorAll("#petTypeMenu button").forEach(btn => {
      btn.addEventListener("click", event => {
        event.stopPropagation();
        state.petType = btn.dataset.value;
        petTypeField.classList.remove("open");
        updatePreview();
      });
    });

    document.querySelectorAll(".choice").forEach(choice => {
      choice.addEventListener("click", () => {
        document.querySelectorAll(".choice").forEach(el => el.classList.remove("active"));
        choice.classList.add("active");
        state.visibility = choice.dataset.value;
      });
    });

    const languageBox = document.getElementById("languageBox");
    document.getElementById("languageButton").addEventListener("click", event => {
      event.stopPropagation();
      languageBox.classList.toggle("open");
    });
    document.querySelectorAll(".language-menu button").forEach(btn => {
      btn.addEventListener("click", event => {
        event.stopPropagation();
        state.lang = btn.dataset.lang;
        localStorage.setItem("petMemorialLanguage", state.lang);
        languageBox.classList.remove("open");
        drawAllStaticTexts();
        updatePreview();
      });
    });
    document.addEventListener("click", () => {
      languageBox.classList.remove("open");
      petTypeField.classList.remove("open");
    });

    const photoInput = document.getElementById("photoInput");
    const uploadMain = document.getElementById("uploadMain");
    const uploadSlots = Array.from(document.querySelectorAll(".upload-slot"));
    uploadMain.addEventListener("click", () => photoInput.click());
    uploadSlots.forEach(slot => slot.addEventListener("click", () => photoInput.click()));

    function renderPhotos() {
      uploadSlots.forEach((slot, index) => {
        const img = slot.querySelector("img");
        const file = state.photos[index];
        if (file) {
          img.src = URL.createObjectURL(file);
          slot.classList.add("filled");
        } else {
          img.removeAttribute("src");
          slot.classList.remove("filled");
        }
      });
    }

    photoInput.addEventListener("change", () => {
      state.photos = Array.from(photoInput.files || []).slice(0, 5);
      renderPhotos();
    });

    uploadSlots.forEach((slot, index) => {
      slot.querySelector(".remove").addEventListener("click", event => {
        event.stopPropagation();
        state.photos.splice(index, 1);
        renderPhotos();
      });
    });

    document.getElementById("memorialForm").addEventListener("submit", event => {
      event.preventDefault();
      const petName = fields.petName.value.trim();
      if (!petName) {
        showToast(currentText("needName"));
        fields.petName.focus();
        return;
      }
      const draft = {
        petName,
        petType: state.petType,
        birthDate: fields.birthDate.value,
        deathDate: fields.deathDate.value,
        epitaph: fields.epitaph.value.trim(),
        story: fields.story.value.trim(),
        visibility: state.visibility,
        photoCount: state.photos.length,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem("petMemorialDraft", JSON.stringify(draft));
      showToast(currentText("saved"));
    });

    drawAllStaticTexts();
    updatePreview();
  </script>
</body>
