<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>创建纪念｜星归园</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050d19}
  body{font-family:"SimSun","Courier New",monospace}
  .viewport{position:fixed;inset:0;display:grid;place-items:center;overflow:hidden;background:#050d19}
  .stage{position:relative;width:1672px;height:941px;transform-origin:center center;overflow:hidden}
  #uiCanvas{position:absolute;inset:0;width:1672px;height:941px;image-rendering:pixelated}
  .hit,.home-link{position:absolute;z-index:30;background:transparent;border:0;cursor:pointer;text-decoration:none}
  .home-link{left:1270px;top:38px;width:142px;height:50px}
  .lang-hit{left:1430px;top:38px;width:178px;height:50px}
  .field{position:absolute;z-index:25}
  .field input,.field textarea{
    position:absolute;inset:0;width:100%;height:100%;border:0;outline:0;background:transparent;
    color:transparent;caret-color:#e4bf78;resize:none;font:20px "SimSun","Courier New",monospace;
  }
  .field input::selection,.field textarea::selection{background:rgba(224,184,112,.25);color:transparent}
  .field textarea{line-height:1.5}
  #petNameWrap{left:672px;top:190px;width:438px;height:38px}
  #typeWrap{left:1168px;top:190px;width:356px;height:38px}
  #birthWrap{left:672px;top:285px;width:386px;height:38px}
  #deathWrap{left:1168px;top:285px;width:354px;height:38px}
  #epitaphWrap{left:672px;top:374px;width:862px;height:72px}
  #storyWrap{left:672px;top:501px;width:862px;height:72px}
  .date-input{opacity:0;cursor:pointer}
  .type-menu,.lang-menu{
    position:absolute;z-index:70;display:none;padding:6px;
    background:rgba(5,15,34,.98);border:2px solid rgba(211,165,96,.78);
    box-shadow:6px 6px 0 rgba(0,0,0,.28)
  }
  .type-menu.open,.lang-menu.open{display:grid;gap:4px}
  .type-menu{left:1168px;top:232px;width:356px}
  .lang-menu{left:1430px;top:92px;width:178px}
  .type-menu button,.lang-menu button{height:34px;border:0;background:transparent;color:#e4bf78;cursor:pointer;font:900 16px "SimSun","Courier New",monospace;text-align:left;padding:0 12px}
  .type-menu button:hover,.lang-menu button:hover{background:rgba(224,184,112,.12)}
  .vis{position:absolute;z-index:25;background:transparent;border:0;cursor:pointer}
  .vis.public{left:678px;top:613px;width:276px;height:74px}
  .vis.invite{left:970px;top:613px;width:276px;height:74px}
  .vis.private{left:1262px;top:613px;width:276px;height:74px}
  .upload-main{position:absolute;left:679px;top:730px;width:324px;height:85px;z-index:25;background:transparent;border:0;cursor:pointer}
  .slot{position:absolute;top:730px;width:103px;height:85px;z-index:28;cursor:pointer;overflow:hidden}
  .slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
  .slot.filled img{display:block}
  .slot .remove{display:none;position:absolute;right:4px;top:4px;width:20px;height:20px;z-index:5;border:1px solid rgba(224,184,112,.75);background:rgba(4,12,28,.95);color:#e3bd78;cursor:pointer}
  .slot.filled .remove{display:block}
  .slot1{left:1018px}.slot2{left:1128px}.slot3{left:1238px}.slot4{left:1348px}.slot5{left:1458px}
  .submit-hit{position:absolute;left:1342px;top:843px;width:226px;height:48px;z-index:30;background:transparent;border:0;cursor:pointer}
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:100;padding:10px 18px;
    background:rgba(5,15,34,.96);border:2px solid rgba(211,165,96,.78);color:#e3bd78;
    opacity:0;pointer-events:none;transition:opacity .18s ease;font:900 16px "SimSun","Courier New",monospace;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
<main class="viewport">
  <section class="stage" id="stage">
    <canvas id="uiCanvas" width="1672" height="941"></canvas>

    <a class="home-link" href="index.html" aria-label="返回首页"></a>
    <button class="hit lang-hit" type="button" id="langButton" aria-label="选择语言"></button>
    <div class="lang-menu" id="langMenu">
      <button type="button" data-lang="zh-CN">简体中文</button>
      <button type="button" data-lang="zh-TW">繁體中文</button>
      <button type="button" data-lang="en">English</button>
      <button type="button" data-lang="ja">日本語</button>
    </div>

    <div class="field" id="petNameWrap"><input id="petName" maxlength="20" value="小布丁" autocomplete="off"></div>
    <div class="field" id="typeWrap"><input id="typeFake" readonly tabindex="-1"></div>
    <div class="type-menu" id="typeMenu">
      <button type="button" data-value="猫">猫</button>
      <button type="button" data-value="狗">狗</button>
      <button type="button" data-value="兔子">兔子</button>
      <button type="button" data-value="鸟">鸟</button>
      <button type="button" data-value="其他">其他</button>
    </div>
    <div class="field" id="birthWrap"><input class="date-input" id="birthDate" type="date" value="2014-06-12"></div>
    <div class="field" id="deathWrap"><input class="date-input" id="deathDate" type="date" value="2025-11-03"></div>
    <div class="field" id="epitaphWrap"><textarea id="epitaph" maxlength="120"></textarea></div>
    <div class="field" id="storyWrap"><textarea id="story" maxlength="300"></textarea></div>

    <button class="vis public" data-value="public"></button>
    <button class="vis invite" data-value="invite"></button>
    <button class="vis private" data-value="private"></button>

    <button class="upload-main" id="uploadMain" type="button"></button>
    <div class="slot slot1"><img alt=""><button class="remove" type="button">×</button></div>
    <div class="slot slot2"><img alt=""><button class="remove" type="button">×</button></div>
    <div class="slot slot3"><img alt=""><button class="remove" type="button">×</button></div>
    <div class="slot slot4"><img alt=""><button class="remove" type="button">×</button></div>
    <div class="slot slot5"><img alt=""><button class="remove" type="button">×</button></div>
    <input id="photoInput" type="file" accept="image/*" multiple hidden>

    <button class="submit-hit" type="button" id="submitBtn" aria-label="创建纪念"></button>
  </section>
</main>
<div class="toast" id="toast"></div>

<script>
const stage=document.getElementById("stage");
const canvas=document.getElementById("uiCanvas");
const ctx=canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;
const base=new Image();
base.src="assets/create-ui-base.png";

const state={lang:localStorage.getItem("petMemorialLanguage")||"zh-CN",type:"",visibility:"public",photos:[]};
const TEXT={
  "zh-CN":{namePH:"请输入爱宠名字",typePH:"请选择爱宠种类",birthPH:"年 / 月 / 日",deathPH:"年 / 月 / 日",epiPH:"写下您想对爱宠说的话...",storyPH:"记录一段属于你们的故事，分享这份爱与回忆...",upload:"点击上传照片\\n支持 JPG、PNG 格式，单张不超过 5MB",needName:"请先填写爱宠名字",saved:"纪念信息已保存"},
  "zh-TW":{namePH:"請輸入愛寵名字",typePH:"請選擇愛寵種類",birthPH:"年 / 月 / 日",deathPH:"年 / 月 / 日",epiPH:"寫下您想對愛寵說的話...",storyPH:"記錄一段屬於你們的故事，分享這份愛與回憶...",upload:"點擊上傳照片\\n支援 JPG、PNG 格式，單張不超過 5MB",needName:"請先填寫愛寵名字",saved:"紀念資訊已保存"},
  "en":{namePH:"Enter pet name",typePH:"Choose pet type",birthPH:"yyyy / mm / dd",deathPH:"yyyy / mm / dd",epiPH:"Write what you want to say...",storyPH:"Record a story that belongs to you...",upload:"Upload photos\\nJPG, PNG, under 5MB each",needName:"Please enter pet name",saved:"Memorial saved"},
  "ja":{namePH:"名前を入力",typePH:"種類を選択",birthPH:"年 / 月 / 日",deathPH:"年 / 月 / 日",epiPH:"伝えたい言葉を書く...",storyPH:"あなたたちの物語を書く...",upload:"写真をアップロード\\nJPG、PNG、1枚5MB以下",needName:"名前を入力してください",saved:"保存しました"}
};
const t=k=>(TEXT[state.lang]&&TEXT[state.lang][k])||TEXT["zh-CN"][k]||k;

const petName=document.getElementById("petName");
const birth=document.getElementById("birthDate");
const death=document.getElementById("deathDate");
const epitaph=document.getElementById("epitaph");
const story=document.getElementById("story");
const toast=document.getElementById("toast");

function resize(){
  const scale=Math.min(window.innerWidth/1672,window.innerHeight/941);
  stage.style.transform=`scale(${scale})`;
}
window.addEventListener("resize",resize);resize();

function showToast(msg){
  toast.textContent=msg;toast.classList.add("show");
  clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),1500);
}

function drawPxText(text,x,y,size,opt={}){
  const scale=opt.scale||2;
  const off=document.createElement("canvas");
  const maxW=opt.maxW||420, maxH=opt.maxH||120;
  off.width=Math.ceil(maxW/scale); off.height=Math.ceil(maxH/scale);
  const c=off.getContext("2d"); c.imageSmoothingEnabled=false;
  c.font=`900 ${Math.round(size/scale)}px "SimSun","Courier New",monospace`;
  c.textBaseline="top"; c.textAlign=opt.align||"left";
  const color=opt.color||"rgba(226,189,116,.92)";
  const shadow=opt.shadow!==false;
  const lines=String(text||"").split("\\n");
  const lineH=Math.round(size*1.48/scale);
  lines.forEach((line,i)=>{
    const yy=i*lineH;
    if(shadow){c.fillStyle="rgba(24,16,10,.55)";c.fillText(line,(opt.align==="center"?off.width/2:0)+1,yy+1);}
    c.fillStyle=color;c.fillText(line,opt.align==="center"?off.width/2:0,yy);
  });
  ctx.imageSmoothingEnabled=false;
  if(opt.align==="center") ctx.drawImage(off,Math.round(x-maxW/2),y,maxW,maxH);
  else ctx.drawImage(off,x,y,maxW,maxH);
}
function drawWrapped(text,x,y,maxW,size,maxLines,color){
  const scale=2;
  const off=document.createElement("canvas");
  off.width=Math.ceil(maxW/scale);off.height=100;
  const c=off.getContext("2d");
  c.font=`900 ${Math.round(size/scale)}px "SimSun","Courier New",monospace`;
  const chars=String(text||"").split("");let line="",lines=[];
  for(const ch of chars){
    const test=line+ch;
    if(c.measureText(test).width>off.width-4&&line){lines.push(line);line=ch;}else line=test;
  }
  if(line)lines.push(line);
  lines.slice(0,maxLines).forEach((line,i)=>{
    drawPxText(line,x,y+i*Math.round(size*1.5),size,{maxW,maxH:size*2,color});
  });
}
function fmtDate(v){return v?v.replaceAll("-","."):"----.--.--"}
function fmtFieldDate(v){return v?v.replaceAll("-"," / "):""}

function render(){
  if(!base.complete)return;
  ctx.clearRect(0,0,1672,941);
  ctx.drawImage(base,0,0,1672,941);

  const name=petName.value.trim();
  const type=state.type;
  const b=fmtFieldDate(birth.value), de=fmtFieldDate(death.value);
  const epi=epitaph.value.trim(), st=story.value.trim();

  drawPxText(name||t("namePH"),690,202,18,{maxW:390,maxH:36,color:name?"rgba(230,196,126,.94)":"rgba(211,166,97,.72)"});
  drawPxText(type||t("typePH"),1170,202,18,{maxW:320,maxH:36,color:type?"rgba(230,196,126,.94)":"rgba(211,166,97,.72)"});
  drawPxText(b||t("birthPH"),690,297,20,{maxW:330,maxH:36,color:b?"rgba(230,196,126,.94)":"rgba(226,189,116,.88)"});
  drawPxText(de||t("deathPH"),1170,297,20,{maxW:320,maxH:36,color:de?"rgba(230,196,126,.94)":"rgba(226,189,116,.88)"});
  drawWrapped(epi||t("epiPH"),686,392,740,17,3,epi?"rgba(230,196,126,.94)":"rgba(211,166,97,.72)");
  drawWrapped(st||t("storyPH"),686,519,740,17,3,st?"rgba(230,196,126,.94)":"rgba(211,166,97,.72)");
  drawPxText(`${epitaph.value.length}/120`,1496,418,13,{maxW:55,maxH:20,color:"rgba(226,189,116,.86)",shadow:false});
  drawPxText(`${story.value.length}/300`,1496,545,13,{maxW:55,maxH:20,color:"rgba(226,189,116,.86)",shadow:false});

  const ringX={public:693,invite:985,private:1277}[state.visibility];
  ctx.fillStyle="rgba(226,189,116,.92)";
  ctx.beginPath();ctx.arc(ringX+10,633+10,5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="rgba(226,189,116,.55)";
  ctx.lineWidth=2;
  const outline={public:[678,613,276,74],invite:[970,613,276,74],private:[1262,613,276,74]}[state.visibility];
  ctx.strokeRect(outline[0]+2,outline[1]+2,outline[2]-4,outline[3]-4);

  drawPxText(t("upload"),772,756,13,{maxW:220,maxH:46,color:"rgba(211,166,97,.78)"});

  const xs=[1018,1128,1238,1348,1458];
  state.photos.forEach((p,i)=>{if(p.img&&p.img.complete)ctx.drawImage(p.img,xs[i],730,103,85);});

  const stoneName=name||"小布丁";
  const stoneBirth=fmtDate(birth.value||"2014-06-12");
  const stoneDeath=fmtDate(death.value||"2025-11-03");
  drawPxText(stoneName,388,386,22,{maxW:130,maxH:42,color:"rgba(40,35,30,.86)",align:"center",shadow:true});
  drawPxText(stoneBirth,388,430,14,{maxW:126,maxH:22,color:"rgba(42,38,34,.78)",align:"center",shadow:true});
  drawPxText("—",388,456,14,{maxW:126,maxH:22,color:"rgba(42,38,34,.76)",align:"center",shadow:true});
  drawPxText(stoneDeath,388,482,14,{maxW:126,maxH:22,color:"rgba(42,38,34,.78)",align:"center",shadow:true});
  if(epi) drawWrapped(epi,330,522,116,12,2,"rgba(42,38,34,.68)");
}
base.onload=render;

[petName,birth,death,epitaph,story].forEach(el=>{el.addEventListener("input",render);el.addEventListener("change",render);});
[birth,death].forEach(el=>el.parentElement.addEventListener("click",()=>{el.focus();if(el.showPicker)el.showPicker();}));

const typeWrap=document.getElementById("typeWrap"),typeMenu=document.getElementById("typeMenu");
typeWrap.addEventListener("click",e=>{e.stopPropagation();typeMenu.classList.toggle("open");});
typeMenu.querySelectorAll("button").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();state.type=btn.dataset.value;typeMenu.classList.remove("open");render();}));

document.querySelectorAll(".vis").forEach(btn=>btn.addEventListener("click",()=>{state.visibility=btn.dataset.value;render();}));

const langButton=document.getElementById("langButton"),langMenu=document.getElementById("langMenu");
langButton.addEventListener("click",e=>{e.stopPropagation();langMenu.classList.toggle("open");});
langMenu.querySelectorAll("button").forEach(btn=>btn.addEventListener("click",e=>{e.stopPropagation();state.lang=btn.dataset.lang;localStorage.setItem("petMemorialLanguage",state.lang);langMenu.classList.remove("open");render();}));
document.addEventListener("click",()=>{langMenu.classList.remove("open");typeMenu.classList.remove("open");});

const input=document.getElementById("photoInput"),slots=[...document.querySelectorAll(".slot")];
document.getElementById("uploadMain").addEventListener("click",()=>input.click());
slots.forEach(slot=>slot.addEventListener("click",()=>input.click()));
input.addEventListener("change",()=>{
  state.photos=[];
  [...input.files].slice(0,5).forEach(file=>{
    const img=new Image();
    const obj={file,img};
    img.onload=render;
    img.src=URL.createObjectURL(file);
    state.photos.push(obj);
  });
  updateSlots();
  render();
});
function updateSlots(){
  slots.forEach((slot,i)=>{
    if(state.photos[i])slot.classList.add("filled");else slot.classList.remove("filled");
  });
}
slots.forEach((slot,i)=>slot.querySelector(".remove").addEventListener("click",e=>{e.stopPropagation();state.photos.splice(i,1);updateSlots();render();}));

document.getElementById("submitBtn").addEventListener("click",()=>{
  if(!petName.value.trim()){showToast(t("needName"));petName.focus();return;}
  localStorage.setItem("petMemorialDraft",JSON.stringify({petName:petName.value.trim(),petType:state.type,birthDate:birth.value,deathDate:death.value,epitaph:epitaph.value.trim(),story:story.value.trim(),visibility:state.visibility,photoCount:state.photos.length,savedAt:new Date().toISOString()}));
  showToast(t("saved"));
});
setTimeout(render,100);
</script>
</body>
</html>
