<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建纪念｜星归园</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #07111f;
      --panel: rgba(7, 17, 34, .78);
      --panel-strong: rgba(7, 17, 34, .92);
      --field: rgba(4, 12, 26, .86);
      --gold: rgba(232, 201, 148, .92);
      --gold-soft: rgba(232, 213, 178, .70);
      --gold-dim: rgba(232, 213, 178, .48);
      --line: rgba(205, 157, 91, .68);
      --line-soft: rgba(205, 157, 91, .38);
      --shadow: rgba(0, 0, 0, .26);
      --font-pixel: "SimSun", "宋体", "Courier New", monospace;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--gold);
      font-family: var(--font-pixel);
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
    }

    body { overflow-x: hidden; }

    button,
    input,
    textarea,
    select { font: inherit; }

    button { border: 0; cursor: pointer; }

    .page {
      min-height: 100vh;
      position: relative;
      padding: 34px 58px 52px;
      background:
        linear-gradient(90deg, rgba(5, 10, 22, .72), rgba(5, 10, 22, .53) 48%, rgba(5, 10, 22, .35)),
        url("assets/bg.png") center center / cover fixed no-repeat;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 24% 16%, rgba(246, 218, 154, .09), transparent 18%);
    }

    .topbar {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 rgba(17, 12, 8, .55);
    }

    .brand img,
    .panel-title img,
    .small-paw {
      width: 24px;
      height: 24px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pixel-control,
    .language-button,
    .main-button,
    .ghost-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: var(--gold);
      background: rgba(7, 16, 32, .76);
      border: 2px solid var(--line);
      box-shadow:
        inset 0 0 0 2px rgba(255, 232, 178, .045),
        5px 5px 0 var(--shadow);
      text-decoration: none;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(17, 12, 8, .38);
      line-height: 1;
    }

    .pixel-control,
    .language-button { height: 42px; padding: 0 16px; }

    .pixel-control::before,
    .pixel-control::after,
    .language-button::before,
    .language-button::after,
    .panel::before,
    .panel::after,
    .mini-card::before,
    .mini-card::after,
    .choice::before,
    .choice::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      pointer-events: none;
      border-color: rgba(236, 191, 116, .74);
      border-style: solid;
    }

    .pixel-control::before,
    .language-button::before,
    .panel::before,
    .mini-card::before,
    .choice::before {
      left: 8px;
      top: 8px;
      border-width: 2px 0 0 2px;
    }

    .pixel-control::after,
    .language-button::after,
    .panel::after,
    .mini-card::after,
    .choice::after {
      right: 8px;
      bottom: 8px;
      border-width: 0 2px 2px 0;
    }

    .globe-svg {
      width: 19px;
      height: 19px;
      opacity: .88;
      flex: none;
    }

    .language { position: relative; z-index: 30; }

    .language-menu {
      position: absolute;
      right: 0;
      top: 50px;
      width: 152px;
      display: none;
      padding: 6px;
      background: rgba(8, 16, 32, .98);
      border: 2px solid var(--line);
      box-shadow: 6px 6px 0 rgba(0, 0, 0, .28);
    }

    .language.open .language-menu { display: grid; gap: 4px; }

    .language-menu button {
      height: 34px;
      color: var(--gold);
      background: transparent;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .8px;
    }

    .language-menu button:hover,
    .language-menu button.active { background: rgba(232, 191, 116, .12); }

    .layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 430px minmax(650px, 930px);
      gap: 34px;
      max-width: 1400px;
      margin: 0 auto;
      align-items: start;
    }

    .panel {
      position: relative;
      background: var(--panel);
      border: 2px solid rgba(205, 157, 91, .62);
      box-shadow:
        inset 0 0 0 2px rgba(255, 232, 178, .04),
        8px 8px 0 var(--shadow);
    }

    .left-panel { padding: 24px; min-height: 640px; }
    .form-panel { padding: 24px 26px 26px; }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 20px;
      color: rgba(238, 213, 167, .96);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(17, 12, 8, .42);
    }

    .ornament-line {
      position: relative;
      height: 2px;
      width: 100%;
      margin: 0 0 26px;
      background: linear-gradient(90deg, rgba(205,157,91,.72), rgba(205,157,91,.22), transparent);
    }

    .ornament-line::after {
      content: "";
      position: absolute;
      left: 48%;
      top: -7px;
      width: 14px;
      height: 14px;
      background: rgba(226, 184, 112, .72);
      transform: rotate(45deg);
      box-shadow:
        -22px 0 0 rgba(226, 184, 112, .42),
        22px 0 0 rgba(226, 184, 112, .42);
    }

    .hero-copy {
      margin: 0 0 26px;
      padding: 6px 0 0;
    }

    .hero-copy h1 {
      margin: 0;
      color: rgba(226, 199, 145, .94);
      font-family: "SimSun", "宋体", serif;
      font-size: 42px;
      line-height: 1.18;
      letter-spacing: 1px;
      text-shadow:
        4px 4px 0 rgba(30, 23, 17, .70),
        2px 2px 0 rgba(66, 48, 30, .58);
    }

    .hero-copy p {
      margin: 18px 0 0;
      color: var(--gold-soft);
      font-size: 15px;
      line-height: 1.9;
      letter-spacing: .6px;
      text-shadow: 0 2px 0 rgba(17, 12, 8, .34);
    }

    .mini-card {
      position: relative;
      margin-top: 24px;
      padding: 22px 20px 24px;
      min-height: 260px;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px),
        rgba(4, 12, 26, .58);
      background-size: 5px 5px, 5px 5px, auto;
      border: 2px solid rgba(205, 157, 91, .46);
      box-shadow: inset 0 0 0 2px rgba(255,232,178,.03), 5px 5px 0 rgba(0,0,0,.18);
    }

    .card-label {
      color: rgba(232, 213, 178, .58);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    .card-name {
      color: rgba(238, 213, 167, .96);
      font-size: 34px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: 1px;
      text-shadow: 3px 3px 0 rgba(17,12,8,.52);
      word-break: break-word;
    }

    .card-date {
      margin-top: 18px;
      color: rgba(232, 213, 178, .72);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 900;
    }

    .card-epitaph {
      margin-top: 18px;
      padding-top: 16px;
      color: rgba(232, 213, 178, .78);
      border-top: 2px solid rgba(205,157,91,.26);
      font-size: 15px;
      line-height: 1.7;
      max-height: 86px;
      overflow: hidden;
    }

    .preview-note {
      margin: 18px 0 0;
      color: rgba(232, 213, 178, .52);
      font-size: 13px;
      line-height: 1.8;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 18px;
    }

    .section-label {
      grid-column: 1 / -1;
      position: relative;
      margin-top: 2px;
      padding: 10px 14px 10px 18px;
      color: rgba(238, 213, 167, .94);
      background: rgba(205, 157, 91, .09);
      border-left: 4px solid rgba(236,191,116,.78);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .8px;
      text-shadow: 0 2px 0 rgba(17,12,8,.36);
    }

    .field { display: grid; gap: 8px; }
    .full { grid-column: 1 / -1; }

    label {
      color: rgba(232,213,178,.82);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .6px;
      text-shadow: 0 2px 0 rgba(17, 12, 8, .26);
    }

    input,
    textarea,
    select {
      width: 100%;
      color: rgba(249, 228, 186, .95);
      background: var(--field);
      border: 2px solid rgba(205, 157, 91, .55);
      outline: none;
      padding: 12px 13px;
      box-shadow: inset 0 0 0 2px rgba(255, 232, 178, .035), 4px 4px 0 rgba(0,0,0,.18);
      border-radius: 0;
      color-scheme: dark;
      font-weight: 900;
      letter-spacing: .5px;
    }

    input, select { height: 48px; }
    textarea { min-height: 96px; resize: vertical; line-height: 1.7; }

    input::placeholder,
    textarea::placeholder { color: rgba(232, 213, 178, .34); }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(236, 191, 116, .90);
      box-shadow: inset 0 0 0 2px rgba(255,232,178,.06), 0 0 0 4px rgba(236,191,116,.08), 4px 4px 0 rgba(0,0,0,.18);
    }

    .choice-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .choice {
      position: relative;
      display: block;
      min-height: 76px;
      padding: 14px;
      color: rgba(232,213,178,.78);
      background: rgba(4, 12, 26, .64);
      border: 2px solid rgba(205, 157, 91, .46);
      box-shadow: 4px 4px 0 rgba(0,0,0,.16);
      cursor: pointer;
    }

    .choice input { position: absolute; opacity: 0; pointer-events: none; }

    .choice strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(238,213,167,.94);
      font-size: 14px;
    }

    .choice span {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      opacity: .74;
    }

    .choice:has(input:checked) {
      border-color: rgba(236,191,116,.88);
      background: rgba(236,191,116,.10);
    }

    .upload-zone { display: grid; gap: 12px; margin-top: 8px; }

    .upload-card {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 14px;
      align-items: center;
      padding: 13px;
      background: rgba(4,12,26,.62);
      border: 2px solid rgba(205,157,91,.42);
      box-shadow: 4px 4px 0 rgba(0,0,0,.14);
    }

    .upload-card input { height: auto; padding: 9px; }

    .upload-card strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(238,213,167,.92);
      font-size: 14px;
    }

    .upload-card span {
      display: block;
      color: rgba(232,213,178,.58);
      font-size: 12px;
      line-height: 1.5;
    }

    .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    .thumb {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border: 2px solid rgba(205,157,91,.50);
      background: rgba(5,13,28,.54);
      image-rendering: pixelated;
    }

    .hint {
      margin-top: 14px;
      color: rgba(232, 213, 178, .50);
      font-size: 12px;
      line-height: 1.6;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      margin-top: 24px;
    }

    .main-button,
    .ghost-button {
      height: 52px;
      min-width: 168px;
      padding: 0 22px;
    }

    .main-button {
      border-color: rgba(226,176,102,.90);
      background: rgba(20,35,62,.80);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 100;
      padding: 12px 18px;
      color: #e8c994;
      background: rgba(9,16,31,.96);
      border: 2px solid rgba(205,157,91,.58);
      box-shadow: 5px 5px 0 rgba(0,0,0,.20);
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      font-weight: 900;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1120px) {
      .page { padding: 28px 20px 42px; }
      .layout { grid-template-columns: 1fr; }
      .form-grid, .choice-row { grid-template-columns: 1fr; }
      .upload-card { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; gap: 16px; }
      .top-actions { flex-wrap: wrap; justify-content: flex-end; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <img src="assets/paw.png" alt="" />
        <span id="brandName">星归园</span>
      </div>

      <div class="top-actions">
        <a class="pixel-control" href="index.html" id="backHome">返回首页</a>

        <div class="language" id="languageBox">
          <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
            <svg class="globe-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" fill="none" stroke="rgba(232,201,148,.86)" stroke-width="2" shape-rendering="crispEdges"/>
              <path d="M4 12H20" fill="none" stroke="rgba(232,201,148,.82)" stroke-width="2" shape-rendering="crispEdges"/>
              <path d="M6 8H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/>
              <path d="M6 16H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/>
              <path d="M12 3C9 6 8 9 8 12C8 15 9 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/>
              <path d="M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/>
            </svg>
            <span id="languageLabel">简体中文</span>
            <span>⌄</span>
          </button>

          <div class="language-menu">
            <button type="button" data-lang="zh-CN">简体中文</button>
            <button type="button" data-lang="zh-TW">繁體中文</button>
            <button type="button" data-lang="en">English</button>
            <button type="button" data-lang="ja">日本語</button>
          </div>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel left-panel">
        <h2 class="panel-title">
          <img src="assets/paw.png" alt="" />
          <span id="previewTitle">纪念内容预览</span>
        </h2>

        <div class="ornament-line"></div>

        <div class="hero-copy">
          <h1 id="sideTitle">把想说的话，<br />先安静地写下。</h1>
          <p id="sideIntro">墓碑样式会在下一步选择。这里先整理名字、日期、照片和故事。</p>
        </div>

        <div class="mini-card">
          <div class="card-label" id="cardLabel">MEMORIAL CARD</div>
          <div class="card-name" id="previewName">Lucky</div>
          <div class="card-date" id="previewDate">2014.06.12 - 2025.11.03</div>
          <div class="card-epitaph" id="previewEpitaph">谢谢你把最温柔的日子留给我。</div>
        </div>

        <p class="preview-note" id="previewNote">这不是最终墓碑，只是文字预览。确认信息后，再进入墓碑选择页。</p>
      </aside>

      <section class="panel form-panel">
        <h2 class="panel-title">
          <img src="assets/paw.png" alt="" />
          <span id="formTitle">纪念信息</span>
        </h2>

        <form id="memorialForm">
          <div class="form-grid">
            <div class="section-label" id="basicSection">基础信息</div>

            <div class="field">
              <label for="petName" id="labelName">爱宠名字</label>
              <input id="petName" required maxlength="40" placeholder="例如：Lucky" />
            </div>

            <div class="field">
              <label for="petType" id="labelType">爱宠种类</label>
              <select id="petType">
                <option value="cat">猫</option>
                <option value="dog">狗</option>
                <option value="bird">鸟</option>
                <option value="rabbit">兔子</option>
                <option value="hamster">仓鼠</option>
                <option value="other">其他</option>
              </select>
            </div>

            <div class="field">
              <label for="birthDate" id="labelBirth">出生日期</label>
              <input id="birthDate" type="date" />
            </div>

            <div class="field">
              <label for="deathDate" id="labelDeath">离开日期</label>
              <input id="deathDate" type="date" />
            </div>

            <div class="section-label" id="wordsSection">文字纪念</div>

            <div class="field full">
              <label for="epitaph" id="labelEpitaph">墓志铭</label>
              <textarea id="epitaph" maxlength="120" placeholder="写一句最想刻在墓碑上的话。"></textarea>
            </div>

            <div class="field full">
              <label for="story" id="labelStory">可公开的故事</label>
              <textarea id="story" maxlength="1200" placeholder="写下它的性格、习惯，或者你最想记住的一天。"></textarea>
            </div>

            <div class="section-label" id="visibilitySection">可见范围</div>

            <div class="field full">
              <div class="choice-row">
                <label class="choice">
                  <input type="radio" name="visibility" value="public" checked />
                  <strong id="privacyPublic">公开</strong>
                  <span id="privacyPublicDesc">所有访客都可以看到。</span>
                </label>

                <label class="choice">
                  <input type="radio" name="visibility" value="invite" />
                  <strong id="privacyInvite">邀请可见</strong>
                  <span id="privacyInviteDesc">只给拥有链接的人看。</span>
                </label>

                <label class="choice">
                  <input type="radio" name="visibility" value="private" />
                  <strong id="privacyPrivate">仅自己</strong>
                  <span id="privacyPrivateDesc">只有自己可以查看。</span>
                </label>
              </div>
            </div>

            <div class="section-label" id="photoSection">照片</div>

            <div class="field full">
              <div class="upload-zone">
                <div class="upload-card">
                  <div>
                    <strong id="stonePhotoTitle">墓碑展示照片</strong>
                    <span id="stonePhotoDesc">用于墓碑正面，只选择一张。</span>
                  </div>
                  <input id="stonePhoto" type="file" accept="image/*" />
                </div>

                <div class="upload-card">
                  <div>
                    <strong id="publicPhotoTitle">公开相册</strong>
                    <span id="publicPhotoDesc">所有访客都可以看到。</span>
                  </div>
                  <input id="publicPhotos" type="file" accept="image/*" multiple />
                </div>

                <div class="upload-card">
                  <div>
                    <strong id="privatePhotoTitle">私密相册</strong>
                    <span id="privatePhotoDesc">只保存在你的纪念页里。</span>
                  </div>
                  <input id="privatePhotos" type="file" accept="image/*" multiple />
                </div>
              </div>

              <div class="photo-preview" id="photoPreview"></div>
              <div class="hint" id="photoHint">当前版本会把填写内容暂存在浏览器本地，后续接入账号和数据库后再保存到服务器。</div>
            </div>
          </div>

          <div class="footer-actions">
            <button class="ghost-button" type="button" id="saveDraft">保存草稿</button>
            <button class="main-button" type="submit" id="nextStep">继续选择墓碑</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const TEXTS = {
      "zh-CN": {
        brandName: "星归园",
        backHome: "返回首页",
        languageLabel: "简体中文",
        previewTitle: "纪念内容预览",
        sideTitle: "把想说的话，<br />先安静地写下。",
        sideIntro: "墓碑样式会在下一步选择。这里先整理名字、日期、照片和故事。",
        cardLabel: "MEMORIAL CARD",
        previewNote: "这不是最终墓碑，只是文字预览。确认信息后，再进入墓碑选择页。",
        formTitle: "纪念信息",
        basicSection: "基础信息",
        wordsSection: "文字纪念",
        visibilitySection: "可见范围",
        photoSection: "照片",
        labelName: "爱宠名字",
        labelType: "爱宠种类",
        labelBirth: "出生日期",
        labelDeath: "离开日期",
        labelEpitaph: "墓志铭",
        labelStory: "可公开的故事",
        privacyPublic: "公开",
        privacyPublicDesc: "所有访客都可以看到。",
        privacyInvite: "邀请可见",
        privacyInviteDesc: "只给拥有链接的人看。",
        privacyPrivate: "仅自己",
        privacyPrivateDesc: "只有自己可以查看。",
        stonePhotoTitle: "墓碑展示照片",
        stonePhotoDesc: "用于墓碑正面，只选择一张。",
        publicPhotoTitle: "公开相册",

    const ids = [
      "brandName", "backHome", "languageLabel", "previewTitle", "sideIntro", "cardLabel", "previewNote",
      "formTitle", "basicSection", "wordsSection", "visibilitySection", "photoSection", "labelName", "labelType",
      "labelBirth", "labelDeath", "labelEpitaph", "labelStory", "privacyPublic", "privacyPublicDesc",
      "privacyInvite", "privacyInviteDesc", "privacyPrivate", "privacyPrivateDesc", "stonePhotoTitle",
      "stonePhotoDesc", "publicPhotoTitle", "publicPhotoDesc", "privatePhotoTitle", "privatePhotoDesc",
      "photoHint", "saveDraft", "nextStep"
    ];

    const languageBox = document.getElementById("languageBox");
    const languageButton = document.getElementById("languageButton");
    const toast = document.getElementById("toast");
    const form = document.getElementById("memorialForm");
    const photoPreview = document.getElementById("photoPreview");

    const petName = document.getElementById("petName");
    const birthDate = document.getElementById("birthDate");
    const deathDate = document.getElementById("deathDate");
    const epitaph = document.getElementById("epitaph");
    const previewName = document.getElementById("previewName");
    const previewDate = document.getElementById("previewDate");
    const previewEpitaph = document.getElementById("previewEpitaph");
    const sideTitle = document.getElementById("sideTitle");

    function currentLang() {
      return localStorage.getItem("petMemorialLanguage") || "zh-CN";
    }

    function data() {
      return TEXTS[currentLang()] || TEXTS["zh-CN"];
    }

    function t(key) {
      return data()[key] || TEXTS["zh-CN"][key] || "";
    }

    function formatDate(value) {
      return value ? value.replaceAll("-", ".") : "----.--.--";
    }

    function updatePreview() {
      const d = data();
      previewName.textContent = petName.value.trim() || d.defaultName;
      const start = formatDate(birthDate.value);
      const end = formatDate(deathDate.value);
      previewDate.textContent = `${start} - ${end}`;
      previewEpitaph.textContent = epitaph.value.trim() || d.defaultEpitaph;
    }

    function applyLanguage(lang) {
      const d = TEXTS[lang] || TEXTS["zh-CN"];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el && d[id]) el.textContent = d[id];
      });
      sideTitle.innerHTML = d.sideTitle;

      document.querySelectorAll(".language-menu button").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
      updatePreview();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function getFilesAsDataURLs(input) {
      const files = Array.from(input.files || []);
      return Promise.all(files.map((file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve({ name: file.name, data: reader.result });
          reader.readAsDataURL(file);
        });
      }));
    }

    async function collectData() {
      const visibility = document.querySelector("input[name='visibility']:checked")?.value || "public";
      const [stonePhotos, publicPhotos, privatePhotos] = await Promise.all([
        getFilesAsDataURLs(document.getElementById("stonePhoto")),
        getFilesAsDataURLs(document.getElementById("publicPhotos")),
        getFilesAsDataURLs(document.getElementById("privatePhotos"))
      ]);

      return {
        petName: petName.value.trim(),
        petType: document.getElementById("petType").value,
        birthDate: birthDate.value,
        deathDate: deathDate.value,
        epitaph: epitaph.value.trim(),
        story: document.getElementById("story").value.trim(),
        visibility,
        stonePhoto: stonePhotos[0] || null,
        publicPhotos,
        privatePhotos,
        savedAt: new Date().toISOString()
      };
    }

    function validateData(memorial) {
      if (!memorial.petName) {
        showToast(t("needName"));
        petName.focus();
        return false;
      }
      if (memorial.birthDate && memorial.deathDate && memorial.deathDate < memorial.birthDate) {
        showToast(t("dateError"));
        deathDate.focus();
        return false;
      }
      return true;
    }

    async function saveDraft() {
      const memorial = await collectData();
      if (!validateData(memorial)) return false;
      localStorage.setItem("petMemorialDraft", JSON.stringify(memorial));
      showToast(t("saved"));
      return true;
    }

    function renderPhotoPreview() {
      photoPreview.innerHTML = "";
      ["stonePhoto", "publicPhotos", "privatePhotos"].forEach((id) => {
        Array.from(document.getElementById(id).files || []).forEach((file) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = document.createElement("img");
            img.className = "thumb";
            img.src = reader.result;
            photoPreview.appendChild(img);
          };
          reader.readAsDataURL(file);
        });
      });
    }

    ["stonePhoto", "publicPhotos", "privatePhotos"].forEach((id) => {
      document.getElementById(id).addEventListener("change", renderPhotoPreview);
    });

    [petName, birthDate, deathDate, epitaph].forEach((input) => {
      input.addEventListener("input", updatePreview);
      input.addEventListener("change", updatePreview);
    });

    document.getElementById("saveDraft").addEventListener("click", saveDraft);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const saved = await saveDraft();
      if (saved) setTimeout(() => window.location.href = "select-stone.html", 500);
    });

    languageButton.addEventListener("click", (event) => {
      event.stopPropagation();
      languageBox.classList.toggle("open");
    });

    document.querySelectorAll(".language-menu button").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        const lang = button.dataset.lang;
        localStorage.setItem("petMemorialLanguage", lang);
        applyLanguage(lang);
        languageBox.classList.remove("open");
      });
    });

    document.addEventListener("click", () => languageBox.classList.remove("open"));
    applyLanguage(currentLang());
  </script>
