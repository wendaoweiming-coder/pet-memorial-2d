<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建纪念 - 星归园</title>
  <style>
    :root{
      --stage-w: 1672;
      --stage-h: 941;
      --gold:#e0b870;
      --gold-soft:#d4ad69;
      --deep:#061329;
      --input-bg: rgba(4,13,31,.92);
      --input-bg-soft: rgba(5,16,36,.84);
      --panel-line: rgba(224,184,112,.22);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#050d19;color:var(--gold);font-family:"Noto Serif CJK SC","Microsoft YaHei","PingFang SC",serif}
    body{overflow:hidden}
    button,input,select,textarea{font:inherit}
    .viewport{position:fixed;inset:0;display:grid;place-items:center;overflow:hidden;background:#050d19}
    .stage{
      position:relative;
      width:1672px;height:941px;
      background:url("assets/create-page-bg.png") center/cover no-repeat;
      transform-origin:center center;
      image-rendering:pixelated;
      overflow:hidden;
    }

    .ghost-button,
    .ghost-link{
      position:absolute;
      background:transparent;
      border:0;
      cursor:pointer;
      z-index:8;
    }
    .ghost-link{display:block;text-decoration:none}

    /* top controls */
    .home-hit{left:1258px;top:18px;width:122px;height:56px}
    .lang-hit{left:1402px;top:18px;width:174px;height:56px}
    .lang-menu{
      position:absolute;left:1402px;top:77px;width:174px;
      display:none;z-index:20;padding:6px;background:rgba(6,16,34,.98);
      border:1px solid rgba(224,184,112,.38);box-shadow:0 8px 24px rgba(0,0,0,.35)
    }
    .lang-menu.open{display:block}
    .lang-menu button{
      width:100%;height:38px;border:0;background:transparent;color:var(--gold);text-align:left;
      padding:0 14px;font-size:18px;cursor:pointer
    }
    .lang-menu button:hover{background:rgba(224,184,112,.08)}

    /* form overlay */
    .form-layer{position:absolute;inset:0;z-index:10}
    .field{position:absolute;display:flex;align-items:center}
    .field input,
    .field select,
    .field textarea{
      width:100%;height:100%;
      color:var(--gold);
      background:var(--input-bg);
      border:1px solid rgba(224,184,112,.16);
      outline:none;
      padding:0 18px;
      font-size:19px;
      line-height:1.2;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .field input::placeholder,
    .field textarea::placeholder,
    .field select.placeholder{color:rgba(212,173,105,.66)}
    .field textarea{padding:14px 18px;resize:none;line-height:1.55}
    .field input:focus,
    .field select:focus,
    .field textarea:focus{
      border-color:rgba(224,184,112,.42);
      box-shadow:0 0 0 1px rgba(224,184,112,.22), inset 0 0 0 1px rgba(255,255,255,.02)
    }
    select{
      appearance:none;-webkit-appearance:none;-moz-appearance:none;
      background-image:none;
      padding-right:46px;
    }
    input[type="date"]::-webkit-calendar-picker-indicator{opacity:0;cursor:pointer}

    .counter{
      position:absolute;right:12px;bottom:8px;font-size:14px;color:rgba(224,184,112,.82);
      letter-spacing:.3px;pointer-events:none;z-index:2
    }
    .textarea-wrap{position:absolute}
    .textarea-wrap .field{position:absolute;inset:0}

    .visibility-group{position:absolute;left:642px;top:619px;display:flex;gap:15px;z-index:10}
    .visibility-option{
      position:relative;width:286px;height:74px;background:rgba(5,14,33,.82);border:1px solid rgba(224,184,112,.16);
      cursor:pointer;display:block
    }
    .visibility-option input{position:absolute;opacity:0;pointer-events:none}
    .visibility-option.active{box-shadow:inset 0 0 0 1px rgba(224,184,112,.38)}
    .visibility-option .ring{
      position:absolute;left:16px;top:12px;width:21px;height:21px;border-radius:50%;border:2px solid rgba(224,184,112,.82)
    }
    .visibility-option.active .ring::after{
      content:"";position:absolute;left:4px;top:4px;width:9px;height:9px;border-radius:50%;background:rgba(224,184,112,.92)
    }

    .upload-zone{position:absolute;left:643px;top:741px;display:flex;gap:14px;z-index:12}
    .upload-slot{
      position:relative;height:84px;border:1px dashed rgba(224,184,112,.34);background:rgba(5,14,33,.28);overflow:hidden
    }
    .upload-slot.large{width:338px;cursor:pointer}
    .upload-slot.small{width:104px}
    .upload-slot.small button,.upload-slot.large button{position:absolute;inset:0;border:0;background:transparent;cursor:pointer}
    .upload-slot img{width:100%;height:100%;object-fit:cover;display:none}
    .upload-slot.filled img{display:block}
    .upload-slot.filled .remove{display:flex}
    .remove{
      position:absolute;right:6px;top:6px;width:18px;height:18px;display:none;align-items:center;justify-content:center;
      border:1px solid rgba(224,184,112,.55);background:rgba(8,16,33,.85);color:var(--gold);font-size:12px;cursor:pointer;z-index:2
    }
    .primary-action{
      position:absolute;left:1324px;top:849px;width:245px;height:47px;z-index:15;
      background:transparent;border:0;cursor:pointer
    }

    .toast{
      position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
      padding:10px 18px;background:rgba(6,14,28,.94);border:1px solid rgba(224,184,112,.36);
      color:var(--gold);font-size:16px;opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:50
    }
    .toast.show{opacity:1}

    /* absolute coordinates for form fields */
    #petNameWrap{left:643px;top:175px;width:462px;height:44px}
    #speciesWrap{left:1138px;top:175px;width:425px;height:44px}
    #birthWrap{left:643px;top:272px;width:462px;height:44px}
    #deathWrap{left:1138px;top:272px;width:425px;height:44px}
    #epitaphWrap{left:643px;top:365px;width:920px;height:79px}
    #storyWrap{left:643px;top:492px;width:920px;height:79px}

    @media (max-width: 900px){
      body{overflow:auto}
      .viewport{position:relative;min-height:100vh;padding:12px}
    }
  </style>
</head>
<body>
  <main class="viewport">
    <section class="stage" id="stage" aria-label="创建纪念页面">
      <a class="ghost-link home-hit" href="index.html" aria-label="返回首页"></a>
      <button class="ghost-button lang-hit" id="langButton" aria-label="选择语言"></button>
      <div class="lang-menu" id="langMenu">
        <button type="button" data-lang="zh-CN">简体中文</button>
        <button type="button" data-lang="zh-TW">繁體中文</button>
        <button type="button" data-lang="en">English</button>
        <button type="button" data-lang="ja">日本語</button>
      </div>

      <form class="form-layer" id="memorialForm" autocomplete="off">
        <div class="field" id="petNameWrap">
          <input id="petName" name="petName" type="text" maxlength="20" placeholder="请输入爱宠名字" />
        </div>

        <div class="field" id="speciesWrap">
          <select id="petType" name="petType">
            <option value="" selected disabled>请选择爱宠种类</option>
            <option>猫</option><option>狗</option><option>兔子</option><option>鸟</option><option>乌龟</option><option>仓鼠</option><option>鱼</option><option>其他</option>
          </select>
        </div>

        <div class="field" id="birthWrap">
          <input id="birthDate" name="birthDate" type="date" />
        </div>

        <div class="field" id="deathWrap">
          <input id="deathDate" name="deathDate" type="date" />
        </div>

        <div class="textarea-wrap" id="epitaphWrap">
          <div class="field">
            <textarea id="epitaph" name="epitaph" maxlength="120" placeholder="写下您想对爱宠说的话..."></textarea>
          </div>
          <span class="counter" id="epitaphCount">0/120</span>
        </div>

        <div class="textarea-wrap" id="storyWrap">
          <div class="field">
            <textarea id="story" name="story" maxlength="300" placeholder="记录一段属于你们的故事，分享这份爱与回忆..."></textarea>
          </div>
          <span class="counter" id="storyCount">0/300</span>
        </div>

        <div class="visibility-group" id="visibilityGroup">
          <label class="visibility-option active">
            <input type="radio" name="visibility" value="public" checked />
            <span class="ring"></span>
          </label>
          <label class="visibility-option">
            <input type="radio" name="visibility" value="invite" />
            <span class="ring"></span>
          </label>
          <label class="visibility-option">
            <input type="radio" name="visibility" value="private" />
            <span class="ring"></span>
          </label>
        </div>

        <div class="upload-zone" id="uploadZone">
          <div class="upload-slot large" id="uploadMainSlot">
            <button type="button" id="uploadTrigger" aria-label="上传照片"></button>
          </div>
          <div class="upload-slot small" data-slot="1"><img alt="照片缩略图"><button type="button"></button><button type="button" class="remove">×</button></div>
          <div class="upload-slot small" data-slot="2"><img alt="照片缩略图"><button type="button"></button><button type="button" class="remove">×</button></div>
          <div class="upload-slot small" data-slot="3"><img alt="照片缩略图"><button type="button"></button><button type="button" class="remove">×</button></div>
          <div class="upload-slot small" data-slot="4"><img alt="照片缩略图"><button type="button"></button><button type="button" class="remove">×</button></div>
          <input id="photoInput" type="file" accept="image/*" multiple hidden />
        </div>

        <button class="primary-action" id="saveMemorial" type="submit" aria-label="创建纪念"></button>
      </form>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const stage = document.getElementById('stage');
    const langButton = document.getElementById('langButton');
    const langMenu = document.getElementById('langMenu');
    const toast = document.getElementById('toast');
    const photoInput = document.getElementById('photoInput');
    const uploadTrigger = document.getElementById('uploadTrigger');
    const uploadSlots = Array.from(document.querySelectorAll('.upload-slot.small'));
    const form = document.getElementById('memorialForm');

    function resizeStage(){
      const scale = Math.min(window.innerWidth / 1672, window.innerHeight / 941);
      stage.style.transform = `scale(${scale})`;
    }
    resizeStage();
    window.addEventListener('resize', resizeStage);

    function showToast(text){
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    langButton.addEventListener('click', (e)=>{
      e.stopPropagation();
      langMenu.classList.toggle('open');
    });
    document.addEventListener('click', ()=> langMenu.classList.remove('open'));
    langMenu.addEventListener('click', (e)=>{
      e.stopPropagation();
      const btn = e.target.closest('button[data-lang]');
      if(!btn) return;
      localStorage.setItem('petMemorialLanguage', btn.dataset.lang);
      langMenu.classList.remove('open');
      showToast('语言已保存');
    });

    function updateCounter(id, max){
      const el = document.getElementById(id);
      const counter = document.getElementById(id + 'Count');
      el.addEventListener('input', ()=> counter.textContent = `${el.value.length}/${max}`);
    }
    updateCounter('epitaph', 120);
    updateCounter('story', 300);

    document.querySelectorAll('.visibility-option').forEach(option => {
      option.addEventListener('click', ()=>{
        document.querySelectorAll('.visibility-option').forEach(el => el.classList.remove('active'));
        option.classList.add('active');
        option.querySelector('input').checked = true;
      });
    });

    const selectedFiles = [];
    function renderSlots(){
      uploadSlots.forEach((slot, index)=>{
        const img = slot.querySelector('img');
        const remove = slot.querySelector('.remove');
        const file = selectedFiles[index];
        if(file){
          const url = URL.createObjectURL(file);
          img.src = url;
          slot.classList.add('filled');
          remove.style.display = 'flex';
        } else {
          img.removeAttribute('src');
          slot.classList.remove('filled');
          remove.style.display = 'none';
        }
      });
    }

    uploadTrigger.addEventListener('click', ()=> photoInput.click());
    photoInput.addEventListener('change', ()=>{
      const files = Array.from(photoInput.files).slice(0,5);
      selectedFiles.length = 0;
      selectedFiles.push(...files.slice(0,4));
      renderSlots();
      if(files.length) showToast(`已选择 ${files.length} 张照片`);
    });
    uploadSlots.forEach((slot, index)=>{
      slot.querySelector('button').addEventListener('click', ()=> photoInput.click());
      slot.querySelector('.remove').addEventListener('click', (e)=>{
        e.stopPropagation();
        selectedFiles.splice(index, 1);
        renderSlots();
      });
    });

    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      const draft = {
        petName: document.getElementById('petName').value.trim(),
        petType: document.getElementById('petType').value,
        birthDate: document.getElementById('birthDate').value,
        deathDate: document.getElementById('deathDate').value,
        epitaph: document.getElementById('epitaph').value.trim(),
        story: document.getElementById('story').value.trim(),
        visibility: document.querySelector('input[name="visibility"]:checked')?.value || 'public',
        photoCount: selectedFiles.length,
        updatedAt: Date.now()
      };
      localStorage.setItem('petMemorialDraft', JSON.stringify(draft));
      showToast('纪念信息已保存');
    });
  </script>
</body>
</html>
