const savedDraft=(()=>{try{return JSON.parse(localStorage.getItem("petMemorialDraft")||"{}")}catch(e){return {}}})();
const S={
  lang:localStorage.getItem("petMemorialLanguage")||"zh-CN",
  type:savedDraft.petType||"",
  visibility:savedDraft.visibility||"public",
  photos:[]
};
const stage=document.getElementById("stage"),toast=document.getElementById("toast");
const nameI=document.getElementById("petName"),birthI=document.getElementById("birthDate"),deathI=document.getElementById("deathDate"),epiI=document.getElementById("epitaph"),storyI=document.getElementById("story");
const stoneC=document.getElementById("stoneText");
function restoreDraft(){
  nameI.value=savedDraft.petName||"";
  birthI.value=savedDraft.birthDate||"";
  deathI.value=savedDraft.deathDate||"";
  epiI.value=savedDraft.epitaph||"";
  storyI.value=savedDraft.story||"";
  document.querySelectorAll(".choice").forEach(c=>c.classList.toggle("active",c.dataset.v===S.visibility));
}
function currentDraft(){

    petName:nameI.value.trim(),
    petType:S.type,
    birthDate:birthI.value,
    deathDate:deathI.value,
    epitaph:epiI.value.trim(),

    savedAt:savedDraft.savedAt||new Date().toISOString()
  };
}
function persistDraft(){
  localStorage.setItem("petMemorialDraft",JSON.stringify(currentDraft()));
}
function tr(k){return(T[S.lang]&&T[S.lang][k])||T["zh-CN"][k]||k}
function resize(){stage.style.transform=`scale(${Math.max(innerWidth/1672,innerHeight/941)})`}addEventListener("resize",resize);resize();

function setup(c,w,h,r=1){c.style.width=w+"px";c.style.height=h+"px";c.width=Math.max(1,Math.floor(w/r));c.height=Math.max(1,Math.floor(h/r));const ctx=c.getContext("2d");ctx.imageSmoothingEnabled=false;return{ctx,r}}
function px(c,text,opt={}){
  const w=+c.dataset.w||opt.w||c.clientWidth||120,h=+c.dataset.h||opt.h||c.clientHeight||24,size=+c.dataset.size||opt.size||16;
  const {ctx,r}=setup(c,w,h,opt.ratio||1);ctx.clearRect(0,0,c.width,c.height);
  ctx.font=`900 ${Math.round(size/r)}px "SimSun","Courier New",monospace`;ctx.textBaseline="top";ctx.textAlign=opt.align||"left";
  const color=opt.color||"rgba(199,132,29,.94)";
  const lines=String(text||"").split(/\\n|\n/);
  const lineH=Math.max(1,Math.round(size*1.38/r));
  const totalH=lines.length*lineH;
  const startY=Math.max(0,Math.round((c.height-totalH)/2)+1);
  lines.forEach((line,i)=>{
    const y=startY+i*lineH;
    const x=opt.align==="center"?c.width/2:0;
    ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(line,x+1,y+1);
    ctx.fillStyle=color;ctx.fillText(line,x,y);
  })
}
function wrap(ctx,text,max){let out=[],line="";for(const ch of String(text||"")){let test=line+ch;if(ctx.measureText(test).width>max&&line){out.push(line);line=ch}else line=test}if(line)out.push(line);return out}
function fitStoneBlock(ctx,text,maxW,maxH,startSize,minSize,maxLines){
  const clean=String(text||"").trim();
  if(!clean) return {size:startSize,lines:[]};
  for(let size=startSize; size>=minSize; size--){
    ctx.font=`900 ${size}px "SimSun","Courier New",monospace`;
    const lines=wrap(ctx,clean,maxW);
    const lineH=Math.max(1,Math.round(size*1.34));
    const allow=Math.max(1,Math.min(maxLines, Math.floor(maxH/lineH)));
    if(lines.length<=allow){
      return {size, lines, lineH};
    }
  }
  ctx.font=`900 ${minSize}px "SimSun","Courier New",monospace`;
  let lines=wrap(ctx,clean,maxW);
  const lineH=Math.max(1,Math.round(minSize*1.34));
  const allow=Math.max(1,Math.min(maxLines, Math.floor(maxH/lineH)));
  lines=lines.slice(0,allow);
  if(lines.length){
    let last=lines[allow-1];
    while(last && ctx.measureText(last+"…").width>maxW){ last=last.slice(0,-1); }
    lines[allow-1]=(last||"")+"…";
  }
  return {size:minSize, lines, lineH};
}
function field(c,text,ph,multi=false){
  const p=c.parentElement,w=p.clientWidth-26,h=p.clientHeight-(multi?16:0);const {ctx,r}=setup(c,w,h,1);
  ctx.font=`900 ${Math.round(17/r)}px "SimSun","Courier New",monospace`;ctx.textBaseline="top";ctx.clearRect(0,0,c.width,c.height);
  const has=String(text||"").trim(),fill=has?"rgba(199,132,29,.96)":"rgba(199,132,29,.66)",content=has?text:ph;
  if(multi){wrap(ctx,content,c.width-4).slice(0,3).forEach((line,i)=>{let y=i*Math.round(18*1.5/r);ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(line,1,y+1);ctx.fillStyle=fill;ctx.fillText(line,0,y)})}
  else{let y=Math.round((c.height-Math.round(17/r))/2);ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(String(content).slice(0,42),1,y+1);ctx.fillStyle=fill;ctx.fillText(String(content).slice(0,42),0,y)}
}
function drawStoneText(ctx,text,x,y,maxW,size,maxLines,color){
  ctx.font=`900 ${size}px "SimSun","Courier New",monospace`;ctx.textAlign="center";ctx.textBaseline="top";
  wrap(ctx,text,maxW).slice(0,maxLines).forEach((line,i)=>{let yy=y+i*Math.round(size*1.35);ctx.fillStyle="rgba(220,210,190,.22)";ctx.fillText(line,x+1,yy+1);ctx.fillStyle=color;ctx.fillText(line,x,yy)})
}
function drawStoneBlock(ctx,text,x,y,maxW,maxH,startSize,minSize,maxLines,color){
  const fit=fitStoneBlock(ctx,text,maxW,maxH,startSize,minSize,maxLines);
  if(!fit.lines.length) return;
  ctx.font=`900 ${fit.size}px "SimSun","Courier New",monospace`;
  ctx.textAlign="center";
  ctx.textBaseline="top";
  const totalH=fit.lines.length*fit.lineH;
  const startY=y+Math.max(0,Math.floor((maxH-totalH)/2));
  fit.lines.forEach((line,i)=>{
    const yy=startY+i*fit.lineH;
    ctx.fillStyle="rgba(220,210,190,.22)";
    ctx.fillText(line,x+1,yy+1);
    ctx.fillStyle=color;
    ctx.fillText(line,x,yy);
  });
}

function carvedFont(ctx,size){ctx.font=`600 ${size}px "SimSun","Noto Serif CJK SC","Times New Roman",serif`}
function stoneWrap(ctx,text,maxW){
  const clean=String(text||"").trim(); if(!clean)return [];
  const latin=/[A-Za-z]/.test(clean)&&clean.includes(" ");
  const units=latin?clean.split(/\s+/):Array.from(clean);
  const lines=[];let line="";
  for(const unit of units){
    const token=latin?(line?" "+unit:unit):unit;
    const test=line+token;
    if(line&&ctx.measureText(test).width>maxW){lines.push(line);line=unit}else line=test;
  }
  if(line)lines.push(line);return lines;
}
function paintCarved(ctx,text,x,y,style){
  ctx.save();ctx.textAlign="center";ctx.textBaseline="top";
  ctx.fillStyle=style.highlight;ctx.fillText(text,x-.55,y-.55);
  ctx.fillStyle=style.shadow;ctx.fillText(text,x+.65,y+.75);
  ctx.fillStyle=style.recess;ctx.fillText(text,x,y);
  ctx.restore();
}
function drawCarvedLine(ctx,text,x,y,maxW,startSize,minSize,style){
  let size=startSize;const clean=String(text||"");
  carvedFont(ctx,size);while(size>minSize&&ctx.measureText(clean).width>maxW){size--;carvedFont(ctx,size)}
  ctx.save();ctx.beginPath();ctx.rect(x-maxW/2,y-2,maxW,Math.ceil(size*1.8)+4);ctx.clip();
  paintCarved(ctx,clean,x,y,style);ctx.restore();
}
function drawCarvedName(ctx,text,x,y,maxW,maxH,startSize,minSize,style){
  const clean=String(text||"").trim();if(!clean)return;
  let size=startSize,lines=[];
  for(;size>=minSize;size--){carvedFont(ctx,size);if(ctx.measureText(clean).width<=maxW){lines=[clean];break}}
  if(!lines.length){size=minSize;carvedFont(ctx,size);lines=stoneWrap(ctx,clean,maxW).slice(0,2)}
  const lineH=Math.round(size*1.28),total=lines.length*lineH,start=y+Math.max(0,Math.floor((maxH-total)/2));
  ctx.save();ctx.beginPath();ctx.rect(x-maxW/2,y,maxW,maxH);ctx.clip();
  lines.forEach((line,i)=>paintCarved(ctx,line,x,start+i*lineH,style));ctx.restore();
}
function drawCarvedBlock(ctx,text,x,y,maxW,maxH,startSize,minSize,maxLines,style){
  const clean=String(text||"").trim();if(!clean)return;
  const safeH=Math.max(1,maxH-3); // reserve a bottom gap so text never touches the plaque border
  let size=startSize,lines=[],lineH=0;
  for(;size>=minSize;size--){
    carvedFont(ctx,size);
    lineH=Math.max(1,Math.round(size*1.28));
    const allowed=Math.max(1,Math.min(maxLines,Math.floor(safeH/lineH)));
    const candidate=stoneWrap(ctx,clean,maxW);
    if(candidate.length<=allowed){lines=candidate;break}
  }
  if(!lines.length){
    size=minSize;carvedFont(ctx,size);lineH=Math.max(1,Math.round(size*1.28));
    const allowed=Math.max(1,Math.min(maxLines,Math.floor(safeH/lineH)));
    lines=stoneWrap(ctx,clean,maxW).slice(0,allowed);
    const full=stoneWrap(ctx,clean,maxW);
    if(lines.length&&full.length>allowed){
      let last=lines[lines.length-1];
      while(last&&ctx.measureText(last+"…").width>maxW)last=last.slice(0,-1);
      lines[lines.length-1]=(last||"")+"…";
    }
  }
  const total=lines.length*lineH;
  const start=y+Math.max(0,Math.floor((safeH-total)/2));
  ctx.save();ctx.beginPath();ctx.rect(x-maxW/2,y,maxW,safeH);ctx.clip();
  lines.forEach((line,i)=>paintCarved(ctx,line,x,start+i*lineH,style));ctx.restore();
}

const createCarve={recess:"rgba(34,32,30,.78)",shadow:"rgba(8,8,7,.24)",highlight:"rgba(220,214,202,.16)"};
function fmt(v){return v?v.replaceAll("-","."):"----.--.--"}
function updateStatic(){
  document.querySelectorAll(".txt").forEach(c=>px(c,tr(c.dataset.k)||c.dataset.k));
  document.querySelectorAll("[data-k-text]").forEach(el=>{el.textContent=tr(el.dataset.kText)});
  document.querySelectorAll("#langMenu button").forEach(button=>button.classList.toggle("active",button.dataset.lang===S.lang));
  const uploadLines=String(tr("uploadMain")).split(/\\n|\n/);
  const uploadMain=document.getElementById("uploadMainLine");
  const uploadSub=document.getElementById("uploadSubLine");
  if(uploadMain) uploadMain.textContent=uploadLines[0]||"";
  if(uploadSub) uploadSub.textContent=uploadLines.slice(1).join(" ")||"";
  nameI.placeholder=tr("petNamePH");
  epiI.placeholder=tr("epitaphPH");
  storyI.placeholder=tr("storyPH");
}
function update(){
  field(document.getElementById("typeDisplay"),S.type?tr(S.type):"",tr("petTypePH"));
  field(document.getElementById("birthDisplay"),birthI.value?birthI.value.replaceAll("-"," / "):"",tr("birthPH"));
  field(document.getElementById("deathDisplay"),deathI.value?deathI.value.replaceAll("-"," / "):"",tr("deathPH"));
  px(document.getElementById("epiCount"),`${epiI.value.length}/120`,{w:62,h:18,size:12,color:"rgba(199,132,29,.76)"});
  px(document.getElementById("storyCount"),`${storyI.value.length}/300`,{w:62,h:18,size:12,color:"rgba(199,132,29,.76)"});

  const {ctx}=setup(stoneC,220,190,1);ctx.clearRect(0,0,stoneC.width,stoneC.height);
  // v48: all text is clipped to the recessed plaque and rendered as a shallow carving.
  drawCarvedName(ctx,nameI.value.trim()||"小布丁",110,5,92,30,15,10,createCarve);
  drawCarvedLine(ctx,fmt(birthI.value||"2014-06-12"),110,44,92,10,8,createCarve);
  drawCarvedLine(ctx,"—",110,61,34,9,8,createCarve);
  drawCarvedLine(ctx,fmt(deathI.value||"2025-11-03"),110,76,92,10,8,createCarve);
  if(epiI.value.trim()) drawCarvedBlock(ctx,epiI.value.trim(),110,95,86,23,8,6,2,createCarve);
}
[nameI,birthI,deathI,epiI,storyI].forEach(el=>{
  el.addEventListener("input",()=>{update();persistDraft()});
  el.addEventListener("change",()=>{update();persistDraft()});
});
[birthI,deathI].forEach(el=>el.parentElement.addEventListener("click",()=>{el.focus();if(el.showPicker)el.showPicker()}));

const typeShell=document.getElementById("typeShell"),typeMenu=document.getElementById("typeMenu");
typeShell.addEventListener("click",e=>{e.stopPropagation();typeMenu.classList.toggle("open")});
typeMenu.querySelectorAll("button").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.type=b.dataset.v;typeMenu.classList.remove("open");update();persistDraft()}));

document.querySelectorAll(".choice").forEach(c=>c.addEventListener("click",()=>{document.querySelectorAll(".choice").forEach(x=>x.classList.remove("active"));c.classList.add("active");S.visibility=c.dataset.v;persistDraft()}));

const langBtn=document.getElementById("langButton"),langMenu=document.getElementById("langMenu");
langBtn.addEventListener("click",e=>{e.stopPropagation();langMenu.classList.toggle("open")});
langMenu.querySelectorAll("button").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.lang=b.dataset.lang;localStorage.setItem("petMemorialLanguage",S.lang);langMenu.classList.remove("open");updateStatic();if(submitAttempted)markRequiredDates();update()}));
document.addEventListener("click",()=>{langMenu.classList.remove("open");typeMenu.classList.remove("open")});

const photoInput=document.getElementById("photoInput"),slots=[...document.querySelectorAll(".slot")];
document.getElementById("uploadMain").addEventListener("click",()=>photoInput.click());
slots.forEach(s=>s.addEventListener("click",()=>photoInput.click()));
photoInput.addEventListener("change",()=>{S.photos=[...photoInput.files].slice(0,5);renderPhotos();persistDraft()});
function renderPhotos(){slots.forEach((slot,i)=>{const img=slot.querySelector("img"),f=S.photos[i];if(f){img.src=URL.createObjectURL(f);slot.classList.add("filled")}else{img.removeAttribute("src");slot.classList.remove("filled")}})}
slots.forEach((slot,i)=>slot.querySelector(".remove").addEventListener("click",e=>{e.stopPropagation();S.photos.splice(i,1);renderPhotos();persistDraft()}));

const stoneStyles=[
  {stone:"stone_lunar_laurel.png",stoneName:"moonGray",top:300},
  {stone:"stone_flower_arch.png",stoneName:"warmSand",top:302},
  {stone:"stone_midnight_gothic.png",stoneName:"blueSlate",top:286},
  {stone:"stone_moss_garden.png",stoneName:"mossOld",top:292}
];
const savedStone=(()=>{try{return JSON.parse(localStorage.getItem("petMemorialStone")||"{}")}catch(e){return {}}})();
let stoneIndex=Math.max(0,stoneStyles.findIndex(item=>item.stone===savedStone.stone));
const previewStone=document.getElementById("previewStone");
function applyStone(){
  const selected=stoneStyles[stoneIndex];
  previewStone.src=`assets/${selected.stone}`;
  stoneC.style.top=`${selected.top}px`;
  localStorage.setItem("petMemorialStone",JSON.stringify({stone:selected.stone,stoneName:selected.stoneName}));
}
document.getElementById("previousStone").addEventListener("click",()=>{stoneIndex=(stoneIndex+stoneStyles.length-1)%stoneStyles.length;applyStone()});
document.getElementById("nextStone").addEventListener("click",()=>{stoneIndex=(stoneIndex+1)%stoneStyles.length;applyStone()});
applyStone();



let submitAttempted=false;
function todayLocalISO(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function markRequiredDates(){
  const today=todayLocalISO();
  birthI.max=today;
  deathI.max=today;

  const missingBirth=!birthI.value;
  const missingDeath=!deathI.value;
  const birthFuture=!!(birthI.value&&birthI.value>today);
  const deathFuture=!!(deathI.value&&deathI.value>today);
  const orderInvalid=!!(birthI.value&&deathI.value&&!birthFuture&&!deathFuture&&deathI.value<birthI.value);

  if(birthI.value&&!birthFuture) deathI.min=birthI.value;
  else deathI.removeAttribute("min");

  const birthShell=birthI.closest(".input-shell");
  const deathShell=deathI.closest(".input-shell");
  birthShell.classList.toggle("error",submitAttempted&&(missingBirth||birthFuture));
  deathShell.classList.toggle("error",submitAttempted&&(missingDeath||deathFuture||orderInvalid));

  const birthHint=document.getElementById("birthHint");
  const deathHint=document.getElementById("deathHint");
  if(birthHint) birthHint.textContent=birthFuture?tr("birthFuture"):tr("birthRequired");
  if(deathHint) deathHint.textContent=deathFuture?tr("deathFuture"):(orderInvalid?tr("dateOrderInvalid"):tr("deathRequired"));

  return !(missingBirth||missingDeath||birthFuture||deathFuture||orderInvalid);
}
[birthI,deathI].forEach(input=>{
  input.addEventListener("change",()=>markRequiredDates());
  input.addEventListener("input",()=>markRequiredDates());
});


document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();
  submitAttempted=true;
  if(!markRequiredDates()){
    const today=todayLocalISO();
    if(!birthI.value||birthI.value>today) birthI.focus();
    else deathI.focus();
    return;
  }
  if(!nameI.value.trim()){toast.textContent=tr("needName");toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1500);return}
  localStorage.setItem("petMemorialDraft",JSON.stringify({...currentDraft(),savedAt:new Date().toISOString()}));
  toast.textContent=tr("saved");toast.classList.add("show");setTimeout(()=>{toast.classList.remove("show");location.href="select-stone.html"},650);
});
restoreDraft();
updateStatic();markRequiredDates();update();
</script>
