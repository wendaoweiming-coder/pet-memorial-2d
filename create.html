.header{position:absolute;left:88px;right:88px;top:46px;height:58px;display:flex;align-items:center;justify-content:space-between;z-index:5}

.pixel-button,.language-button{

}
.pixel-button{width:152px}

.pixel-button::before,.language-button::before,.panel::before{left:9px;top:9px;border-width:2px 0 0 2px}
.pixel-button::after,.language-button::after,.panel::after{right:9px;bottom:9px;border-width:0 2px 2px 0}
.globe{width:22px;height:22px}
.language{position:relative;z-index:20}

.preview-panel{left:82px;top:116px;width:590px;height:760px;padding:26px}
.form-panel{left:710px;top:116px;width:880px;height:798px;padding:24px 28px}
.panel-title{height:34px;display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-top:0}
.preview-scene{
  position:relative;width:532px;height:570px;border:3px solid rgba(219,171,97,.55);overflow:hidden;

  box-shadow:inset 0 0 0 2px rgba(255,232,178,.035)

.preview-scene::after{
  content:"";position:absolute;inset:0;background:

  linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:4px 4px;pointer-events:none;opacity:.52
}
.tombstone-wrap{position:absolute;left:50%;bottom:28px;width:390px;height:482px;transform:translateX(-50%);z-index:2}
.tombstone-img{position:absolute;left:50%;bottom:0;height:470px;transform:translateX(-50%);image-rendering:pixelated;filter:drop-shadow(9px 10px 0 rgba(0,0,0,.24))}

.preview-note{position:absolute;left:26px;bottom:28px;width:532px;height:54px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
.section{grid-column:1/-1;height:28px;background:rgba(224,178,106,.11);border-left:5px solid rgba(230,190,116,.86);display:flex;align-items:center;padding-left:14px;margin-top:0}
.field{height:68px}
.field.full{grid-column:1/-1}
.field.tall{height:100px}
.label{height:24px;display:block;margin-bottom:4px}
.input-shell{
  position:relative;height:46px;background:rgba(3,13,31,.92);border:3px solid rgba(219,171,97,.62);
  box-shadow:inset 0 0 0 2px rgba(255,232,178,.035),4px 4px 0 rgba(0,0,0,.16)
}
.field.tall .input-shell{height:74px}
.input-shell input,.input-shell textarea{
  position:absolute;inset:0;width:100%;height:100%;border:0;outline:0;background:transparent;color:transparent;caret-color:#e5bd78;z-index:6;padding:0 14px;resize:none;font-size:17px;font-weight:900;line-height:1.2;text-align:left
}
#petName,#epitaph,#story{color:#e9c77f}
#petName::placeholder,#epitaph::placeholder,#story::placeholder{color:rgba(211,166,97,.72)}
#petName::selection,#epitaph::selection,#story::selection{background:rgba(224,184,112,.25);color:#f3dba1}
.input-shell textarea{padding:10px 14px 0 14px;line-height:1.35}
.input-shell input::selection,.input-shell textarea::selection{background:rgba(224,184,112,.25);color:transparent}
canvas{image-rendering:pixelated;display:block}
.brand .txt,.panel-title .txt,.section .txt{display:block;transform:translateY(1px)}
.choice .txt{display:block}
.choice .txt + .txt{margin-top:1px}
.display{position:absolute;left:13px;top:1px;z-index:3;pointer-events:none;image-rendering:pixelated}
.tall .display{top:8px}
.counter{position:absolute;right:10px;bottom:6px;z-index:4;image-rendering:pixelated}
#nameDisplay,#epitaphDisplay,#storyDisplay{display:none !important}
.date input{opacity:0;cursor:pointer;position:absolute;inset:0;width:100%;height:100%;z-index:8}
.date-icon{position:absolute;right:12px;top:10px;width:22px;height:22px;pointer-events:none;z-index:2}
.date-icon::before{content:"";position:absolute;left:3px;top:5px;width:16px;height:14px;border:2px solid rgba(230,190,116,.78);box-shadow:inset 0 4px 0 rgba(230,190,116,.18)}
.date-icon::after{content:"";position:absolute;left:6px;top:2px;width:3px;height:6px;background:rgba(230,190,116,.82);box-shadow:8px 0 0 rgba(230,190,116,.82)}
.select{cursor:pointer}
.arrow{position:absolute;right:15px;top:17px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid rgba(230,190,116,.86)}
.type-menu{
  position:absolute;left:-3px;right:-3px;top:47px;display:none;padding:7px;z-index:50;background:rgba(5,15,34,.98);
  border:3px solid rgba(219,171,97,.76);box-shadow:6px 6px 0 rgba(0,0,0,.28)
}
.type-menu.open{display:grid;gap:4px}
.type-menu button{height:34px;border:0;background:transparent;color:#e5bd78;cursor:pointer;font:900 16px "SimSun","Courier New",monospace;text-align:left;padding-left:12px}
.type-menu button:hover{background:rgba(230,190,116,.12)}
.choice-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:0}
.choice{height:56px;border:3px solid rgba(219,171,97,.46);background:rgba(3,13,31,.76);position:relative;cursor:pointer;padding-left:44px;padding-top:7px;box-shadow:4px 4px 0 rgba(0,0,0,.14)}
.choice.active{border-color:rgba(241,197,119,.90);background:rgba(230,190,116,.09)}
.radio{position:absolute;left:13px;top:10px;width:20px;height:20px;border:3px solid rgba(230,190,116,.78);border-radius:50%}
.choice.active .radio::after{content:"";position:absolute;left:4px;top:4px;width:7px;height:7px;border-radius:50%;background:#e5bd78}
.upload-area{grid-column:1/-1;display:grid;grid-template-columns:300px repeat(5,1fr);gap:10px;margin-top:0}
.upload-main,.slot{height:66px;border:3px dashed rgba(219,171,97,.50);background:rgba(3,13,31,.62);box-shadow:4px 4px 0 rgba(0,0,0,.14);position:relative;cursor:pointer;overflow:hidden}
.slot{border-style:solid;border-color:rgba(219,171,97,.34)}
.slot::before{content:"";position:absolute;left:50%;top:50%;width:28px;height:28px;transform:translate(-50%,-50%);background:url("assets/paw.png") center/contain no-repeat;image-rendering:pixelated;opacity:.18}
.slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.slot.filled img{display:block}
.slot.filled::before{display:none}
.remove{position:absolute;right:5px;top:5px;width:20px;height:20px;display:none;z-index:5;border:1px solid #e5bd78;background:rgba(4,12,28,.92);color:#e5bd78;cursor:pointer}
.slot.filled .remove{display:block}
.submit-row{grid-column:1/-1;display:flex;justify-content:center;margin-top:10px;padding-bottom:0}
.submit{position:relative;width:244px;height:48px;border:3px solid rgba(219,171,97,.84);background:rgba(5,15,34,.78);box-shadow:5px 5px 0 rgba(0,0,0,.22), inset 0 0 0 2px rgba(255,232,178,.035);cursor:pointer;display:flex;align-items:center;justify-content:center}
.submit::before,.submit::after{content:"";position:absolute;width:11px;height:11px;border-color:rgba(241,197,119,.88);border-style:solid;pointer-events:none}
.submit::before{left:9px;top:9px;border-width:2px 0 0 2px}
.submit::after{right:9px;bottom:9px;border-width:0 2px 2px 0}
.submit:hover{background:rgba(8,20,44,.84)}
.submit .button-label{color:#e6c17b;font-size:18px;letter-spacing:1px}


.button-label{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:100%;
  line-height:1;
  color:#e6c17b;
  font-size:17px;
  font-weight:900;
  letter-spacing:1px;
  text-shadow:1px 1px 0 rgba(25,16,10,.72);
  transform:translateY(1px);
  white-space:nowrap;
}
.language-button .button-label{font-size:16px}
.upload-copy{
  position:absolute;
  left:20px;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  color:#e6c17b;
  text-shadow:1px 1px 0 rgba(25,16,10,.72);
  line-height:1.25;
  pointer-events:none;
}
.upload-copy .main{
  display:block;
  font-size:15px;
  font-weight:900;
  letter-spacing:1px;
}
.upload-copy .sub{
  display:block;
  margin-top:5px;
  font-size:12px;
  font-weight:900;
  opacity:.88;

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:100;padding:10px 18px;background:rgba(5,15,34,.96);border:2px solid rgba(219,171,97,.78);color:#e5bd78;opacity:0;pointer-events:none;transition:opacity .18s;font:900 16px "SimSun","Courier New",monospace}
.toast.show{opacity:1}
</style>

<main class="viewport">

  <aside class="panel preview-panel">

      <div class="field"><canvas class="label txt" data-k="petNameLabel" data-w="150" data-h="24" data-size="15"></canvas><div class="input-shell"><canvas class="display" id="nameDisplay"></canvas><input id="petName" maxlength="20"></div></div>

      <div class="field"><canvas class="label txt" data-k="deathLabel" data-w="150" data-h="24" data-size="15"></canvas><div class="input-shell date"><canvas class="display" id="deathDisplay"></canvas><span class="date-icon"></span><input id="deathDate" type="date"></div></div>

      <div class="section"><canvas class="txt" data-k="wordsSection" data-w="150" data-h="28" data-size="17"></canvas></div>

      <div class="upload-area">

        <div class="slot"><img alt=""><button class="remove" type="button">×</button></div>
        <div class="slot"><img alt=""><button class="remove" type="button">×</button></div>
        <div class="slot"><img alt=""><button class="remove" type="button">×</button></div>
        <div class="slot"><img alt=""><button class="remove" type="button">×</button></div>
        <input id="photoInput" type="file" accept="image/*" multiple hidden>
      </div>

      <div class="submit-row"><button class="submit" type="submit"><span class="button-label" data-k-text="submit"></span></button></div>
    </form>
  </section>
</section>
</main>

};

const S={lang:localStorage.getItem("petMemorialLanguage")||"zh-CN",type:"",visibility:"public",photos:[]};
const stage=document.getElementById("stage"),toast=document.getElementById("toast");
const nameI=document.getElementById("petName"),birthI=document.getElementById("birthDate"),deathI=document.getElementById("deathDate"),epiI=document.getElementById("epitaph"),storyI=document.getElementById("story");
const stoneC=document.getElementById("stoneText");
function tr(k){return(T[S.lang]&&T[S.lang][k])||T["zh-CN"][k]||k}
function resize(){stage.style.transform=`scale(${Math.min(innerWidth/1672,innerHeight/941)})`}addEventListener("resize",resize);resize();

function setup(c,w,h,r=1){c.style.width=w+"px";c.style.height=h+"px";c.width=Math.max(1,Math.floor(w/r));c.height=Math.max(1,Math.floor(h/r));const ctx=c.getContext("2d");ctx.imageSmoothingEnabled=false;return{ctx,r}}
function px(c,text,opt={}){
  const w=+c.dataset.w||opt.w||c.clientWidth||120,h=+c.dataset.h||opt.h||c.clientHeight||24,size=+c.dataset.size||opt.size||16;
  const {ctx,r}=setup(c,w,h,opt.ratio||1);ctx.clearRect(0,0,c.width,c.height);
  ctx.font=`900 ${Math.round(size/r)}px "SimSun","Courier New",monospace`;ctx.textBaseline="top";ctx.textAlign=opt.align||"left";
  const color=opt.color||"rgba(230,196,126,.92)";
  const lines=String(text||"").split(/\\n|\n/);
  const lineH=Math.max(1,Math.round(size*1.38/r));
  const totalH=lines.length*lineH;
  const startY=Math.max(0,Math.round((c.height-totalH)/2)+1);
  lines.forEach((line,i)=>{
    const y=startY+i*lineH;
    const x=opt.align==="center"?c.width/2:0;
    ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(line,x+1,y+1);
    ctx.fillStyle=color;ctx.fillText(line,x,y);
  })
}
function wrap(ctx,text,max){let out=[],line="";for(const ch of String(text||"")){let test=line+ch;if(ctx.measureText(test).width>max&&line){out.push(line);line=ch}else line=test}if(line)out.push(line);return out}
function fitStoneBlock(ctx,text,maxW,maxH,startSize,minSize,maxLines){
  const clean=String(text||"").trim();
  if(!clean) return {size:startSize,lines:[]};
  for(let size=startSize; size>=minSize; size--){
    ctx.font=`900 ${size}px "SimSun","Courier New",monospace`;
    const lines=wrap(ctx,clean,maxW);
    const lineH=Math.max(1,Math.round(size*1.34));
    const allow=Math.max(1,Math.min(maxLines, Math.floor(maxH/lineH)));
    if(lines.length<=allow){
      return {size, lines, lineH};
    }
  }
  ctx.font=`900 ${minSize}px "SimSun","Courier New",monospace`;
  let lines=wrap(ctx,clean,maxW);
  const lineH=Math.max(1,Math.round(minSize*1.34));
  const allow=Math.max(1,Math.min(maxLines, Math.floor(maxH/lineH)));
  lines=lines.slice(0,allow);
  if(lines.length){
    let last=lines[allow-1];
    while(last && ctx.measureText(last+"…").width>maxW){ last=last.slice(0,-1); }
    lines[allow-1]=(last||"")+"…";
  }
  return {size:minSize, lines, lineH};
}
function field(c,text,ph,multi=false){
  const p=c.parentElement,w=p.clientWidth-26,h=p.clientHeight-(multi?16:0);const {ctx,r}=setup(c,w,h,1);
  ctx.font=`900 ${Math.round(17/r)}px "SimSun","Courier New",monospace`;ctx.textBaseline="top";ctx.clearRect(0,0,c.width,c.height);
  const has=String(text||"").trim(),fill=has?"rgba(230,196,126,.94)":"rgba(211,166,97,.72)",content=has?text:ph;
  if(multi){wrap(ctx,content,c.width-4).slice(0,3).forEach((line,i)=>{let y=i*Math.round(18*1.5/r);ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(line,1,y+1);ctx.fillStyle=fill;ctx.fillText(line,0,y)})}
  else{let y=Math.round((c.height-Math.round(17/r))/2);ctx.fillStyle="rgba(25,16,10,.55)";ctx.fillText(String(content).slice(0,42),1,y+1);ctx.fillStyle=fill;ctx.fillText(String(content).slice(0,42),0,y)}
}
function drawStoneText(ctx,text,x,y,maxW,size,maxLines,color){
  ctx.font=`900 ${size}px "SimSun","Courier New",monospace`;ctx.textAlign="center";ctx.textBaseline="top";
  wrap(ctx,text,maxW).slice(0,maxLines).forEach((line,i)=>{let yy=y+i*Math.round(size*1.35);ctx.fillStyle="rgba(220,210,190,.22)";ctx.fillText(line,x+1,yy+1);ctx.fillStyle=color;ctx.fillText(line,x,yy)})
}
function drawStoneBlock(ctx,text,x,y,maxW,maxH,startSize,minSize,maxLines,color){
  const fit=fitStoneBlock(ctx,text,maxW,maxH,startSize,minSize,maxLines);
  if(!fit.lines.length) return;
  ctx.font=`900 ${fit.size}px "SimSun","Courier New",monospace`;
  ctx.textAlign="center";
  ctx.textBaseline="top";
  const totalH=fit.lines.length*fit.lineH;
  const startY=y+Math.max(0,Math.floor((maxH-totalH)/2));
  fit.lines.forEach((line,i)=>{
    const yy=startY+i*fit.lineH;
    ctx.fillStyle="rgba(220,210,190,.22)";
    ctx.fillText(line,x+1,yy+1);
    ctx.fillStyle=color;
    ctx.fillText(line,x,yy);
  });
}
function fmt(v){return v?v.replaceAll("-", "."):"----.--.--"}function fmt(v){return v?v.replaceAll("-","."):"----.--.--"}
function updateStatic(){
  document.querySelectorAll(".txt").forEach(c=>px(c,tr(c.dataset.k)||c.dataset.k));
  document.querySelectorAll("[data-k-text]").forEach(el=>{el.textContent=tr(el.dataset.kText)});
  const uploadLines=String(tr("uploadMain")).split(/\\n|\n/);
  const uploadMain=document.getElementById("uploadMainLine");
  const uploadSub=document.getElementById("uploadSubLine");
  if(uploadMain) uploadMain.textContent=uploadLines[0]||"";
  if(uploadSub) uploadSub.textContent=uploadLines.slice(1).join(" ")||"";
  nameI.placeholder=tr("petNamePH");
  epiI.placeholder=tr("epitaphPH");
  storyI.placeholder=tr("storyPH");
}
function update(){
  field(document.getElementById("typeDisplay"),S.type?tr(S.type):"",tr("petTypePH"));
  field(document.getElementById("birthDisplay"),birthI.value?birthI.value.replaceAll("-"," / "):"",tr("birthPH"));
  field(document.getElementById("deathDisplay"),deathI.value?deathI.value.replaceAll("-"," / "):"",tr("deathPH"));
  px(document.getElementById("epiCount"),`${epiI.value.length}/120`,{w:62,h:18,size:12,color:"rgba(230,196,126,.86)"});
  px(document.getElementById("storyCount"),`${storyI.value.length}/300`,{w:62,h:18,size:12,color:"rgba(230,196,126,.86)"});

  const {ctx}=setup(stoneC,220,230,1);ctx.clearRect(0,0,stoneC.width,stoneC.height);
  drawStoneBlock(ctx,nameI.value.trim()||"小布丁",110,36,118,42,19,10,2,"rgba(38,34,30,.86)");
  drawStoneText(ctx,fmt(birthI.value||"2014-06-12"),110,88,150,15,1,"rgba(42,38,34,.76)");
  drawStoneText(ctx,"—",110,105,150,13,1,"rgba(42,38,34,.76)");
  drawStoneText(ctx,fmt(deathI.value||"2025-11-03"),110,121,150,15,1,"rgba(42,38,34,.76)");
  if(epiI.value.trim()) drawStoneBlock(ctx,epiI.value.trim(),110,140,132,84,12,6,8,"rgba(42,38,34,.68)");
}
[nameI,birthI,deathI,epiI,storyI].forEach(el=>{el.addEventListener("input",update);el.addEventListener("change",update)});
[birthI,deathI].forEach(el=>el.parentElement.addEventListener("click",()=>{el.focus();if(el.showPicker)el.showPicker()}));

const typeShell=document.getElementById("typeShell"),typeMenu=document.getElementById("typeMenu");
typeShell.addEventListener("click",e=>{e.stopPropagation();typeMenu.classList.toggle("open")});
typeMenu.querySelectorAll("button").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.type=b.dataset.v;typeMenu.classList.remove("open");update()}));

document.querySelectorAll(".choice").forEach(c=>c.addEventListener("click",()=>{document.querySelectorAll(".choice").forEach(x=>x.classList.remove("active"));c.classList.add("active");S.visibility=c.dataset.v}));

const langBtn=document.getElementById("langButton"),langMenu=document.getElementById("langMenu");
langBtn.addEventListener("click",e=>{e.stopPropagation();langMenu.classList.toggle("open")});
langMenu.querySelectorAll("button").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.lang=b.dataset.lang;localStorage.setItem("petMemorialLanguage",S.lang);langMenu.classList.remove("open");updateStatic();update()}));
document.addEventListener("click",()=>{langMenu.classList.remove("open");typeMenu.classList.remove("open")});

const photoInput=document.getElementById("photoInput"),slots=[...document.querySelectorAll(".slot")];
document.getElementById("uploadMain").addEventListener("click",()=>photoInput.click());
slots.forEach(s=>s.addEventListener("click",()=>photoInput.click()));
photoInput.addEventListener("change",()=>{S.photos=[...photoInput.files].slice(0,5);renderPhotos()});
function renderPhotos(){slots.forEach((slot,i)=>{const img=slot.querySelector("img"),f=S.photos[i];if(f){img.src=URL.createObjectURL(f);slot.classList.add("filled")}else{img.removeAttribute("src");slot.classList.remove("filled")}})}
slots.forEach((slot,i)=>slot.querySelector(".remove").addEventListener("click",e=>{e.stopPropagation();S.photos.splice(i,1);renderPhotos()}));

document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();
  if(!nameI.value.trim()){toast.textContent=tr("needName");toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1500);return}
  localStorage.setItem("petMemorialDraft",JSON.stringify({petName:nameI.value.trim(),petType:S.type,birthDate:birthI.value,deathDate:deathI.value,epitaph:epiI.value.trim(),story:storyI.value.trim(),visibility:S.visibility,photoCount:S.photos.length,savedAt:new Date().toISOString()}));
  toast.textContent=tr("saved");toast.classList.add("show");setTimeout(()=>{toast.classList.remove("show");location.href="select-stone.html"},650);
});
updateStatic();update();
</script>
</body>
</html>
