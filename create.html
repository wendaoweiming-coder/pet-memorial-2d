<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建纪念｜星归园</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --gold: rgba(232, 201, 148, .92);
      --gold-soft: rgba(232, 213, 178, .72);
      --gold-line: rgba(205, 157, 91, .72);
      --panel: rgba(7, 17, 34, .84);
      --field: rgba(4, 12, 26, .86);
      --shadow: rgba(0, 0, 0, .26);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #07111f;
      color: var(--gold);
      font-family: "Courier New", "SimSun", "Microsoft YaHei", monospace;
      -webkit-font-smoothing: none;
      font-smooth: never;
    }

    body { overflow-x: hidden; }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button { border: 0; cursor: pointer; }

    .page {
      position: relative;
      min-height: 100vh;
      padding: 36px 58px 52px;
      background:
        linear-gradient(90deg, rgba(5,10,22,.78), rgba(5,10,22,.60) 46%, rgba(5,10,22,.38)),
        url("assets/bg.png") center center / cover fixed no-repeat;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: screen;
      opacity: .68;
    }

    .topbar {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--gold);
      text-shadow: 3px 3px 0 rgba(17,12,8,.58);
    }

    .brand img,
    .panel-title img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pixel-button,
    .language-button {
      position: relative;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 16px;
      color: var(--gold);
      background: rgba(7,16,32,.78);
      border: 2px solid var(--gold-line);
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.055),
        5px 5px 0 rgba(0,0,0,.24);
      text-decoration: none;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(17,12,8,.40);
    }

    .pixel-button::before,
    .pixel-button::after,
    .language-button::before,
    .language-button::after,
    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      pointer-events: none;
      border-color: rgba(236, 191, 116, .76);
      border-style: solid;
    }

    .pixel-button::before,
    .language-button::before,
    .panel::before {
      left: 8px;
      top: 8px;
      border-width: 2px 0 0 2px;
    }

    .pixel-button::after,
    .language-button::after,
    .panel::after {
      right: 8px;
      bottom: 8px;
      border-width: 0 2px 2px 0;
    }

    .globe-svg {
      width: 19px;
      height: 19px;
      opacity: .88;
      flex: none;
    }

    .language { position: relative; z-index: 30; }

    .language-menu {
      position: absolute;
      right: 0;
      top: 50px;
      width: 152px;
      display: none;
      padding: 6px;
      background: rgba(8,16,32,.98);
      border: 2px solid var(--gold-line);
      box-shadow: 6px 6px 0 rgba(0,0,0,.28);
    }

    .language.open .language-menu { display: grid; gap: 4px; }

    .language-menu button {
      height: 34px;
      color: var(--gold);
      background: transparent;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .8px;
    }

    .language-menu button:hover,
    .language-menu button.active {
      background: rgba(232,191,116,.12);
    }

    .layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 460px minmax(660px, 900px);
      gap: 34px;
      max-width: 1390px;
      margin: 0 auto;
      align-items: start;
    }

    .panel {
      position: relative;
      background: var(--panel);
      border: 2px solid rgba(205,157,91,.66);
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.045),
        8px 8px 0 var(--shadow);
    }

    .preview-panel { padding: 24px 24px 30px; min-height: 660px; }
    .form-panel { padding: 24px 26px 26px; }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 20px;
      color: rgba(238,213,167,.96);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(17,12,8,.40);
    }

    .pixel-line {
      position: relative;
      width: 100%;
      height: 2px;
      margin: 0 0 30px;
      background: linear-gradient(90deg, rgba(205,157,91,.75), rgba(205,157,91,.22), transparent);
    }

    .pixel-line::after {
      content: "";
      position: absolute;
      left: 47%;
      top: -7px;
      width: 14px;
      height: 14px;
      background: rgba(226,184,112,.75);
      transform: rotate(45deg);
      box-shadow:
        -22px 0 0 rgba(226,184,112,.42),
        22px 0 0 rgba(226,184,112,.42);
    }

    .scene {
      position: relative;
      height: 380px;
      overflow: hidden;
      border: 2px solid rgba(205,157,91,.46);
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px),
        radial-gradient(circle at 50% 8%, rgba(238,213,167,.14), transparent 24%),
        linear-gradient(#081327, #050c1a);
      background-size: 5px 5px, 5px 5px, auto, auto;
      box-shadow: inset 0 0 0 2px rgba(255,232,178,.035);
    }

    .scene-ground {
      position: absolute;
      left: -20px;
      right: -20px;
      bottom: 0;
      height: 82px;
      background:
        linear-gradient(90deg, transparent 0 12px, rgba(104,86,53,.34) 12px 18px, transparent 18px 30px),
        linear-gradient(rgba(35,54,38,.90), rgba(18,31,25,.98));
      background-size: 30px 10px, auto;
      border-top: 2px solid rgba(205,157,91,.32);
    }

    .stone-wrap {
      position: absolute;
      left: 50%;
      top: 52px;
      width: 256px;
      height: 330px;
      transform: translateX(-50%);
    }

    .stone-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      filter: drop-shadow(8px 8px 0 rgba(0,0,0,.22));
    }

    .stone-text {
      position: absolute;
      left: 54px;
      right: 46px;
      top: 114px;
      height: 148px;
      text-align: center;
      color: rgba(34,31,28,.82);
      font-family: "Courier New", "SimSun", "Microsoft YaHei", monospace;
      font-weight: 900;
      text-shadow: 1px 1px 0 rgba(210,202,184,.20);
      overflow: hidden;
    }

    .stone-name {
      margin-top: 0;
      font-size: 24px;
      line-height: 1.15;
      word-break: break-word;
    }

    .stone-date {
      margin-top: 13px;
      font-size: 13px;
      line-height: 1.35;
      opacity: .82;
    }

    .stone-epitaph {
      margin-top: 9px;
      font-size: 13px;
      line-height: 1.35;
      max-height: 52px;
      overflow: hidden;
      opacity: .76;
    }

    .preview-note {
      margin: 18px 0 0;
      color: rgba(232,213,178,.66);
      font-size: 14px;
      line-height: 1.8;
      text-shadow: 0 2px 0 rgba(17,12,8,.32);
    }

    .section-label {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 9px 12px;
      color: rgba(238,213,167,.94);
      background: rgba(205,157,91,.10);
      border-left: 4px solid rgba(236,191,116,.78);
      font-weight: 900;
      letter-spacing: .8px;
      text-shadow: 0 2px 0 rgba(17,12,8,.36);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 17px 18px;
    }

    .field { display: grid; gap: 8px; }
    .full { grid-column: 1 / -1; }

    label {
      color: rgba(232,213,178,.84);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .6px;
      text-shadow: 0 2px 0 rgba(17,12,8,.30);
    }

    input,
    textarea,
    select {
      width: 100%;
      color: rgba(249,228,186,.95);
      background: var(--field);
      border: 2px solid rgba(205,157,91,.56);
      outline: none;
      padding: 12px 13px;
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.035),
        4px 4px 0 rgba(0,0,0,.18);
      border-radius: 0;
      color-scheme: dark;
      font-weight: 900;
    }

    input, select { height: 48px; }
    textarea { min-height: 98px; resize: vertical; line-height: 1.7; }

    input::placeholder,
    textarea::placeholder {
      color: rgba(232,213,178,.34);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(236,191,116,.90);
      box-shadow:
        inset 0 0 0 2px rgba(255,232,178,.06),
        0 0 0 4px rgba(236,191,116,.08),
        4px 4px 0 rgba(0,0,0,.18);
    }

    .choice-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .choice {
      position: relative;
      display: block;
      min-height: 78px;
      padding: 14px;
      color: rgba(232,213,178,.78);
      background: rgba(4,12,26,.64);
      border: 2px solid rgba(205,157,91,.46);
      box-shadow: 4px 4px 0 rgba(0,0,0,.16);
      cursor: pointer;
    }

    .choice input { position: absolute; opacity: 0; pointer-events: none; }

    .choice strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(238,213,167,.94);
      font-size: 14px;
    }

    .choice span {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      opacity: .74;
    }

    .choice:has(input:checked) {
      border-color: rgba(236,191,116,.88);
      background: rgba(236,191,116,.10);
    }

    .upload-zone { display: grid; gap: 12px; margin-top: 8px; }

    .upload-card {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 14px;
      align-items: center;
      padding: 13px;
      background: rgba(4,12,26,.62);
      border: 2px solid rgba(205,157,91,.42);
      box-shadow: 4px 4px 0 rgba(0,0,0,.14);
    }

    .upload-card input { height: auto; padding: 9px; }

    .upload-card strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(238,213,167,.92);
      font-size: 14px;
    }

    .upload-card span {
      display: block;
      color: rgba(232,213,178,.58);
      font-size: 12px;
      line-height: 1.5;
    }

    .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    .thumb {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border: 2px solid rgba(205,157,91,.50);
      background: rgba(5,13,28,.54);
      image-rendering: pixelated;
    }

    .hint {
      margin-top: 14px;
      color: rgba(232,213,178,.50);
      font-size: 12px;
      line-height: 1.6;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      margin-top: 24px;
    }

    .main,
    .ghost {
      height: 52px;
      min-width: 168px;
      padding: 0 22px;
      color: var(--gold);
      background: rgba(11,22,43,.70);
      border: 2px solid rgba(205,157,91,.70);
      box-shadow:
        inset 0 0 0 2px rgba(255,231,174,.06),
        5px 5px 0 rgba(0,0,0,.20);
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(17,12,8,.34);
    }

    .main {
      border-color: rgba(226,176,102,.90);
      background: rgba(20,35,62,.80);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 100;
      padding: 12px 18px;
      color: #e8c994;
      background: rgba(9,16,31,.96);
      border: 2px solid rgba(205,157,91,.58);
      box-shadow: 5px 5px 0 rgba(0,0,0,.20);
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      font-weight: 900;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1120px) {
      .page { padding: 28px 20px 42px; }
      .layout { grid-template-columns: 1fr; }
      .form-grid, .choice-row { grid-template-columns: 1fr; }
      .upload-card { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; gap: 16px; }
      .top-actions { flex-wrap: wrap; justify-content: flex-end; }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <img src="assets/paw.png" alt="" />
        <span id="brandName">星归园</span>
      </div>

      <div class="top-actions">
        <a class="pixel-button" href="index.html" id="backHome">返回首页</a>

        <div class="language" id="languageBox">
          <button class="language-button" type="button" id="languageButton" aria-label="选择语言">
            <svg class="globe-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" fill="none" stroke="rgba(232,201,148,.86)" stroke-width="2" shape-rendering="crispEdges"/>
              <path d="M4 12H20" fill="none" stroke="rgba(232,201,148,.82)" stroke-width="2" shape-rendering="crispEdges"/>
              <path d="M6 8H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/>
              <path d="M6 16H18" fill="none" stroke="rgba(232,201,148,.58)" stroke-width="1.5" shape-rendering="crispEdges"/>
              <path d="M12 3C9 6 8 9 8 12C8 15 9 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/>
              <path d="M12 3C15 6 16 9 16 12C16 15 15 18 12 21" fill="none" stroke="rgba(232,201,148,.76)" stroke-width="1.6" shape-rendering="crispEdges"/>
            </svg>
            <span id="languageLabel">简体中文</span>
            <span>⌄</span>
          </button>

          <div class="language-menu">
            <button type="button" data-lang="zh-CN">简体中文</button>
            <button type="button" data-lang="zh-TW">繁體中文</button>
            <button type="button" data-lang="en">English</button>
            <button type="button" data-lang="ja">日本語</button>
          </div>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel preview-panel">
        <h2 class="panel-title">
          <img src="assets/paw.png" alt="" />
          <span id="previewTitle">墓碑预览</span>
        </h2>

        <div class="pixel-line"></div>

        <div class="scene">
          <div class="scene-ground"></div>

          <div class="stone-wrap">
            <img class="stone-img" src="assets/stone_preview.png" alt="" />
            <div class="stone-text">
              <div class="stone-name" id="previewName">Lucky</div>
              <div class="stone-date" id="previewDate">2014.06.12<br />2025.11.03</div>
              <div class="stone-epitaph" id="previewEpitaph">谢谢你把最温柔的日子留给我。</div>
            </div>
          </div>
        </div>

        <p class="preview-note" id="previewNote">这里先展示基础墓碑预览。下一步会进入墓碑样式选择页面。</p>
      </aside>

      <section class="panel form-panel">
        <h2 class="panel-title">
          <img src="assets/paw.png" alt="" />
          <span id="formTitle">纪念信息</span>
        </h2>

        <form id="memorialForm">
          <div class="form-grid">
            <div class="section-label" id="basicSection">基础信息</div>

            <div class="field">
              <label for="petName" id="labelName">爱宠名字</label>
              <input id="petName" required maxlength="40" placeholder="例如：Lucky" value="Lucky" />
            </div>

            <div class="field">
              <label for="petType" id="labelType">爱宠种类</label>
              <select id="petType">
                <option value="cat">猫</option>
                <option value="dog">狗</option>
                <option value="bird">鸟</option>
                <option value="rabbit">兔子</option>
                <option value="hamster">仓鼠</option>
                <option value="other">其他</option>
              </select>
            </div>

            <div class="field">
              <label for="birthDate" id="labelBirth">出生日期</label>
              <input id="birthDate" type="date" value="2014-06-12" />
            </div>

            <div class="field">
              <label for="deathDate" id="labelDeath">离开日期</label>
              <input id="deathDate" type="date" value="2025-11-03" />
            </div>

            <div class="section-label" id="wordsSection">文字纪念</div>

            <div class="field full">
              <label for="epitaph" id="labelEpitaph">墓志铭</label>
              <textarea id="epitaph" maxlength="120" placeholder="写一句最想刻在墓碑上的话。">谢谢你把最温柔的日子留给我。</textarea>
            </div>

            <div class="field full">
              <label for="story" id="labelStory">可公开的故事</label>
              <textarea id="story" maxlength="1200" placeholder="写下它的性格、习惯，或者你最想记住的一天。"></textarea>
            </div>

            <div class="section-label" id="visibilitySection">可见范围</div>

            <div class="field full">
              <div class="choice-row">
                <label class="choice">
                  <input type="radio" name="visibility" value="public" checked />
                  <strong id="privacyPublic">公开</strong>
                  <span id="privacyPublicDesc">所有访客都可以看到。</span>
                </label>

                <label class="choice">
                  <input type="radio" name="visibility" value="invite" />
                  <strong id="privacyInvite">邀请可见</strong>
                  <span id="privacyInviteDesc">只给拥有链接的人看。</span>
                </label>

                <label class="choice">
                  <input type="radio" name="visibility" value="private" />
                  <strong id="privacyPrivate">仅自己</strong>
                  <span id="privacyPrivateDesc">只有自己可以查看。</span>
                </label>
              </div>
            </div>

            <div class="section-label" id="photoSection">照片</div>

            <div class="field full">
              <div class="upload-zone">
                <div class="upload-card">
                  <div>
                    <strong id="stonePhotoTitle">墓碑展示照片</strong>
                    <span id="stonePhotoDesc">用于墓碑正面，只选择一张。</span>
                  </div>
                  <input id="stonePhoto" type="file" accept="image/*" />
                </div>

                <div class="upload-card">
                  <div>
                    <strong id="publicPhotoTitle">公开相册</strong>
                    <span id="publicPhotoDesc">所有访客都可以看到。</span>
                  </div>
                  <input id="publicPhotos" type="file" accept="image/*" multiple />
                </div>

                <div class="upload-card">
                  <div>
                    <strong id="privatePhotoTitle">私密相册</strong>
                    <span id="privatePhotoDesc">只保存在你的纪念页里。</span>
                  </div>
                  <input id="privatePhotos" type="file" accept="image/*" multiple />
                </div>
              </div>

              <div class="photo-preview" id="photoPreview"></div>
              <div class="hint" id="photoHint">当前版本会把填写内容暂存在浏览器本地，后续接入账号和数据库后再保存到服务器。</div>
            </div>
          </div>

          <div class="footer-actions">
            <button class="ghost" type="button" id="saveDraft">保存草稿</button>
            <button class="main" type="submit" id="nextStep">继续选择墓碑</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const TEXTS = {
      "zh-CN": {
        brandName: "星归园",
        backHome: "返回首页",
        languageLabel: "简体中文",
        previewTitle: "墓碑预览",
        previewNote: "这里先展示基础墓碑预览。下一步会进入墓碑样式选择页面。",
        formTitle: "纪念信息",
        basicSection: "基础信息",
        wordsSection: "文字纪念",
        visibilitySection: "可见范围",
        photoSection: "照片",
        labelName: "爱宠名字",
        labelType: "爱宠种类",
        labelBirth: "出生日期",
        labelDeath: "离开日期",
        labelEpitaph: "墓志铭",
        labelStory: "可公开的故事",
        privacyPublic: "公开",
        privacyPublicDesc: "所有访客都可以看到。",
        privacyInvite: "邀请可见",
        privacyInviteDesc: "只给拥有链接的人看。",
        privacyPrivate: "仅自己",
        privacyPrivateDesc: "只有自己可以查看。",
        stonePhotoTitle: "墓碑展示照片",
        stonePhotoDesc: "用于墓碑正面，只选择一张。",
        publicPhotoTitle: "公开相册",
        publicPhotoDesc: "所有访客都可以看到。",
        privatePhotoTitle: "私密相册",
        privatePhotoDesc: "只保存在你的纪念页里。",
        photoHint: "当前版本会把填写内容暂存在浏览器本地，后续接入账号和数据库后再保存到服务器。",
        saveDraft: "保存草稿",

    const ids = [
      "brandName", "backHome", "languageLabel", "previewTitle", "previewNote",
      "formTitle", "basicSection", "wordsSection", "visibilitySection", "photoSection",
      "labelName", "labelType", "labelBirth", "labelDeath", "labelEpitaph", "labelStory",
      "privacyPublic", "privacyPublicDesc", "privacyInvite", "privacyInviteDesc",
      "privacyPrivate", "privacyPrivateDesc", "stonePhotoTitle", "stonePhotoDesc",
      "publicPhotoTitle", "publicPhotoDesc", "privatePhotoTitle", "privatePhotoDesc",
      "photoHint", "saveDraft", "nextStep"
    ];

    const languageBox = document.getElementById("languageBox");
    const languageButton = document.getElementById("languageButton");
    const toast = document.getElementById("toast");
    const form = document.getElementById("memorialForm");
    const photoPreview = document.getElementById("photoPreview");

    const petName = document.getElementById("petName");
    const birthDate = document.getElementById("birthDate");
    const deathDate = document.getElementById("deathDate");
    const epitaph = document.getElementById("epitaph");
    const previewName = document.getElementById("previewName");
    const previewDate = document.getElementById("previewDate");
    const previewEpitaph = document.getElementById("previewEpitaph");

    function currentLang() {
      return localStorage.getItem("petMemorialLanguage") || "zh-CN";
    }

    function t(key) {
      const lang = currentLang();
      return (TEXTS[lang] && TEXTS[lang][key]) || TEXTS["zh-CN"][key] || "";
    }

    function formatDate(value) {
      return value ? value.replaceAll("-", ".") : "----.--.--";
    }

    function updateStonePreview() {
      previewName.textContent = petName.value.trim() || "Lucky";
      previewDate.innerHTML = `${formatDate(birthDate.value)}<br />${formatDate(deathDate.value)}`;
      previewEpitaph.textContent = epitaph.value.trim() || "谢谢你把最温柔的日子留给我。";
    }

    function applyLanguage(lang) {
      const data = TEXTS[lang] || TEXTS["zh-CN"];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el && data[id]) el.textContent = data[id];
      });

      document.querySelectorAll(".language-menu button").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function getFilesAsDataURLs(input) {
      const files = Array.from(input.files || []);
      return Promise.all(files.map((file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve({ name: file.name, data: reader.result });
          reader.readAsDataURL(file);
        });
      }));
    }

    async function collectData() {
      const visibility = document.querySelector("input[name='visibility']:checked")?.value || "public";
      const [stonePhotos, publicPhotos, privatePhotos] = await Promise.all([
        getFilesAsDataURLs(document.getElementById("stonePhoto")),
        getFilesAsDataURLs(document.getElementById("publicPhotos")),
        getFilesAsDataURLs(document.getElementById("privatePhotos"))
      ]);

      return {
        petName: petName.value.trim(),
        petType: document.getElementById("petType").value,
        birthDate: birthDate.value,
        deathDate: deathDate.value,
        epitaph: epitaph.value.trim(),
        story: document.getElementById("story").value.trim(),
        visibility,
        stonePhoto: stonePhotos[0] || null,
        publicPhotos,
        privatePhotos,
        savedAt: new Date().toISOString()
      };
    }

    function validateData(data) {
      if (!data.petName) {
        showToast(t("needName"));
        petName.focus();
        return false;
      }

      if (data.birthDate && data.deathDate && data.deathDate < data.birthDate) {
        showToast(t("dateError"));
        deathDate.focus();
        return false;
      }

      return true;
    }

    async function saveDraft() {
      const data = await collectData();
      if (!validateData(data)) return false;
      localStorage.setItem("petMemorialDraft", JSON.stringify(data));
      showToast(t("saved"));
      return true;
    }

    function renderPhotoPreview() {
      photoPreview.innerHTML = "";
      ["stonePhoto", "publicPhotos", "privatePhotos"].forEach((id) => {
        Array.from(document.getElementById(id).files || []).forEach((file) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = document.createElement("img");
            img.className = "thumb";
            img.src = reader.result;
            photoPreview.appendChild(img);
          };
          reader.readAsDataURL(file);
        });
      });
    }

    ["stonePhoto", "publicPhotos", "privatePhotos"].forEach((id) => {
      document.getElementById(id).addEventListener("change", renderPhotoPreview);
    });

    [petName, birthDate, deathDate, epitaph].forEach((input) => {
      input.addEventListener("input", updateStonePreview);
      input.addEventListener("change", updateStonePreview);
    });

    document.getElementById("saveDraft").addEventListener("click", saveDraft);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const saved = await saveDraft();
      if (saved) {
        setTimeout(() => window.location.href = "select-stone.html", 500);
      }
    });

    languageButton.addEventListener("click", (event) => {
      event.stopPropagation();
      languageBox.classList.toggle("open");
    });

    document.querySelectorAll(".language-menu button").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        const lang = button.dataset.lang;
        localStorage.setItem("petMemorialLanguage", lang);
        applyLanguage(lang);
        languageBox.classList.remove("open");
      });
    });

    document.addEventListener("click", () => languageBox.classList.remove("open"));
    applyLanguage(currentLang());
    updateStonePreview();
  </script>
