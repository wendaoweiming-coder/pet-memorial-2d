<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建纪念｜星归园</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #07111f;
      color: rgba(238, 213, 167, .92);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    body { overflow-x: hidden; }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      position: relative;
      background:
        linear-gradient(90deg, rgba(5, 10, 22, .72) 0%, rgba(5, 10, 22, .50) 45%, rgba(5, 10, 22, .30) 100%),
        url("assets/bg.png") center center / cover fixed no-repeat;
      padding: 42px 72px 56px;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 28% 16%, rgba(246, 218, 154, .11), transparent 22%),
        radial-gradient(circle at 80% 82%, rgba(226, 172, 94, .09), transparent 28%);
    }

    .topbar {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(232, 201, 148, .88);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 2px 0 rgba(17, 12, 8, .34);
    }

    .brand img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      image-rendering: pixelated;
      opacity: .92;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .quiet-link,
    .language-button {
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 16px;
      color: rgba(232, 201, 148, .86);
      background: rgba(8, 17, 35, .50);
      border: 2px solid rgba(198, 151, 85, .54);
      box-shadow:
        inset 0 0 0 2px rgba(255, 232, 178, .05),
        0 8px 20px rgba(0, 0, 0, .16);
      text-decoration: none;
      letter-spacing: 1px;
      font-size: 15px;
      font-weight: 800;
    }

    .language { position: relative; z-index: 20; }

    .language-menu {
      position: absolute;
      top: 48px;
      right: 0;
      width: 152px;
      display: none;
      padding: 6px;
      background: rgba(8, 16, 32, .96);
      border: 2px solid rgba(198, 151, 85, .54);
      box-shadow: 0 18px 34px rgba(0, 0, 0, .32);
    }

    .language.open .language-menu {
      display: grid;
      gap: 4px;
    }

    .language-menu button {
      height: 34px;
      color: rgba(232, 201, 148, .9);
      background: transparent;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .8px;
    }

    .language-menu button:hover,
    .language-menu button.active {
      background: rgba(232, 191, 116, .12);
    }

    .layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(380px, 500px) minmax(560px, 1fr);
      gap: 34px;
      align-items: start;
      max-width: 1320px;
      margin: 0 auto;
    }

    .intro { padding-top: 40px; }

    .ornament {
      width: 430px;
      height: 26px;
      position: relative;
      margin-bottom: 28px;
      opacity: .70;
    }

    .ornament::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 13px;
      height: 2px;
      background: linear-gradient(90deg, rgba(202,150,84,.70), rgba(202,150,84,.50), rgba(202,150,84,.18));
    }

    .ornament img {
      position: absolute;
      left: 190px;
      top: -4px;
      width: 34px;
      height: 34px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    h1 {
      margin: 0;
      color: rgba(226, 199, 145, .94);
      font-family: "STSong", "SimSun", "Noto Serif CJK SC", "Microsoft YaHei", serif;
      font-size: 58px;
      line-height: 1.04;
      letter-spacing: 1px;
      text-shadow:
        4px 4px 0 rgba(30, 23, 17, .70),
        2px 2px 0 rgba(66, 48, 30, .66);
    }

    .intro p {
      width: 430px;
      margin: 24px 0 0;
      color: rgba(232, 213, 178, .78);
      font-size: 18px;
      line-height: 1.9;
      letter-spacing: .5px;
      text-shadow: 0 2px 0 rgba(12, 10, 8, .40);
    }

    .steps {
      display: grid;
      gap: 18px;
      margin-top: 58px;
      width: 420px;
    }

    .step-card {
      padding: 18px 20px;
      background: rgba(8, 18, 36, .48);
      border: 1px solid rgba(198, 151, 85, .30);
      box-shadow: inset 0 0 0 1px rgba(255, 232, 178, .04);
    }

    .step-card strong {
      display: block;
      color: rgba(232, 201, 148, .88);
      font-size: 18px;
      margin-bottom: 8px;
      letter-spacing: .8px;
    }

    .step-card span {
      color: rgba(232, 213, 178, .58);
      font-size: 14px;
      line-height: 1.7;
    }

    .panel {
      background: rgba(10, 20, 38, .64);
      border: 1px solid rgba(218, 174, 106, .42);
      box-shadow:
        inset 0 0 0 1px rgba(255, 232, 178, .06),
        0 24px 70px rgba(0, 0, 0, .34);
      backdrop-filter: blur(12px);
      padding: 26px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 20px;
      color: rgba(238, 213, 167, .94);
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .section-title img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      color: rgba(232, 213, 178, .82);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      color: rgba(249, 228, 186, .94);
      background: rgba(5, 13, 28, .62);
      border: 1px solid rgba(198, 151, 85, .45);
      outline: none;
      padding: 12px 13px;
      box-shadow: inset 0 0 0 1px rgba(255, 232, 178, .04);
      border-radius: 0;
    }

    input,
    select { height: 46px; }

    textarea {
      min-height: 98px;
      resize: vertical;
      line-height: 1.7;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(232, 213, 178, .36);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(236, 191, 116, .82);
      box-shadow:
        inset 0 0 0 1px rgba(255, 232, 178, .08),
        0 0 0 3px rgba(236, 191, 116, .08);
    }

    .choice-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .choice {
      position: relative;
      display: block;
      min-height: 68px;
      padding: 13px 13px 12px;
      color: rgba(232, 213, 178, .78);
      background: rgba(5, 13, 28, .42);
      border: 1px solid rgba(198, 151, 85, .36);
      cursor: pointer;
    }

    .choice input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .choice strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(238, 213, 167, .92);
      font-size: 14px;
    }

    .choice span {
      font-size: 12px;
      line-height: 1.5;
      opacity: .74;
    }

    .choice:has(input:checked) {
      border-color: rgba(236, 191, 116, .78);
      background: rgba(236, 191, 116, .10);
    }

    .upload-zone {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .upload-card {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 14px;
      align-items: center;
      padding: 13px;
      background: rgba(5, 13, 28, .40);
      border: 1px solid rgba(198, 151, 85, .36);
    }

    .upload-card input {
      height: auto;
      padding: 9px;
    }

    .upload-card strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(238, 213, 167, .90);
      font-size: 14px;
    }

    .upload-card span {
      display: block;
      color: rgba(232, 213, 178, .58);
      font-size: 12px;
      line-height: 1.5;
    }

    .preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      min-height: 0;
    }

    .thumb {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border: 1px solid rgba(198, 151, 85, .42);
      background: rgba(5, 13, 28, .54);
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      margin-top: 24px;
    }

    .main-button,
    .ghost-button {
      position: relative;
      height: 50px;
      min-width: 168px;
      padding: 0 22px;
      color: rgba(232, 201, 148, .92);
      background: rgba(11, 22, 43, .56);
      border: 2px solid rgba(198, 151, 85, .62);
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 0 rgba(17, 12, 8, .34);
      box-shadow:
        inset 0 0 0 2px rgba(255, 231, 174, .06),
        0 8px 20px rgba(0, 0, 0, .18);
    }

    .main-button {
      border-color: rgba(226, 176, 102, .84);
      background: rgba(20, 35, 62, .70);
    }

    .hint {
      margin-top: 14px;
      color: rgba(232, 213, 178, .54);
      font-size: 12px;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 100;
      padding: 12px 18px;
      color: #e8c994;
      background: rgba(9, 16, 31, .96);
      border: 1px solid rgba(198, 151, 85, .45);
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      letter-spacing: 1px;
      font: 700 15px "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .page { padding: 28px 20px 42px; }
      .layout { grid-template-columns: 1fr; }
      .intro { padding-top: 10px; }
      .intro p,
      .ornament,
      .steps { width: 100%; }
      h1 { font-size: 42px; }
      .form-grid,
      .choice-row { grid-template-columns: 1fr; }
      .upload-card { grid-template-columns: 1fr; }
      .topbar {
        align-items: flex-start;
        gap: 16px;
      }
      .top-actions {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <img src="assets/paw.png" alt="" />
        <span id="brandName">星归园</span>
      </div>

      <div class="top-actions">
        <a class="quiet-link" href="index.html" id="backHome">返回首页</a>

        <div class="language" id="languageBox">
          <button class="language-button" type="button" id="languageButton">
            <span>◎</span>
            <span id="languageLabel">简体中文</span>
            <span>⌄</span>
          </button>
          <div class="language-menu">
            <button type="button" data-lang="zh-CN">简体中文</button>
            <button type="button" data-lang="zh-TW">繁體中文</button>
            <button type="button" data-lang="en">English</button>
            <button type="button" data-lang="ja">日本語</button>
          </div>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="intro">
        <div class="ornament">
          <img src="assets/paw.png" alt="" />
        </div>

        <h1 id="pageTitle">为它建立一处<br />安静的纪念</h1>
        <p id="pageIntro">写下名字、日期和想说的话。照片和故事可以公开，也可以只留给自己。</p>

        <div class="steps">
          <div class="step-card">
            <strong id="stepOne">1  填写纪念信息</strong>
            <span id="stepOneDesc">名字、日期、墓志铭、故事。</span>
          </div>
          <div class="step-card">
            <strong id="stepTwo">2  上传照片</strong>
            <span id="stepTwoDesc">墓碑展示、公开相册、私密相册。</span>
          </div>
        </div>
      </aside>

      <section class="panel">
        <h2 class="section-title">
          <img src="assets/paw.png" alt="" />
          <span id="formTitle">纪念信息</span>
        </h2>

        <form id="memorialForm">
          <div class="form-grid">
            <div class="field">
              <label for="petName" id="labelName">爱宠名字</label>
              <input id="petName" name="petName" required maxlength="40" placeholder="例如：Lucky" />
            </div>

            <div class="field">
              <label for="petType" id="labelType">爱宠种类</label>
              <select id="petType" name="petType">
                <option value="cat">猫</option>
                <option value="dog">狗</option>
                <option value="bird">鸟</option>
                <option value="rabbit">兔子</option>
                <option value="hamster">仓鼠</option>
                <option value="other">其他</option>
              </select>
            </div>

            <div class="field">
              <label for="birthDate" id="labelBirth">出生日期</label>
              <input id="birthDate" name="birthDate" type="date" />
            </div>

            <div class="field">
              <label for="deathDate" id="labelDeath">离开日期</label>
              <input id="deathDate" name="deathDate" type="date" />
            </div>

            <div class="field full">
              <label for="epitaph" id="labelEpitaph">墓志铭</label>
              <textarea id="epitaph" name="epitaph" maxlength="120" placeholder="写一句最想刻在墓碑上的话。"></textarea>
            </div>

            <div class="field full">
              <label for="story" id="labelStory">可公开的故事</label>
              <textarea id="story" name="story" maxlength="1200" placeholder="写下它的性格、习惯，或者你最想记住的一天。"></textarea>
            </div>

            <div class="field full">
              <label id="labelPrivacy">墓地可见范围</label>
              <div class="choice-row">
                <label class="choice">
                  <input type="radio" name="visibility" value="public" checked />
                  <strong id="privacyPublic">公开</strong>
                  <span id="privacyPublicDesc">所有访客都可以看到。</span>
                </label>
                <label class="choice">
                  <input type="radio" name="visibility" value="invite" />
                  <strong id="privacyInvite">邀请可见</strong>
                  <span id="privacyInviteDesc">只给拥有链接的人看。</span>
                </label>
                <label class="choice">
                  <input type="radio" name="visibility" value="private" />
                  <strong id="privacyPrivate">仅自己</strong>
                  <span id="privacyPrivateDesc">只有自己可以查看。</span>
                </label>
              </div>
            </div>

            <div class="field full">
              <label id="labelPhotos">照片</label>

              <div class="upload-zone">
                <div class="upload-card">
                  <div>
                    <strong id="stonePhotoTitle">墓碑展示照片</strong>
                    <span id="stonePhotoDesc">用于墓碑正面，只选择一张。</span>
                  </div>
                  <input id="stonePhoto" type="file" accept="image/*" />
                </div>

                <div class="upload-card">
                  <div>
                    <strong id="publicPhotoTitle">公开相册</strong>
                    <span id="publicPhotoDesc">所有访客都可以看到。</span>
                  </div>
                  <input id="publicPhotos" type="file" accept="image/*" multiple />
                </div>

                <div class="upload-card">
                  <div>
                    <strong id="privatePhotoTitle">私密相册</strong>
                    <span id="privatePhotoDesc">只保存在你的纪念页里。</span>
                  </div>
                  <input id="privatePhotos" type="file" accept="image/*" multiple />
                </div>
              </div>

              <div class="preview" id="photoPreview"></div>
              <div class="hint" id="photoHint">当前版本会把填写内容暂存在浏览器本地，后续接入账号和数据库后再保存到服务器。</div>
            </div>
          </div>

          <div class="footer-actions">
            <button class="ghost-button" type="button" id="saveDraft">保存草稿</button>
            <button class="main-button" type="submit" id="nextStep">继续选择墓碑</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

        publicPhotoDesc: "Visible to all visitors.",
        privatePhotoTitle: "Private album",
        privatePhotoDesc: "Kept only in your memorial page.",
        photoHint: "This version stores the draft locally in your browser. Account and database storage can be added later.",
        saveDraft: "Save Draft",
        nextStep: "Choose Tombstone",
        saved: "Draft saved",
        needName: "Please enter the pet name",
        dateError: "Passing date cannot be earlier than birth date"
      },
      "ja": {
        brandName: "星帰園",
        backHome: "ホームへ",
        languageLabel: "日本語",
        pageTitle: "静かな記念の<br />場所をつくる",
        pageIntro: "名前、日付、残したい言葉を書いてください。写真と物語は公開にも非公開にもできます。",
        stepOne: "1  記念情報を入力",
        stepOneDesc: "名前、日付、墓誌銘、物語。",
        stepTwo: "2  写真をアップロード",
        stepTwoDesc: "墓碑表示、公開アルバム、非公開アルバム。",
        formTitle: "記念情報",
        labelName: "名前",
        labelType: "種類",
        labelBirth: "誕生日",
        labelDeath: "旅立った日",
        labelEpitaph: "墓誌銘",
        labelStory: "公開できる物語",
        labelPrivacy: "公開範囲",
        privacyPublic: "公開",
        privacyPublicDesc: "すべての訪問者が見られます。",
        privacyInvite: "招待のみ",
        privacyInviteDesc: "リンクを持つ人だけが見られます。",
        privacyPrivate: "自分だけ",
        privacyPrivateDesc: "自分だけが確認できます。",
        labelPhotos: "写真",
        stonePhotoTitle: "墓碑に表示する写真",
        stonePhotoDesc: "墓碑正面に使用します。一枚だけ選択。",
        publicPhotoTitle: "公開アルバム",
        publicPhotoDesc: "すべての訪問者が見られます。",
        privatePhotoTitle: "非公開アルバム",
        privatePhotoDesc: "あなたの記念ページだけに保存します。",
        photoHint: "現在のバージョンでは入力内容をブラウザ内に一時保存します。アカウントとデータベース保存は後で追加できます。",
        saveDraft: "下書き保存",
        nextStep: "墓碑を選ぶ",
        saved: "下書きを保存しました",
        needName: "名前を入力してください",
        dateError: "旅立った日は誕生日より前にできません"
      }
    };

    const ids = [
      "brandName", "backHome", "languageLabel", "pageTitle", "pageIntro", "stepOne", "stepOneDesc",
      "stepTwo", "stepTwoDesc", "formTitle", "labelName", "labelType", "labelBirth", "labelDeath",
      "labelEpitaph", "labelStory", "labelPrivacy", "privacyPublic", "privacyPublicDesc",
      "privacyInvite", "privacyInviteDesc", "privacyPrivate", "privacyPrivateDesc", "labelPhotos",
      "stonePhotoTitle", "stonePhotoDesc", "publicPhotoTitle", "publicPhotoDesc", "privatePhotoTitle",
      "privatePhotoDesc", "photoHint", "saveDraft", "nextStep"
    ];

    const languageBox = document.getElementById("languageBox");
    const languageButton = document.getElementById("languageButton");
    const toast = document.getElementById("toast");
    const form = document.getElementById("memorialForm");
    const preview = document.getElementById("photoPreview");

    function currentLang() {
      return localStorage.getItem("petMemorialLanguage") || "zh-CN";
    }

    function t(key) {
      const lang = currentLang();
      return (TEXTS[lang] && TEXTS[lang][key]) || TEXTS["zh-CN"][key] || "";
    }

    function applyLanguage(lang) {
      const data = TEXTS[lang] || TEXTS["zh-CN"];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el && data[id]) {
          if (id === "pageTitle") {
            el.innerHTML = data[id];
          } else {
            el.textContent = data[id];
          }
        }
      });

      document.querySelectorAll(".language-menu button").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function getFilesAsDataURLs(input) {
      const files = Array.from(input.files || []);
      return Promise.all(files.map((file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve({ name: file.name, data: reader.result });
          reader.readAsDataURL(file);
        });
      }));
    }

    async function collectData() {
      const visibility = document.querySelector("input[name='visibility']:checked")?.value || "public";
      const [stonePhotos, publicPhotos, privatePhotos] = await Promise.all([
        getFilesAsDataURLs(document.getElementById("stonePhoto")),
        getFilesAsDataURLs(document.getElementById("publicPhotos")),
        getFilesAsDataURLs(document.getElementById("privatePhotos"))
      ]);

      return {
        petName: document.getElementById("petName").value.trim(),
        petType: document.getElementById("petType").value,
        birthDate: document.getElementById("birthDate").value,
        deathDate: document.getElementById("deathDate").value,
        epitaph: document.getElementById("epitaph").value.trim(),
        story: document.getElementById("story").value.trim(),
        visibility,
        stonePhoto: stonePhotos[0] || null,
        publicPhotos,
        privatePhotos,
        savedAt: new Date().toISOString()
      };
    }

    function validateData(data) {
      if (!data.petName) {
        showToast(t("needName"));
        document.getElementById("petName").focus();
        return false;
      }

      if (data.birthDate && data.deathDate && data.deathDate < data.birthDate) {
        showToast(t("dateError"));
        document.getElementById("deathDate").focus();
        return false;
      }

      return true;
    }

    async function saveDraft() {
      const data = await collectData();
      if (!validateData(data)) return false;
      localStorage.setItem("petMemorialDraft", JSON.stringify(data));
      showToast(t("saved"));
      return true;
    }

    function renderPreview() {
      preview.innerHTML = "";
      const inputs = [
        document.getElementById("stonePhoto"),
        document.getElementById("publicPhotos"),
        document.getElementById("privatePhotos")
      ];

      inputs.forEach((input) => {
        Array.from(input.files || []).forEach((file) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = document.createElement("img");
            img.className = "thumb";
            img.src = reader.result;
            preview.appendChild(img);
          };
          reader.readAsDataURL(file);
        });
      });
    }

    ["stonePhoto", "publicPhotos", "privatePhotos"].forEach((id) => {
      document.getElementById(id).addEventListener("change", renderPreview);
    });

    document.getElementById("saveDraft").addEventListener("click", saveDraft);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const saved = await saveDraft();
      if (saved) {
        setTimeout(() => {
          window.location.href = "select-stone.html";
        }, 500);
      }
    });

    languageButton.addEventListener("click", (event) => {
      event.stopPropagation();
      languageBox.classList.toggle("open");
    });

    document.querySelectorAll(".language-menu button").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        const lang = button.dataset.lang;
        localStorage.setItem("petMemorialLanguage", lang);
        applyLanguage(lang);
        languageBox.classList.remove("open");
      });
    });

    document.addEventListener("click", () => languageBox.classList.remove("open"));
    applyLanguage(currentLang());
  </script>
</body>
</html>
